front:
  text: 玄天上帝啓聖録卷之四流四
  hash: sha256:e7a59111030f8c64aa0c6f2883c20af7493e0b4028310bb363b895cb6350d036
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0358_HFL_004-001a, image: hfl/0607/0607-004.png}
body:
  text: 神將教法乾興二年正月據忠州團練使充黔州兵馬鈐轄張孝寧狀奏近為南戎溪洞蠻子龍氏群集萬衆盡習標槍實難準敵蒙樞密院差充此任於安撫司抽軍五千及指使三人孝寧因見故父宣徽文立供養真武一堂在家凡事求籤乃行件件靈感孝寧效父供養專誠不違昨為朝廷放試武學預曾夜夢受真武殿下河魁神將親教槍法弓馬事藝頓然神悟至殿前呈試於二百人中唯孝寧第一當授三班殿侍出身是真武保護至此孝寧軍隊約行一百餘里遇夜路次護國觀有一小殿香燈微明見牌是真武之殿孝寧焚香求一籖大吉暗對真武發願此去若得一陳滅除蠻寇當以本身官資兊换恩賜報斯靈貺越明孝寧領兵前行以五千雄郎步軍臨蠻界乃逢龍氏萬餘人孝寧併輸三陳至夜立寨於秦風山漢伏波將軍馬授廟尚聞蠻兵追逐方二更時相望百步間忽風雨四起兵馬噉殺是時孝寧頓兵伏波廟不動聞噉聲漸遠至曉領兵再往迎敵見前路傷中蠻子尸首相枕直向蠻界九陽溪去探知蠻子龍氏有赤腳寇一萬二千今無二千回各傷中鬼箭龍氏亦折右臂見歸深洞人人皆言大朝有神聖鬼兵護助舉聲叫云自此降伏更不敢作亂後來取問得龍氏定伏情狀申奏朝廷看詳宜賜修蓋護國觀真武諸殿以三年給度牒披戴焚修每年賜二百貫充常住用其張孝寧除授瀛州防禦使符吏借兵內殿承制盧守聰因往河北三關邊廷察探契丹動靜於黃河岸西遇二人各齎實封文字一角守聰問之言我二人今日巡察世間因到定州衝見北極真武靈應真君隊仗云北蕃戎卒漸加萬數為宋朝兵馬稍少難為拒敵緣下降時不曾將帶天兵力士隨行今差某二人齎馳文字限剎那間往東嶽計會炳靈公急關借鬼兵神將一萬衆定壬子月戊子日丙子時布設一陳欲助南朝殺蕃肅寧邊境二符吏言訖便過河守聰回國面奏權令有司附口記録後刑部侍郎充三關都總管富弼回朝參賀奏稱北蕃契丹今皆滅戮更無舉戰意曾擒到燕國黎王趙慤供下尅伏文狀却放回蕃取問獲勝時日係歲庚午壬子月戊子日丙子時與內臣盧守聰預奏同辭除兵將等酬轉賞給外持行德音赦天下罪仍於定州建聖祐觀一所告成日别降御銜詞表答謝書顯魏家中書門下樞密院三司禮部同承尚書兵部侍郎參知政事充定州侍衛兵馬都招討兼經略安撫使王著劄子契勘雍熙三年七月百萬蕃兵已近界河因部軍上將觀察使潘仁美與老臣太尉揚繼業不相和睦並為帥出軍一陳趕趁蕃兵六十餘萬直入北幽狼山被潘仁美潛收軍回寨獨遺繼業軍馬深入契丹添兵擁入虎口堡繼業失陳身死次男延朗赴闕理雪除已差官監伴潘仁美候敕外據東頭供奉官楊延朗經登聞鼓院抱寃投狀稱潘仁美與朝廷姦臣結連私有文字往返教令北蕃違逆先皇囑付謀殺父命奉聖旨令左右監察司限三日採察管要顯露并委全臺用心根究三日將滿兩班文武盡知祕書監丞王允從本是蕃人疑其機構却為寵用不見彰露難以收捉時監察御史魏懷信慮有罪責遂言與相府王宗旦等本家崇敬北極真武至靈至感欲屈衆班屆本家對真武聖前啓露上件國姦速來顯露群公同到魏懷信家恭俟真聖垂決忽於廳前現一蒼頭遽然聲喏某是北燕屬户小兒為見王允從本販貨蕃客寄居補州却稱舉人後來將似此十人為家童入京賣書得遇金龍節就試英明科及第今為祕書監丞內教博士其人乃是蕃中細作見在宋朝結黨年深藏機隱行今將北燕往來書啓共十通告首願奏皇帝望賜恩酬蒼頭移步忽然不見是時相府王宗旦等方顯王允從姦逆抽書十紙進呈即差人擒到王允從當殿取問並皆招伏秪不認有蒼頭曾盜蕃書尋與允從點對北蕃文字十通內一紙云駕不得離京兵不得離邊此語意未詳何謂繼送允從下御史臺訊勘處死封首級送還北蕃其楊延朗除授內殿崇班充梁門寨都巡檢及勘到潘仁美情犯係是先朝外祖舊臣聖旨剝麻降授太原監酒今看詳楊繼業委是先皇腹心忠傑不幸遭姦臣謀陷朝野痛傷特贈推忠協政定亂定國功臣河東節度使就梁門寨建忠輔禪院焚修祠堂可大赦天下三司禮部看詳報謝真貺奉聖旨特賜法醮七晝夜赴魏懷信家庭真武聖前建設其魏懷信除授朝奉郎改差知隰州珓落王宅太子贊善王倜為桂州經略安撫司機宜因將官梁穆以廨園所生果菜抑配軍人與虎翼指揮頭袁升等同情將還價直為名尅衆軍賞給請受入己致衆咸怨遇夜搶劫甲仗走入驢耳山聞奏朝廷蒙指揮先委機宜司體量梁穆情欸飛申經略司追攝根歷申奏其梁穆推避不出所是驢耳山軍徒有言秪恨兵官梁穆今朝廷差官齎到官爵諡書錦襖赦文恩詔今為梁穆不出恐别生不虞展轉負纍夜聞本家堂內錚然有聲王倜驚起持燈巡照却於中門拾得杯珓一付乃是本州漢陽觀鐫題字號王倜次朝親到觀中將與道衆看却云何得落在大夫宅中此杯珓是本觀真武殿內用者王倜定省思惟必是真武響報於倜遂詣殿虔禱用其杯珓奏述上件因依先願聖力遣令平定擲三兆並無間阻王倜頂謝出殿盤旋之間遽報梁穆廨宇中全家慟哭審問其梁穆忽似衝惡口吐黯血倒地氣絶身死王倜既聞王事更不令人知覺選差得力軍級急赴梁穆廨字將帶血尸首抬舁出來王倜自為招軍使命詐稱朝旨出城來迎上件二十餘軍特扛舁梁穆死尸招召軍衆看認明言蒙賜藥酒己不召為汝等故汝等莫忘天子重恩今讎官既死承族追官軍首袁振便隨王倜訓召餘人盡皆跪受赦罪原免罪愆次受詔詞諡書等第恩賞披挂錦襖復歸桂州科局如舊遂蒙經略安撫使邵謐保奏其桂州漢陽觀奉聖旨賜錢重修賜額為報應護國殿王倜除授朝奉郎差知軍州柯誠識姦在京有神猛指揮柯誠因患雙目不任教閲減閣請受曾至渭河候夜投水不期臨危得遇神人就水際叫住施藥就水調洗便得光明全復從此雙目辨識外姦邪詐不正之道後因得夢方知是真武化身來救服患次被西蕃李克淵曾發細作趙可大為賣晝棗推廣角車子入慶州逐日看認城池圍腳歸房用白礬水抄畫地圖被柯誠眼認破捉到慶州一向抵諱及搜出所畫地圖又作白紙柯誠用水蘸出勘問招伏取斬柯誠酬轉十將替滿歸京又值錢去盈權判南省抽差柯誠充京城捉事因魏王宅被人改形裝作行火使者入宴會上拶出硫黃火術驚嚇宗室親宫強盜去渾銀酒器六百兩并御賜金香毬約一百兩見奉敕限堆垛賞錢及右班殿直詰牒一道招人首捉柯誠既蒙旨令緝捕歸家焚香禱告真武福神願收捕前項姦盜方祈告了當出門如得人引路直行到蔡河灣西真寂院前有數人賭博柯誠前看內一人身畔有稜道銀子露出於胸懷柯誠指定搜出數件銀器照證解赴南省鞫勘元是鄧州配軍周詮已依法行遣外申奏朝廷蒙聖旨其柯誠除授右班殿直及支賞錢仍降指揮於玉津園修建報恩大醮并於四聖觀遣官降香釋其禮儀獻謝洞真認厭在京上清延福宫天禧中有雲遊道士羅洞真寄挂三年不語因隨道録入內持課保扶文母皇太后劉氏痁疾對聖駕驀語云觀見宫庭有赤氣臨於宫閣正西面東之位主有厭魅呪詛發毒之兆若於此方位認有如赤蒸裂破處開掘七尺須有名目陰人厭禳之法於其下緣文母為受此毒致日發寒熱時宣諭宰執大臣參詳賜令羅洞真入內認踏至正西方有宫號禧聖閣是先太祖皇帝花蘂妃子之室已空靜年深至第四幃幛據羅洞真於此令人掘深七尺下有石花方磚一片背面用膠生硃寫呪詛術文及太祖年月日時又用羅帛包成人物逐色不祥之類被羅洞真取東南方桃木為劍編鎮左手草繩縛繫釘於北方鬼門空野之處以火燒過自後太后疾減因晝睡夢見七人披頭赤體身挂金紙來告太后念某七人是受法土魂昨被婦人花蘂行姦欲虧害太祖世祚作天魔七返還尸術用某七般呪詛之物埋在御榻地底七尺無何太祖立極感動天地五嶽萬靈扶助其花蘂却遭滅除以致厭呪之物在地不能出脫遂成影魂因繫著太祖纏綿不豫今日蒙道士羅洞真與某等解釋出土雖得離太后聖體奈無所歸除得羅道師為某等持行北極真武靈應法籙令消散却歸本物各求往生太后依此再宣羅洞真入內行法奏告真武救此七般魂形託化後經三日七人又於夢裏來告已蒙真武授記各得歸真本託生故來告辭而去尋特面奏皇帝奉聖旨就延福宫啓建三壇法醮三晝夜及贈羅洞真紫衣師號并延福宫住持焚修聽候宣唤聖幀化婦潁州西安縣因勘劫盜黃狗三等因探知朱守成家極有金銀財帛其家口少先來近處陸二公家停下於慶曆七年四月十一十二十三夜黃狗三各持火罐器仗往朱守成門首狂風大雨群犬號吠疑怯遂回於十四夜又去遂越墻入朱守成圍內方欲穿捵第二重門壁其門自開忽有二十餘人披甲執刀持棒出來趕捉黃狗三等先次搬出墻外急走被一人隨後趕狗三心急更不回顧覆手用搶尖擉殺半路中到得陸二公家數內不見陳伴兒却誤殺死在路上耆社申官備賞錢召捉間却有陳伴兒妻經官告首夫主因與黃狗三同作盜被徒衆秪將夫主陳伴兒擉殺其黃狗三一行九人見今窩藏在陸二公夾壁內尋差巡尉火急密往收捉並全陳伴兒妻當時不知去處據黃狗三供通誤殺陳伴兒本是山東齊州人即無妻屬及朱守成供稱四月十一至十三夜本家即無風雨亦無犬聲十四夜雖聞大路有被殺人今雖知是陳伴兒其夜亦不知黃狗三等越墻入第二重門即無兄弟兒孫人力火客私置甲仗披挂出去趕捉兼守成裏外秪有家纍七口知州韓績詳審事清涉於疑惑再問朱守成家有甚靈祠致此陰助又此婦人首獲黃狗三等據守成言家間只有一堂真武真君三代相續香火不闕韓績遂令取到聖幀與衆宫展看其畫有直符神將共十六人皆披甲執仗并婦人一人稱是元捨此畫弟子韓績因曉悟將黃狗三等斷訖備録申奏蒙中書看詳朱守成係村落下民尚有供養仁心受福保安不遭劫盜况國家香火崇信禮典遍滿天下秪如告獲衆盜不纍官司捕緝豈非護國之功宜遣使特令潁州所有真武宫觀修建齋醮禱謝神靈分形梓州有師巫魯遷三代附神秪事奉一堂真武真君香火尋常占事求籤詳斷來意皆驗本州有三人各是開典鋪力户第一馮蟲大第二高邵郎第三遊行兒歷生結託在外將經商為名却同行竊盜不曾敗露亦無人知內馮蟲大忽一日備香紙來魯遷家禱真武求籤但潛聲懇祝一併二日如此第三日又來魯遷逼問來意蟲大發惡用腳踏倒香案打壞供具而去後三人又往外半年復歸有夔州不相識數公人夜至魯遷家相見皆認遷謂面知云遷曾到夔州告首本州遭劫奪人家稱是梓州馮蟲大高邵郎遊行兒為夔州當下不見魯遷致特差人來問要知三人住處即去收捕遷曰遷秪奉事真武在家卜籤卦何曾出到夔州首人公事然此有馮蟲大等三人並是得辦之家何曾作盜公人既見此説且歸旅店次早再欲見魯遷不覺面前却是魯遷相引行至龍興寺前路間見馮蟲大等三人在彼看醫馬蹄被魯遷牽手令公人捉下其公人急令二人往魯遷家遷在家尚睡未起公人押歸夔州下院根勘旬日中又是梓州魯遷揭得賞榜係涪州收捉殺蠻主郭助教亦是馮蟲大等今有首狀照證及唤問魯遷又忽不見憑此勘馮蟲大等件件招伏已該法外凌遲案後計算諸處賞錢共有二千貫文其魯遷是告首之人得錢七分合牒梓州發遣前來請領後準回文委證魯遷素不離家出外亦不知告首馮蟲大等打劫因依及供公人前次來問事由並無干涉時知夔州張世明詳酌事理恐梓州魯遷自身或本家積善行德為正應之人感攝神靈分形託化為官救民獲此凶惡欲將賞錢給之具實保明申奏續準回降據數項賞錢盡數支與魯遷仍量給米麵酒帛等本人請得錢物盡捨入本州元聖觀建造北極四聖殿仰報聖恩魯遷年九十九歲無疾而終寇船退散東上閣門使眉州防禦使新差京兆府兵馬鈐轄謝柔立自天禧年中差西域路頓勾當於黃河岸際遇真武真君飛渡黃河謂柔立言西蕃奉使李希孟入國切宜緝捉能畫者即是姦人柔立稟命果至東京捉獲傳畫慈孝寺皇后御容一行蕃使敗露尋送大理寺已行賜罪訖柔立蒙朝廷推賞轉職逐日於家堂香火報謝每夜二更備香露天朝北禮拜將及一年忽蒙朝廷詔充交趾回禮副使同國使吏部侍郎燕宿渡海未及中路名白林山於午時間遇寇船四十餘隻叫噉施閲搶弩意欲劫奪財貨為防送不備器械是時謝柔立於水際奠酒拋紙懸空泣告真武降靈海寇頭領稱是陳廣秀才方擊搶欲害柔立忽發一箭中陳廣前心落海鈎搭上船斫其首級懸竿令衆却見群寇五百餘人競船相附發怒欲來酬殺其寇船方努力搖上被抵頭風吹退如此相拒三晝夜忽望見交趾國不遠已臨女仙城界有人來迎接衆寇退散燕宿與柔立等賴蒙真武救護回國以上件感應面奏特奉聖旨就王津園賜設黃籙大醮道場七晝夜散日差近侍遍詣名山洞天再建道場投放龍簡虔謝恩德劫院就擒登州辛山白雲資慶禪院有維那僧曉初不惟奉佛而留心道教常於寮舍靜處供養真武專誠勤恪其院臨近海島有邵武軍周應等百餘人於海道強劫殺人放火所屬州縣堆垛賞錢召人收捕日久徒黨轉多難以除尅一日周應等欲入本院劫奪其夜曉初夢見院門土地來報將有驚劫被真武指揮令放黑風吹逆舟船來之未及可速報官不得遲也曉初趁夜發人告報巡檢即時兵甲到院四散埋伏果於次日周應等數百人執槍杖入院秪云借此一宿主事出迎周應等共到法堂點茶院門已將關閉曉初哀告許下錢物至曉臨行當得獻納周應曰何須候曉急令般出應驀然驚懼云何故眼前亂花頭如火燒四肢不舉續後西辛山巡檢裘臯一行人馬擁出擒捉並不走透一人解押入登州禁奏已各行遣外所有賞錢七分合給僧曉初三分支與巡檢兵級據曉初狀稱所獲海寇非院門功勞因真武降靈使令衆寇手足不遂各就擒縛願朝廷報答真武州司備奏尋降旨其辛山白雲資慶雖是釋教禪院特賜真武殿一所并賜御書太上真武經一卷永充奉安香火仍賜曉初紫衣并真應大師充焚修本殿掌管御經仍給七分賞錢添造寶殿捨身求雨壽州安豐縣玉文慶有一女子小字招弟從十三歲不喫腥魚活物好親道德因遇一化緣女道流叩門勸招弟令受持北極真武靈應真君招弟告云為有上下恐無力可供聖像但只求得真武經一卷日夜念熟行坐藏於胸懷逐日遙望想存真像燒香稱誦年至二十其性巧麗聰敏富貴之家欲求為親並為允意唯口不住稱念本師真武一日忽聞父叔兄弟聚話嗟嘆云去年大旱諸鄉缺食今田苗正要水漿上天不降甘雨民間又將失望雖本村真孚巖有龍潭官吏到來取水略無應驗是時招弟聞此自露天剪髻發心取七月十五日焚香捨身為天下遭旱處保求雨澤願祈豐稔骨屬勸之不從遂就家前起立柴塔是時四方觀者圍繞讚歎招弟形容永不改止如常告辭父母衆人留偈云來時尋度去即舊路三春花艷開謝無固偈畢嘻笑入於火中既透發於柴棚中心有青光一道直衝天門良久驟雨傾降其火有如油蠟澆灌光艷轉盛雨過燒畢又降大雨凡兩日一夜應河渠田苗盡皆霑足至晴王氏洎鄉衆來取骨灰並無纖毫塵迹却於柴灰中拾得攔子一條雙帶結定在生受持真武經一卷儼然如故方知其尸火解惟留經卷衣服以表誠心因其雨水通濟靈感所致州縣前來唤王文慶齎火內焚燒不壞真武經一卷看驗詣實施行次却準省符照會天下應缺雨處已於七月十五日至十六日天降甘澤周足及勘會本州境界有青光一道衝天係是何處是何祥瑞州司具奏準中書省詳宜下壽州以官錢就天慶觀建立小閣一所收王招弟遺迹真武經一卷用綵匣盛藏永充供養立碑為記仍封王招弟為濟澤聖姑置祠香火附語祈晴果州有失目人陳希於少廣山夜遇一真武傳訣逐日專奉後覺出言如附神語為人求保事敘皆合來意四遠響馳人所施惠多不戀己用為功果咸平年中夏接秋序久雨傷禾州縣祈禳皆無感應衆狀舉陳希供養真武祈求有靈知郡黃扆遂令陳希赴廳陳希却告黃扆須得親製祝辭迎請陳希家真武寶座至州衙選道士七人啓立清淨道場禁屠減刑逐日放士庶燒香瞻禱祈晴道場已對三日陳希對知通官衆附傳聖語蒙真武降言果州為天曹注定六十日雨減除禾顆十分不收今更有二十餘日連雨未息今既要求晴奉天皇敕旨消減元注日分至明日巳時雨腳漸從正北而收午時天色晴明禾株茂盛必獲成熟其陳希精神復回適來降靈所説之事皆不知之明早大雨如傾巳時便晴於正北方雲靄頓收本州復留真武展三日道場備香花道具迎送真武歸陳希家又於本堂啓建道場答謝至冬間果州五縣並無檢放苗數後轉運司體問因依奏聞朝廷續降回命下果州宜令置立照應記録於州衙大廳永遠為驗陳希除本州支與酒麵綵帛外特賜靜應居士為號孫隱遣蝗朝奉郎尚書刑部郎中知嘉州楊扈劄子伏見峨嵋縣令孫隱縣治公勤有數術救濟災苦第一考鄉村蟲蝗傷害早禾峨嵋縣雖有飛蝗不傷禾穗秪因孫隱付下呪水分俵逐鄉人用柳枝散灑其蝗盡化為飛蟻投水而變至秋收不失分毫檢放峨嵋山遞年有虎狼傷人孫隱發黃紙符牒一封給付峨嵋山諸管繫神司自後絶蹤第二考本路轉運使陶汾經歷偶風涎氣中孫隱將棗湯調藥灌之乃安第三考知州楊扈有新婦竇氏臨産驚危孫隱付到生硃符一道燒灰用水調下即獲平安緣孫隱任滿本州百姓涕泣舉留再任特召孫隱審問何術以成異功孫隱乃云先父太監孫宗道曾隨先皇太宗帝駕取河東夜在錦柄川遇真武真君傳授九件符籙呪水科目先父雖不行用隱從受恩一向供養真武欲誓行符呪水救人皆承真武扶助豈孫隱之能楊扈具劄保奏運使陶汾續有奏聞朝廷看詳未言餘事秪將消遣蝗蟲鎮伏虎豹乃是靈法護為褒顯其孫隱係蔭賜恩本無出身令特轉授光祿寺丞再就峨嵋縣一任其嘉州有真武慈濟觀是知州楊扈運使陶汾及市户報恩創立守卿禳蟲福州百姓林守卿寶元年中因為海商至漳州海口遇風潮其船看即沉溺不覺船頭空中現一神人叫言守卿今後休更販海今救爾一船驚危他日來閩山天慶觀尋南廊任道士相見言訖化白光不見其風濤頓息舟楫輕穩回歸福州遂入閩山天慶觀南廊詢問即無任道士房據一老道士云任字即人著王南廊有真武真君舊係人王護國殿守卿方悟詣殿禮謝因求極好沉香雕裝金縷真武一堂終身供養匠者方取沉香方圓可一尺三寸試欲斧鑿忽迸數道祥光漸漸光明不斷其功德完備守卿共約捨錢萬餘貫於州境及閩山宫觀寺院普設大齋重新修蓋天慶觀并人王護國真武殿奉安慶懺更不令子孫販海經商當年福州春夏大旱蟲蝗飛集侵害禾苗遍祈無應直至七八月間蟲蝗不息州府訪聞林守卿家真武祈求有感率州官來迎請真武就州廳逐日三時行道執禮虔懇才經三日蟲蝗自抱樹條而死四村人連枝折來呈驗逐日甘澤漸降遂至冬收所傷禾尚救一半州府慶謝真武啓大法醮畢準前威儀送歸守卿家堂其知州陳辭欽六録林守卿泛海蒙救雕造聖像紅光顯現及祈求雨澤消禳蟲災於是七州十九縣普護救濟保明謂實奏聞續準指揮其林守卿所置真武仰本州依價給换入京守卿從此進獻赴闕朝廷相驗係沉香寶座工巧外應現祥光及降福靈感實為奇異奉聖旨留納為鎮國珍寶入內殿供養林守卿特賜三班借職後來官至右侍禁年九十六無疾而終玄天上帝啓聖録卷之四
