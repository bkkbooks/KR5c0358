front:
  text: 玄天上帝啓聖録卷之五流五
  hash: sha256:bb346df24d65e40ef5bb496f9009e82cce7eb73a25552e9e244f3c49bd4ec3a9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0358_HFL_005-001a, image: hfl/0607/0607-046.png}
body:
  text: 消禳火德咸平二年司天臺奏定九月初三日火星合躔婁宿正照齊國鄆州分野大生火灾行下本州預宜禳謝縁鄆州係京東西路屯兵津要從四月間告示宫觀禳火道場設醮祈禱時市南李惟信充斗子牙人每夜三更潜於橋道要會之處燒香設拜一夜偶值都監任從遠出巡作犯夜收解鄆州據稱在外爲不肖犯夜自正月初七日夜因知一事遂燒夜香乃問何事惟信曰昨發心將一年解得牙錢醮獻天曹答謝衣食來處作散席齋會忽有雲遊道士衣冠不整風韻飄逸手挈圖畫一軸入來求齋是絹畫眞武像惟信欲求供養其道士便允秪取價錢兩貫乃就齋食至中半忽一聲風鳴不見其人但於坐卓上收得活龜一枚如桃核大惟信明知遭遇聖眞顯化降授香火兼得小龜靈異因寳惜供養今年正月初七夜方備下降紙禮燒獻眞武又見數年前賣畫軸遺下小龜道士入門惟信便拜欲問姓氏不說秪稱貧道能攻曆數筭得上界火星至九月初三日正照齊地鄆州主火灾燒至萬家如得一家姓萬不拘屋宇大小全門什物財寳不得移動分文先與抄録見數至九月初三日天明用一火命男子頭分丱髻身著緋衣手携火把從正南方繞屋三匝以火燒之至後更無火灾候畢即衆備上件屋宇種種等物酬還姓萬之人方可消禳貧道出門化白光不見惟信雖得聖降報說不敢申訴惟夜後從市中要處禮祝火星願免其灾今有隨身香火爐照證州府據牙人供狀看詳與近降朝㫖一同遂差公吏緝問姓萬人家將家産什物抄札見數責下衆户候火過填備文狀在案放李惟信歸家焚香保護既時日至裝一著緋衣童子將市西府橋萬明一家焚燒被南風吹駕燄起勢猛火分二邊人心驚駭不覺青天驟雨一陣火勢因息不經一時燒過萬家李惟信家眞武座下不見小龜是時趁風雨化去鄆州承此靈驗已行遣次又准中書劄子爲司天臺照見九月初三日火德已臨鄆州主於寅時燒除萬家取問曾不侵動官物庫仗等時兵部侍郞參知政事吴敏古判鄆州開拆保奏續降指揮看詳李惟信遇眞武救灾以顯宿德宜賜法酒百瓶絹百匹米十石麫十石錢百貫仰於本州公使庫支請并有萬明先肯全家代燒尅時消禳亦給酒米例物急令填造屋宇財物償還不得遲滯其有國家州郡承此眞武及南方火德尊星慈悲顯濟謹就在京玉津園建道場七晝夜設醮一千二百分位答謝折應計都至和三年八月初一日夜有黄氣出南方三夜而没據司天臺朝奉郞夏詢等劄子伏觀黄氣現於正南屬吴國分野其氣一名天門黄道二名土央三名計都現於磨蝎官天門黄道主次年國有内憂應在陰宫一人以土央爲墳墓之象計都是九天禍宿非時汎宫出現主一方軍民至冬後疾患人死四分猶得此星於磨蝎宫躔犯亢宿又是解灾福德之曜伏望朝廷早賜謙禳時臣僚參詳事屬未來合預防之謹就玉津園建内道場一月應名山大川並遣降御香投放龍簡建道場法醮各七晝夜仍頒行德音减除罪囚又於大内熙聖殿别致黄籙道場四十九晝夜每日聖駕躬幸禱祝計都星君及東方亢宿并家堂眞武福神保求休證道場日限將畢忽日正午時驟起風陣汎湧黄沙籠罩目前空中一金甲神人現於庭際稱臣是監西天門葛將軍與北方眞武同管陽間奏注善惡近見南方天門黄道開現乃是計都星君當游九天七百二十年一大周宫到此遇本運爲中方土央相衝作黄氣三日躔亢宿磨蝎方退主陽間内憂從屬豬陰人國長而起不半年間荆湖江浙福建廣南淮漢路人死四分墳墓遍道可應其氣灾雖未到奈帝德感驗建醮投龍等事猶未全禳惟德音一行减放囚獄承此種種功勳感動諸天蒙眞武憑此朝奏北極北極朝奏玉皇特蒙勑命天皇親往校察計都星君已爲官家禳解定下二十九歲命屬豬陰人一名新年正月初旬當死宜往正南方二十七里外衝黄道日立墳墓當爲内憂救南國諸州四分軍民死亡爲陛下折應計都之限至時切不得發哀爲此人命限已滿元注壽數今受眞武囑付特來代報官家知悉却返天門至次年正月初三日貴妃張氏棄世貴妃年二十九歲正月十九日亥時生命宫屬豬候黄道利日於正南二十七里立墳墓自後更無灾憂縁此應驗並賴眞武降靈保助天下感其恩宥及西天門葛將軍等神降報宜付有司賜在京諸宫觀各令建設羅天大醮三晝夜報答聖恩天降粟麥河北兩路自眞定諸州縣於建隆立軍後二載皆旱稻粟麥豆顆粒不收軍民饑疫流移轉死時磁州於七月初間據四門監守軍兵互報今有商用車乗駝馬般販到席子粟麥等各稱投官倉寄貨太守差官逐門接引其客續承都監張靜等公狀備說四門有席袋二千粟麥並無主者看守居民盡言見西門來者卸下席子垛疊了當各牽駕車馬向崇明觀右門入去餘三處無人知其去蹤但見席角上纏黄紙馬知磁州陳庸通判莫千之等至西門崇明觀集道衆取問客人姓名道衆對曰觀門荒弊即無車從入到本觀庸等問曰此觀甚代建立多少殿宇據稱始自前唐因天曹甘眞君謫凡教化青提道士修學之處後爲甘眞君白日上昇青提亦化去方賜爲觀内有三清殿北極七元殿甘眞君殿眞武靈應殿共四所殿除眞武殿常積到下降日軍民施利逐旋修營外餘皆摧損庸等差撥軍脚般運席子寄著州倉四門粟麥共計一萬斛磁州民間正乏賬濟不期有此斛物若從天降未敢擅糶須奏朝廷中書門下受磁州申奏又據本路眞定等二十餘州申到亦有粟麥到州與磁州無異却稱元從磁州販到今將逐州數目攢合共計粟麥一十五萬餘石先下諸州疾速賤價出糶仍勘會今來進到金錢雲馬顯是世間燒獻眞武下降紙馬分明遂遣御藥齎香祝版前來磁州同知通判等就崇明觀齋醮仍於内庭建報恩眞武御容殿乃下河北轉運司將元糶到聖降粟麥價錢重修一路州軍眞武宫觀仍改崇明觀爲護國聖濟觀特賜眞武殿爲靈應并金字御書所是内庭修建眞武御容家堂亦贈北方鎭國玄都殿額用表聖恩田生𦽏茨梓州梓潼山上清紫極觀是西晋葉華眞人修鍊遇太上老君來教淨樂國王太子金闕先生成道之處淨樂太子金闕先生者即眞武是也觀内有北極紫微殿是葉華眞人未上昇時親爲眞武縁化建造皇祐元年梓州饑疫死傷十至七八忽有一村莊老兒推車賣蒸𦽏茨居民競來收買喫者終日不饑往來貨賣經月餘人秪見從良苑門入復從舊路去吏部侍郞張昇爲梓州刺史差人潜地踏逐出入歸處據回報但見近梓潼山紫極觀前自然有黑霧遮接下見次日更不出來却有人相傳從良苑門外紫極觀前計十五里路傍田地盡生𦽏茨應一州饑民無不掘喫救過六十來日已接新糧粟豆之類出市其田士𦽏茨頓絶苗顆張昇遂備香幣特詣紫極觀朝謁因入紫微殿右厢乃見青草狼藉接繞眞武之堂乃令侍吏於臺座側取其草看盡是𦽏茨根苗再令人取却化爲紙灰飛散秪有初收得連苗兩顆遂用香合封盛備述因依赴京進奏准中書回降進到眞武救民應化𦽏茨已奉聖㫖賜入四聖觀宫下梓州於街市要會處期集道衆建攔街天曹大醮道場七晝夜普設大齋仍詣紫極觀眞武殿别修醮祭并賜殿牌以救化救民爲額鄭箭滅龜北京大名府天聖二年八月十四日黄河口壩頓破水打壞軍民卒難救時提轄官通判華惇臣等前去相驗壩基址巖穴下有一黑殻大龜兩目俱紅若或浮起其浪湍急壩索衝斷遂具中留守司後因宰相衛公韓琦守鎭北京隨行有指使鄭圭巡轄因到口其龜復出爲患鄭圭往看委是水怪情知容易除滅圭備朝服弓箭焚香禱告天曹一箭果中其龜仰落巖下波浪不起兵夫修完備至天聖三年正月三日鄭圭風涎候起卒死於廨宇經兩日還魂往見留守衛公云圭被鬼使二人前來云閻羅王急唤鄭圭不合射殺黄河口五百年龜精今負寃來訴急要證對及檢交籍鄭圭壽禄未盡又令二鬼押去過一山下見立一皁旗隊仗紛紜圭問此是何處鬼卒曰是下界風吥囉山常有天眞到此校量三界事務圭遥望隊仗間見石上坐者乃是陽間供養眞武圭趨進唱喏眞武降言汝陽間人安得到此鬼使具述事因眞武云韋閻羅行事躁急不詳眞僞其龜是西蕃夢雲城苑州土地昔被先朝師父陳忠元破苑州城隍驅牒其神蒙天符遣往酆都爲黄河第四砂水土地屬北蕃卓州因在彼則别無供賽遂化爲妖龜隨水而上至大宋界北京黄河第七翻壩損壞軍民計一萬來口天道不容合爲鄭圭一箭射死况地府未憑天文制勅施行令符吏懷吾足前小龜同鄭圭及二鬼卒返見韋閻羅若鬼妖亂有抵對即令符吏放出小龜仍告於地府其鄭圭壽禄未終兼圭主人宰相衛公韓琦乃是紫府眞人見判北京他日寳登慮爲不便言訖圭拜辭即隨符吏鬼使至陰府果見鐵籠軍其大龜左肋帶一箭呻吟銜寃二鬼使具言眞武教㫖是時閻王既聞即下殿仰空頂戴遂急令檢到制勅指實虚牽情罪合加所犯墮於江海爲推潮運砂四足無名水獸無形餓鬼其妖龜猶作人言要與鄭圭執對符吏於懷中取出小龜放金色光一道置於妖龜之前妖龜被光芒爍射爲一塊更不轉動被聖龜挾散於虚空中化爲微塵鄭圭因此還魂韓衛公爲避紫府眞人之號以致兵馬鈐轄王琮通判華惇臣等同狀保奏續降朝㫖下北京於黄河口置立護國眞武殿建醮立碑仍與鄭圭陞轉一資及賜衛公韓琦寳登堂額仍許隨行所至名館裴劍驅虎汾州横山嘉祐年中忽有一虎早暮當路傷人纔聞官司及獵户打捕則變爲五七隻遞相抵拒况是河東入京要路爲害及大因三水知縣楊宗道挈家赴任道出横山被咬去一女申州及提轉司牒差地分巡檢等與人防護添立賞錢召人獵捕時有雲遊道士姓裴狀稱能斷此虎本州依申裴道士去稱七日又來稱此虎非是眞獸乃漢時趙國諸侯張毅一家七口負楚兵殺戮於此山採樵人見之不認乃將七副死尸收聚一處埋在横山神廟後深僻處不曾有人踏踐因此遂成精靈又因天赦日承得瑶池玉液甘露入腹致變化爲猛虎要食人血肉欲邀使旆出城看斷此妖虎時知州李庠運副邵唐提刑孫康應抽帶兵甲前往横山坡嶺道士獨自深入忽天色昏暮風煙四起髣髴於雲端露現裴道士披髮執劍叫云李庠等不得驚恐已驅出妖虎七隻庠等即時頂拜知是眞武曾於唐則天時降應裴侍郞家誕生留此姓氏其妖虎七隻如被繩縛俱蟠伏於地哮吼數聲而死空中復有七人拜躍告報諸官毅等乃漢朝張毅家屬遭楚兵殺戮乆爲精獸多傷人畜合當碎除今蒙眞武將毅等從前爲虎傷人性命之罪求天赦解之留此七虎身皮賞謝諸官毅等已承天恩牒去東嶽判注生道乃裴道士亦於雲中隱化指揮獵户開剥虎皮納官汾州同提轉司具奏朝廷准中書指揮宜就横山特建眞武祠堂選道士三人焚修州司月給錢米要鎭伏此地令香火不絶仍立碑記當殿試法唐則天時殿前提點使南安軍觀察使賀全龍訓幼童五百習狐女邪法稱是北方七元神衆下降爲全龍驅使累於殿前用法喝起妖童乗雲下雨雹放狂風則天信寵之朝臣多被全龍妄奏失寵禄者甚衆時西蕃侵叛趙弘爲首纔軍陣相抵見彼雲生空中頓發火電或見龍虎群醜異狀趕逐兵馬中外奏請賀全龍用天元家童正法可用即付印授全龍帥兵二千至境與趙弘一陣折天兵二千行法家童五百並皆傷中手足不完賀全龍回程面奏則天請罪蒙賜免過續有告急趙弘兵漸犯界則天憂慮深切忽門下侍郞裴濤奏曰臣有男仲方十六歲自三歲出言成章於九歲夜遇天神教授弓馬臣將一家賤累甘保本男將五百步兵前去勦戮妖寇趙弘遂審問仲方正賜太常寺祝仍借授光禄丞統兵前去仲方直指趙弘陣所秪用劍光褁定妖兵數千獲趙弘於馬下仲方並不殺戮引帶回國奏曰趙弘妖術今被臣略施小法已擒本人見到則天退左右謂仲方曰顯卿身是北極眞武寄凡顯聖也未審殿前賀全龍受七元正法所用如何仲方曰賀全龍訓家童習玄綱狐女妖法用呪語使家童各於脚底以生硃寫其邪文遂至超騰雲漢傾降雨雹其法猶不如趙弘爲朝廷寵信以致諫諍臣僚無辜貶逐若不禁遏浸成大逆臣願與全龍赴殿階各進一法少釋陛下疑惑之意尋賜賀全龍同裴仲方當殿試法其全龍乃驅妖童五百勇進馳騁兩班文武莫不觀鑒然後仲方用淨水一噴其妖童五百於空中歛跡皆搐入仲方隨身劍鞘内全龍無所措手於殿前叫云告留全龍殘喘則天急起焚香語仲方曰念全龍是國母之親幸免殺戮仲方遂放賀全龍一命其五百妖童於劍鞘中發眞火焚爲灰燼仲方奏告所有前後黜責臣僚仍舊復官特賜仲方神應將軍所收趙弘等仲方亦奏請放還西域聚廳禁妖太平興國四年武安軍節度使尚書左僕射石光嗣移鎭洪州因聞本地性好邪法妖術雖曾禁約終不能絶切知俠道山祖聖觀有持法戒潔之士請到羅浮洞法師凌居邈來問因知洪衡潭鼎鄂一帶供養者盡是南神分差官員搜捉到習左道邪術馬用成等一百十六人當廳聚官取問據馬用成執覆本非齊學左道因爲江南荆湖地水接連蠻貊常被七十二候傷魂神殺行熱疫令人作事淹滯不利惟信左道法術施刀刃油火金剛法事驅鎭稍愈石光嗣令逐人齎出行術刀棒油鐺火熬等物並行毁納責狀疏放至當年七月洪州果有傷魂爲禍居民皆患狂熱食瓦屑磁石之類或縁懸屋梁或上掛林木或赴水入溝口稱穢言光嗣召法師凌居邈普施符水救治患人盡皆較損又慮後來狂患再作乃鏤板印眞武靈應聖號牌子一萬餘道俵散與人供養遇每月下降日誦眞武妙經積有歲月竟絶其灾從此去邪歸正石光嗣申奏洪州自南唐以前雖有宫觀而眞武殿宇香火至今未有三司禮部詳定合下洪州於天慶觀舊來眞武殿去處專委守臣如法蓋造仍賜御書殿牌以護國感應爲額石光嗣後往俠道山謁法師凌居邈受持眞武法式遂求致政歸趙州治幽居簡塵崇奉眞聖香火壽至九十九歲無疾而終妖惑柴邈眉州防禦使柴遜有弟柴邈年三十一歲爲右侍禁婚娶潞王宅觀察女夫婦不睦别置寢房其柴邈忽得患尪羸醫卜皆云邪氣入心纔見妻入房供應湯藥便生憎怨偶一夜兄遜潜往看覷聞邈房内似有婦人笑語之聲遂令家人守候天明入邈房開帳看俱無形影情知弟邈顯被妖孽迷惑再三詢問然後云二年前到聖水觀爲見西廊有梁昭王堂殿壁上畫執笛神女一人容格媚態曾用手摸其面手笑謂同行人曰待尋求恁地一人爲偏室此亦作戲何期此夜來謂邈曰你與我手眼來去爲定因兹契合一處至今每夜二更初來五更初去見有此人襴帶上香囊一箇表照將出驗認委是異物親屬收之繼來聖水觀梁昭王堂尋見其壁委有執笛彩女容貌絶色襴抹一角彩書消落尋將上件香囊輳依縫脉相合柴遜具析情由從登聞鼓院經由中書得達聖聰奉聖㫖送開封府施行蒙府司行牒下聖水觀令燒與本觀土地驅遣其崇爲患如故再行請到都道録錢君平用法造符籙文牒并金錢雲馬同龍圖閣學士知開封府包拯親至聖水觀禱告眞武將符牒望北燒之當夜柴邈房中不聞有人語笑聲經半月其聖水觀每二更時人聞西角如牢獄行杖拷囚有婦人聲叫徹響于外忽夜於柴遜門首大哭而唤柴邈言被爾誤我一身因眞武受詞搜捉我去勘問送京都土地經半月凌拷喫盡無限痛楚今蒙眞武慈悲免我鐵杖之罪押往陰山爲無辜女鬼三百劫限滿却還陽間神中受生今來報爾知委柴邈從此平復府尹包拯具述面奉聖㫖宣柴邈引見據奏臣願受差遣積蓄俸料普設羅天大醮上酬眞宰除依奏外賜玉津園内修建法醮普設大齋答謝眞武護國救民之恩魅纏安仁復州觀察使孫漸有男安仁年十七賜三班借職授鳳州龍門鎭監税兼巡檢到任半年形神昏耗語言顛錯公務乖疏致被州府差官替罷尋醫歸家其患不退父漸夜聞安仁房内婦人言笑不已方知是妖怪魅惑明早敦逼詢問不免說出安仁被鳳州龍門鎭侯家山土地湘花女相纏每至三更時即來直候日出時化爲塵影潜藏父漸聞此面奏御前奉宣差翰林書禁全科師巫行持法事凡經半月不能驅除再入奏進還其科遂至宰執公卿奏議孫漸家庭不曾供養鎭宅神秪却有他州山邪爲禍當發心速往道觀中求懇眞武救護孫漸依禀聖㫖親自寫疏詣四聖觀許願虔懇仍借眞武聖幀歸家供養將滿七日一夜更初秪聞安仁房内雙聲動泣至曉安仁如大醉方蘇言語全不顛錯安仁稱自赴龍門任巡轄馬鋪夜宿侯家山驛是夜三更不覺卧牀前燈火再明帳前見一美女冠衣異俗斂袂低聲云奴非鬼怪不須驚伯與安仁是宿縁合注定於此相候奴是湘浦龍君之女因爲思凡蒙東嶽降謫爲管山土地人皆呼爲湘花神女有半仙之分從此相慕豈忍相拆今來爲君父母請到眞武降宅有無限天丁力士日遊神道隨從㳂宅搜檢奴若遭檢録必受鐵杖驅斷永罰爲下鬼不能得處塵寰從此棄别歸侯家山臨行灑淚就髻取下碌玉小梳一隻令安仁藏於髮髻候奴再會欲此照證尋令取看委非凡物乃齎玉梳呈奏賜入内庫神器局收掌又奏願就于四聖觀設羅天大醮并設大齋報恩宰執等謂孫漸曰當時未信今乃果應委知供養眞武之家靈應不可思議陸傅招誣朝奉郞尚書司勳員外郞差充廣東提刑裴宗元因經韶州花蘭山得患如痁疾夜無停睡言語失次將理醫藥莫測其疾有一官員云向聞提刑到花蘭山來竊知此處並是屈死寃魂滯魄結聚於此山鐵風洞五道判官拘管在彼不少却有城下事神人獨孤立能持法調治不免唤至獨孤立纔入提刑司第二重門便云見一着緑衫官人抱屈銜寃守索提刑性命衆官道是甚神道見此清由獨孤立又云竊念立本是儒生昨遇眞武眞君憫立寒賤心慕道縁不虧孝義化爲賣藥道人爲立用藥點眼兼得文字一紙却是驅禁之術從此用藥救人無不靈驗獨孤立前設香案以時花淨水妙香供養眞武結下壇戒用黄羅一丈二尺以生硃書篆上清符籙望北呪勅焚香隨紙燒化劄下劍器上掛五方符吏六丁直壇法帶四十九事地輪四十九椀燈檢校司判官筆硯等呪誦楊枝淨水啓請眞武降靈叱遣直符齎持表信昇天通報持法既了囑付提刑宅眷如遇眞武降臨不得驚恐至第三日忽遇聖降從裏面撮出妮子來眞武案前附語云是棣州司法陸傅因爲裴宗元是本州通判縁與先父少卿有隙却將傅報讎計會秪應弟子裝誣於國忌日行藥有濫攝傅下獄非理鞫勘令招承遠逆罪犯凌逼負屈身死傅爲本壽未滿合牒花蘭山鐵風洞收管無由寃訴何期裴宗元來遊此山遇傅寃魂遂纏繞至今秪縁裴宗元禄壽方盛未獲便害其命今值眞武福神降宅搜追邪疾憫傅枉亡更不遣去鐵風洞就此用法水洗滌寃魂仰承眞武授記令陸傅面東朝禮本師金闕玄元帝師太上老君畢再託蔭於富貴之家爲男兒身亦服官職仍遣符吏齎持符命前去花蘭山鐵風洞計會所屬勾鑿枉死鬼名自後更無執對所附妮子即覺裴宗元當即平復將家中金銀錢物就廣州天慶觀修懺罪謝恩醮七晝夜并齋宫觀道士及謝獨孤立保明申奏朝廷續降聖㫖獨孤立可賜本州助教裴宗元從此修奉香火終身不替王虎中計朝請大夫兵部郞中知潞州充兵馬都總管錢廷年劄子伏爲潞州通判職方郞中姚孜不時在假或時發狂若與人交爭鼻口出血日夜不睡至平復審問又自不知但云如被執縛於林野之間有人理會性命事三年醫者皆調理不退後因轉運使陳寃說及東京五嶽觀道士宋之才用符法呪水治之宋之才見充右街道録入内備宣召難以擅請不免具録姚孜事由申奏朝廷蒙宣借宋之才法師到潞州姚孜宅遂令宅内設香案先燒符牒遣功曹符吏齎入天門報覆眞武願賜威光下赴祈禱之處然後將帶到眞武幀像鋪設淨水法物供養正值五月五日焚香守備眞武降臨令一書吏用紙筆伺候附口寫録約是酉時見姚孜披髮從卧房大叫一聲奔走出來香案下跪膝通傳云本舒州桐城縣主簿王虎慶曆初年姚孜爲太湖令因受差同往大雲倉般量上供米麥姚孜却受專監金銀計囑虚抬欠折正數小麥八十石時王虎不知秪隨情於赤曆日同簽押申本州并轉運司訖後來姚孜先知事發從太湖差人來送書并人事黑漆琴光鐵橐六隻遂問來人索書却稱渡江遭浪損壞及將信物看驗委是水浸浪迹其書浸壞不任開覽來人告覆且留下橐子客急回太湖别换書來請領回文虎不知是計從此留下自後不見换書人到驀被壽州勘院准勅前來追攝入獄鞫勘與姚孜等對認同情受過大雲倉般量專監金銀遂往王虎家取到姚孜人事橐子六隻洗刷辨認一隻是金五隻是銀王虎在獄方知陰中姚孜之計無由分辨因而氣塞衝心不明身死被姚孜推逃亡王虎承當却全出姚孜罪犯陽間秪謂王虎身亡照證無憑奈爲東嶽陰府禄壽簿上不注王虎枉死不當收管秪在塵劫無由解脱三年前於潞州夾岸遇見寃家姚孜相纏至今須要同往東嶽執對幸遇眞武今日下降已荷授記爲虎解脫寃魂得與姚孜相離蒙給賜照證文字往陰府注生從今更無讎執姚孜良乆甦醒延年等具奏朝廷姚孜遂罷官歸湖州捨錢二千貫入舒州靈仙觀添蓋眞武閣陳妻附魂淳化二年六月二十一日東頭供奉官閣門秪侯秦中立受差秦鳳路提點軍器秦中立一生侍奉眞武不違寅夕香火中立既受差遣將絹彩畫眞武幀軸隨身到京兆府參見判府陳儼言有子景仁見年二十四歲曾婚張氏方一年張氏染瘵疾死景仁傳染其患時似顛狂或喜或悲自歌自語有時聞得與其妻往來房内鬼哭神言敲打驚響遍求醫禁略無效驗中立曰今且歸驛當爲齋心明晨來看中立夜就館驛焚香掛隨身眞武供養先具誠懇奏知次日天明中立遂親手擎幀步趨入府堂將眞武幀像就陳景仁房室前淨設供養令陳儼合家虔誠捻香祈禱然後中立手携香爐入房看覷問景仁年幾生月受病時日因依録奏狀一通當日於眞武前用符吏紙馬燒奏至第四日中立在館舍内夜至四更聞人叩門云念奴是京城故侍郎張昇孫女因嫁陳景仁爲妻未滿一年染却勞氣沉頓著牀被醫人將作血隔調理誤投湯藥枉壞性命因此孤魂不收遊颺塵中日夜銜寃忽因景仁前三月間出城遊獵得與附託魂魄在身免在荒野遭界分土地驅逐今閣使帶眞武入宅對定景仁房供養奴被聖威逼逐無處潜藏蒙眞武慈德差使丁神搜奴魂魄面見尊神憫奴寃枉賜以楊枝淨水洗滌身魂仍得授記解釋寃債更不歷轉陰司今得託生鼎來羅宗傅太尉家依前爲女身特來報謝而去中立逐一記録往見陳儼其陳景仁遂已痊復如故陳儼表奏事因甘退三資本職并男景仁覃恩詰勅保明舉轉秦中立出官除授東上閣門使雄州防禦使及男景仁本授太廟室長並不追降陳儼施財五千貫蓋造上清紫極宫眞武立身功德殿奏請勑額續奉聖㫖特賜通靈普慈之殿爲額王氏懷鬼舒州金部員外郞王堯年有女年三十一歲肚懷鬼胎二年求醫皆莫能治不惟父母憂慮其女常自疑惑欲往後園自縊空中聞人叫云不得亂棄性命是汝五百年宿債何不去告宅神女子回顧又無一人遂歸家說與母所謂宅神者本家秪有眞武别無聖像乃請靈仙觀法師陳居巽就家堂結持壇戒遣發符使特詣天曹懇求聖降願爲王氏消除宿業免其胎腹合家虔誠守候法師報應時十月二十一日午時忽有椀口大小紅光暈遍散屋外盤旋壇前遂降附王氏而言前生曾與藥婆貨毒藥與人打取胎孕内有貴命寄胎遭其所毒又復沉墜卒無出期此罪當永劫罰爲恒沙毒蛇汝縁有此一世人身又遇負殺寃家在於腹中飲食血肉脹塞心胸欲害其命因後園取死之際遇吾隊仗今有香火感吾下降吾當爲汝永除此寃更無執對於今夜二更一點就汝卧牀前地點輪燈七七四十九椀替代一身用名香淨水紙馬供養至四更盡就彼呼女子小字年月日時連替代金紙燒與前生寃魂其胎不過月日自然消散居巽禮謝紅光漸散乃知眞武回馭堯年燒奏了畢立下疏契候女子胎患消散願將此宅并後園捨爲眞武降聖行宫其女果應月日平安於外有人傳播王金部女子遇眞武救濟其身必貴堯年見授襄州通判遷改新宅纔辦承舒州太守謝方平爲次男景祥議親遂納禮成結堯年面將宅并園興蓋殿宇計會舒州及監司等處保奏朝廷頒賜名額准中書劄子取問王堯年所捨園宅爲宫一力難圓又奉聖㫖國爲添造三清寳殿并北極七元殿仍賜降眞慈救觀爲額玄天上帝啓聖録卷之五
