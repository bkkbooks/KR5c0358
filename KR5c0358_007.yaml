front:
  text: 玄天上帝啓聖録卷之七流七
  hash: sha256:a1d8713ea57d5d2426d6554757680d3fe89ecb5b779d75a80e475c37f34d169f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0358_HFL_007-001a, image: hfl/0607/0607-138.png}
body:
  text: 小童應夢越州會稽山東有陽明洞天自文穆王錢氏建立龍瑞宫年深荒廢內有真武殿最為朽墮淳化元年二月一日夜文懿皇后玉華宫應夢見髼頭小童身披皂袍來見皇后云我是越州龍瑞宫道童為本宫貧乏無衣可衣無屋可存身遭暴露惟皇后可以救之他日必來報恩化為光明不見明旦具述奏聞時遣使齎香往龍瑞宫察訪內臣閻守道回奏本宫建自唐末經今年深全損一殿真武部從被雨淋日曝推倒在地因省悟前夕之夢是真武顯應來求后宫修整宫殿重興香火之意已奏取聖旨允許皇后發心將妝具奩寶兊换度牒紫衣及金銀等差內臣同委越年限一年重建殿宇及聖像裝彩完備訖忽為皇后染患翻胃四十來日醫理未退忽一日冥然而卧出入息微細相次氣回遂無嘔逆之狀自然平復乃曰適見真武從雲中來謝龍瑞宫並已完葺皇后命雖未夭病亦久矣遂令童子取到一淨瓶一淨盂於瓶內傾出五方甘露玉液於盂中勸令飲之遂覺醍醐灌心胸膈清涼厥疾頓除試開眼又如昨夢不見只覺口內異香四肢輕爽起居如常以顯靈感國家再致諡言重加勳醮用答神貺高聖降凡益州成都府青城大羅山上清玉華宫係國家名山洞天崇福第四處每年有金籙玉符真境道君上升遺文歲賜恩澤一十二道明道中五月五日成都府藥市成集至初六日須有十方雲水道人競來本宫赴初七日真武升天齋會常有神仙降臨度人顯化白日上升時有一道士裙裾下拖一龜尾人謂精怪皆嚲避之俄見此人與本州兵馬都監寇通男克明上在高峰之上衆疑被此精怪疑惑領兵衆趕奪其道士化白光不見克明不覺墜下因此矢心斷絶飲食又不言話其父寇通移任元梁城寨主因循七年克明同家屬寄居興元府至慶曆三年五月五日天未明時克明違家潛迹不見却在益州玉華宫復與舊年帶尾道士同行本宫請二人赴齋至食遍秪見克明不見同行道士衆皆驚愕食至第九味有一大龜忽然在克明座下乃乘克明離座直上空虛祥雲四合克明坐龜上升其父通又於元梁寨見男克明來辭今已授下北極七元勘壽司判官蒙我師真武令大龜乘載朝天矣後成都府申奏今年藥市上升人姓名準回降指揮取問克明有何功業據寇通具狀稱秪有此男元將錢帛於經過道人處買得為子逐日好修養看老子道德經愛燒夜香朝禮北極常持誦本師真武尊號不食禁忌之物多持齋戒不行纖毫欺曲之事又準中書劄子指揮看詳四方異地常有如斯高聖應迹降凡度人上升合下成都府建立祠殿令道士焚修立碑為記特封靈顯真君并用靈顯祠為額及契勘克明祖父鄉貫係屬西京乾濠鎮仍就本鎮亦立祠堂七從借名尚書刑部郎中知瀛州事高陽關都總管陳疇劄奏自前朝興元四年五月內却有北蕃郎官伊壽先兄弟七人執到兩界公憑車載氈帛香貨五萬餘貫來投榷貨務出賣欲將賣錢權寄官庫候歸蕃計會後次貨物到來般取前去可及一十五年並無消息後因太祖登極郊天恰限瀛州缺賞給五萬餘貫無計借貸不期本人前來陳狀願將其錢與官中支遣賞給從此瀛州委憑借支已得均足時高陽關刺史鄭度遂唤伊壽先等七人取問因依所寄此錢即非壽先等財物係興元年中太祖仕於世宗時曾為帥守瀛州忽過太白星化為白衣道士勸諫太祖集道德仁行向去貴顯非常矣太祖乃曰天曹有何靈應助身貴顯道士云沿邊有逆虜叛臣故朝廷委託收戮今姦叛潛息皆是北極真武暗中護助言訖其道士化白光歸天時太祖就瀛州設大醮七晝夜燒獻天曹諸位紙幣外燒金紙五萬貫有餘却為天曹點對此項金紙五萬餘貫不當受領遂付北極行遣係佑勝院真武牒七元北斗七辰掌計其伊壽先七人即是七辰下七從大宋啓運立極蒙真武面奏三天詳將元不受醮錢還新宋充登極沿邊賞給因差七辰借北蕃廟名為伊壽先將錢化買氈寶等物約五萬貫寄州納還此去蕃界百里有廟名壽先廟係四聖祠影其真武部下有七從官各緋抹額著黃袍手執青魚腰繫白雕腳踏皂靴謂五方五色七元七辰充真武管掌天下善惡公事即是壽先等七人之形相也取問訖壽先等當廳前如驟風一陳不見時知通等結罪保奏續降指揮先將其錢充支賞給外候别行勘會施行二真顯化觀文殿學士新差知真定府充河北西路兵馬鈐轄兼經略安撫使石光祖因受差路次澶州界夜宿圓通寺聞寺中有一道者本是鄧州武當縣人姓郭自到寺十五年未嘗與人言話秪四季布種新奇蔬菜供備齋厨光祖同知事僧夜到其寮乃出迎接歸寮坐道者忽開言告光祖曰觀文莫赴真定之任緣期限已至見面部氣色秪數日事寺僧聞之驚疑至來早其道者不見蹤由所有菜子亦自變為常種者因而光祖不赴真定就此上表求致仕歸趙州遂於此日辰時忽索湯澡浴仍换朝服卧於淨舍而終澶州太守發奏未到闕而光祖從空化形先至崇政殿下見皇帝奏稱臣至澶州圓通寺得遇舊日同行郭真人隱身為種菜道者十五年於此候臣今當去矣臣光祖乃是北極真武真君下副參謀中元真人今郭真人乃是北極檢校使其人當墜二七之年臣本謫六十年遇甲子復歸元首臣若不來辭謝皇帝三十餘年重祿優恩於後恐難面聖兼臣有子庭之雖受官在身恐愚騃未任事伏望聖慈憫念拜辭而隱相次中書進呈澶州所奏頗合適來現化事意分明仍贈太子少師并就澶州圓通寺立其顯化石郭二真人殿宇奉聖旨改圓通寺為敕賜隱真承天觀仍立碑記索錢二萬衡州衡山南嶽嵩陽觀係唐賢柳宗元施財建立真武殿閣一所工巧高聳本路第一自住持吳筠以後本閣收到遂日看經開殿施利錢二萬餘貫日漸聚積前任發運副使錢操擘畫申奏權借真武閣收到施利錢二萬貫分往潭澧等州充上供糴本錢操經五年再行發運事忽有道士投狀稱是南嶽嵩陽觀徒弟為真武閣損漏欲重新修造告索前來借錢二萬貫操云此是國家借用何緣要索投狀復還况嵩陽觀真武閣本是基址弘壯驀於近日自然斜側亦無徒弟往運司陳狀理索其錢操從此染患遍身白癩疼痛呻吟遂退官半年忽夜夢見南嶽道士吳筠帶領神人趕索二萬貫借錢操方省悟將産業出賣盡數支還元錢願求保安身位才起此心癩病漸除亦不夢人索錢不逾月安愈親往嵩陽觀禮謁真武未般錢入觀其閣尚猶斜側至送入本觀了當一夜風雨大雷一振其閣聳直如故錢操復官為翰林面奏上項感應事迹奉聖旨賜南嶽嵩陽觀加贈真武閣敕額靈驗金字牌等如後積聚錢物官司不得借兊翻鈔四千饒州鄱陽縣明化宫道士黃宗古因隨師朱世元往洪州俠道山從此覺悟潛走西川雲遊八年至大中祥符五年十月內為明化宫遺火焚燒罄盡秪有東廊一小殿見存乃是真武殿並無煙焰侵迹忽準本州關報仰收官錢四千貫文抵擬支還明化宫黃宗古係在京先納寄庫鈔子錢椿造明化宫使用既承指揮勾集明化宫道士朱世元等取問稱本宫雖有徒弟黃宗古雲遊八年不知存亡那得預知本宫遺火因何有錢在官難便信憑不逾旬日黃宗古親執饒州翻换便錢公憑歸來并更有金銀祠部約一千餘貫謂師主曰昨棄師雲遊入梓巖山逢一道人邀宗古到草庵中對話貧道有願在心終未能了聽吾囑付吾知饒州鄱陽縣明化宫至祥符五年十月內為火德星君躔入陳國分野正照饒州一郡縣鎮同時合遭火災蒙真武面奏北帝及火星曰饒州地善人慈今當火運伏望聖慈哀憐減降今觀近郭鄱陽縣有明化宫內三清大殿後壁畫饒州諸縣境邑地里圖若將明化宫不害道衆焚毁祈當一郡火災必須應禳得過火星聞此不敢拒違自問真武曰此處曾有真君香火殿宇無答曰有因而歎念真君乃金闕上清老君弟子應屬森羅天主候明化宫降火日當為存留本殿也至時道行奔走避免竊恐無人興續宫庭可請宗古去汴河一帶緣化真至東京聚蓄錢物歸鄉修蓋吾乃鄱陽故人候歸明化却得相見遂遣宗古離庵行數步回視更不見庵亦無人迹宗古恍然如雲霧間出得梓巖復到泗州汴口從此將隨身西山十二真君籖一百二十道手携真武影幀發心起賣籖卦每一籖四文道術盛行逐日般費之外常有五七百金所得籤錢逐處買金銀寄附前後經六年約聚錢及五千餘貫寄留五嶽觀忽一日路逢饒州商販之人來報宗古稱明化宫遭火燒盡所以將上件錢物就在京納於官庫出給鈔子憑據候歸饒州鄱陽縣支會及至歸鄉其宫果遭火災惟留真武一殿宗古又自細認本殿立身真武面部與在梓巖山相遇道人無異道士朱世元等遂赴鄱陽縣請領元寄納鈔子錢及將到祠部之類出賣不逾五年鼎新復建明化宫一所了畢據黃宗古從始至末其前項緣由經饒州陳請别行記録其時知燒州謝懋等特具保明申奏朝廷後承回降改明化宫為寧安宫其道士黃宗古號通祥大師賜紫并舊存真武殿加賜護國二字水雲護笈單州求食婦人楊素真因在京散祿右職袁清往來其家見伊别無親屬却有奩具等物遂誘引離鄉泛舟孟陽湖夜宿葦岸袁清飲醉素真推墜深潭謂伊必已沉死急唤梢公等人言縣君因醉渴叩船取水失身墜落却令移蹤撩救虛發哭聲速要回州作功德追薦既到濮州將素真奩物約千餘貫典賣互用在此居房半載忽於街市見一布衣婦人念經求化袁清見之將謂是揚素真魂魄噤口不能言當時素真叫報廂巡解送州府下所司根勘據袁清招伏因問素真如何得命次到濮州稱自祖任班行不幸父母亡殁因居單州流落風塵雖身係娼婦而心實慕善常時供養真武逐日看誦道經後於天慶觀求施金書小字真武妙經一卷用綵帛袋子帶在髻根頭繻內不曾離棄是夜被袁清推落急水中但覺如雲霧身泛虛空頭頂上似有鬼神光輪旋轉叫云護持寶笈至天明神鬼散去不覺身在湖岸草徑全身濕透惟所繫金書經符不濕在近人家憐憫素真唤引歸家整救蘇醒詢其所在却是孟州界分從此賣衣裝换布素誦道經求日給因經歷河陽濮州不期遇此寃家若當其行意之際無髻內之經即永沉水底作無主屈死孤魂有何出期今濮州看詳袁淸情法二重具奏朝廷準中書批狀其袁清不許用官引赦依法施行素真請得餘剩物件兊買祠部改名仲嚴投禮慈慶宫女道士湯晉通出家披戴從此發心出街緣化建造三清七元二殿及創真武寶閣天宫慈化轉輪法藏依金書救得自身真武經本子印施五千卷又蒙宰相向公具奏奉聖旨楊仲嚴特賜紫服并賜慈慶大師號仍改賜宫額為護聖宫風霧卸函駕部郎中王衮致仕歸宿州因悟殺生發心寫道經一藏募到陳方等十四人逐日對真武像前各令精潔端楷不誤一字內有周惟吉敏捷稍倍寫於餘人驀然惟吉右手患風筋脈拘急用筆不前其經卷不住裝寫漸得成辦陳方等十三人寫下經卷各曾對校唯周惟吉一十七函為王衮憑託本人更不勘讀一例裝入函當來發心捨入太清延福宫緣本宫係內道場合先奏聞蒙聖旨差到內侍任奇等監送延福宫為未有正藏權寄真武殿安著才開殿門忽有黑霧遮障狂風旋轉良久風霧雖息用案排疊經函忽有全函卸落纍次裝疊不住王衮遂將卸下經軸看覷俱是周惟吉所寫王衮驀聞人在身畔言云盡是作偽貪工漏落因緣功德不備又無人在左右秪有泥塑直符背立王衮自知非理遂借真本勘對脫落稍多就覓書生填寫補换再排入殿內其周惟吉所患右手瘡腫膿蛆滴瀝緣市求丐稱云因與王郎中寫藏經欺曲瞞隱誤嫌因緣見獲果報時內侍任奇等知得因依入內面奏奉聖旨就延福宫建造藏殿安著王衮所進道經籖詞應驗雍熙中越州大禹廟祝詞令官楊昉一生供養真武常為州民燒獻香紙保求事無不應時户部侍郎陳疇守越州忽蒙急詔赴闕陳疇疑懼未決吉凶乃唤陰陽人占問從人取覆有楊昉事奉真武詳解籤詞最可準託尋往乾明觀真武觀抽得黃真君第四籤楊昉消詳云此籤主一百二十日內惡死切不可向東北鬼門上受權勢及為旌騎統領行軍陳疇大怒將楊昉枷禁候一百二十日有纖粟災禍情願將一官奏换楊昉恩澤若限外無事即仰本州勘招擅興扇惑前後取財入己論贓依法編配其後限過已久越州準敕疏放楊昉授本州助教準前充禹廟祠令其陳疇到闕授鄆州安撫兼本路兵馬鈐轄收齊州虎頭山何清等逆黨疇受敕未去間思惟楊昉斷籤雖未全應似乎有驗緣鄆州正是東北鬼門又充本路鈐轄亦是統攝兵馬旌騎之意因朝辭面奏前項因依遂徑往虎頭山收何清等却於前路遇夜遭何清等迎敵軍隊衝散疇夜黑乘馬奔走被馬蹶蹄墜於深濠自知其身如被垂髮神人連馬提起在岸復尋元路就佐官軍馬次日整頓前進遂斬戮何清等逆黨却回京師不赴鄆州差遣從此驚恐失心染患尋醫再進劄子舉奏楊昉元定危難全賴真武救護以此保奏賜楊昉前項恩澤仍令越州就郭立真武殿宇陳疇自備俸錢就乾明觀修齋設醮報謝真聖相術指迷宿州致仕駕部郎中王衮再蒙詔充國子司業遂於家堂回奏真武求籤得吉乃進程忽於汴河塘岸遇一道士只揖稱攻神相王衮邀上船獻茶乃問高隱何地道士云是華山雲臺觀徒弟姓裴王衮以一百二十金欲求一相裴道士云氣色喜盛須遷編撰衮曰見受司業亦係國家制撰又問官職位壽所至道士便起上岸回首云但記在後不可受史閣之職與庚辛方為事若受之主死於餓雪骸骨不收道士向東而去更不受資王衮不以為事後因西域不寧時全臺保舉王衮可充奉使其王衮元授駕部守司業今權御史大夫充天章閣待制衮甚有喜色忘却道士之言迤𨓦至西鄙蕃君李萬全宴會間出言相諷纍遭玷辱將及出界回國慮負辱責却説誘從人潛馬走入羊山連被雪壓向巖穴中旬日不食忽見裴道士再來曰吾非凡人乃汝供養真武也汝若依吾指教莫授御史大夫天章閣之職則事亦可免庚辛則西蕃方所雪中當餓死正是今日為之奈何吾且去矣衮悔已不及遂死於羊山骨殖拋棄從人忘命歸國有司取問進呈契勘王衮本非奉使不功乃屬前定若真武相術明指迷徑自不知避故喪其命其生前權借授御史大夫充天章閣待制今來更不追還贈同正賜并依品官例支賜招魂禮葬胡清棄業東京咸平縣胡清賣熟食為業因五月五日燖殺雞鵝偶然刀在手中寸折物命不死刀反傷手湯湧出鑊胡清自知殺害禽畜非理因此棄業欲走上京别求營生在路值夜又遭大雨入一古廟避雨止宿約三更以來見一披髮仗劍金甲神人叫起胡清還知有無數物類寃魂隨汝左右今不敢入此門來汝後尚有三十年天祿切自愛護言訖踏龜蛇向空而升清遂驚起覺天朗月明回看廟中並無塑像并畫相秪有一碑額名鎮國真武之祠及到京師月餘褁足罄盡思惟在路廟中真武喝言向去三十年天祿此意除是充軍於是就驍勇習武藝不過二年遇國家殿試呈過弓馬鎗棒等種種絶倫於一千人中蒙御筆點為第一先賜三班殿侍出身又宣臨殿降問有何異術并何處習武藝如此精熟胡清具奏遇神人露現喝報今日之事一一應驗從此又加轉三班奉職久任邊庭轉至作坊使曾任潤州都大巡檢胡清終身侍奉真聖香火仲和辭吏天聖八年京西許州吏人楊仲和差往蔡州勘鞫枉法斷朱惜姐臀杖十三後承勘官通判徐沂理會課績轉官未該酬奬在許州天慶觀設醮保助轉官請道士裴君叟拜奏青詞君叟手擊青詞拜伏案左約二時方興與徐沂云謹齎詞文詣玉皇金闕投進方到三天門下遇見北極紫微大帝領佑勝院善惡副判真武靈應真君奏事見君叟來投徐沂青詞蒙真武賜言曰徐沂勘蔡州錢舉等藏匿家財二十餘萬計囑官司枉法勒有分親弟為外姓被楊仲和將干證人朱惜姐故入杖罪為有此負屈所以陰空不令從許見今定楊仲和等罪惡欲呈奏玉皇令君叟就此投下青詞急回自後徐沂任滿離去楊仲和從此辭棄吏門歸家誓修善事解脫罪惡因贖得真武聖幀三時香火長齋稱念真武尊號逐日接待僧道及孤貧或有人家死亡無力津送仲和即典賣物件出錢津送自此家道淪落妻孥死亡又將幼子賣與李員外家得錢六千亦施與人州郭有居士之稱經二十年皆藉親知照顧遂居僻巷一心供養真武忽遇一貧道人相過曰汝本吏人罪惡如故何得悔悟棄家守貧奉聖無怠觀汝悔心必感天宥貧道有一册文字借汝傳之此術可以資身囑付畢道人忽不見仲和開視乃西山十二真君籤仲和遂置竹籤一百二十竹筒盛之真武像前不及旬日民俗翕然來占靈驗如神如求一籤必當三五十金或留一百文相酬至於州官俱來求問忽有本州新任司户李成道尋訪楊仲和稱是所生父七八歲時賣與鄰家李輔之十三上受所養父祖李中立侍郎奏蔭恩澤十九上銓試注授本州司户因知骨肉並死獨有親父揚仲和所以令人尋認皆稱近亦亡殁所有衣物除葬送支用外盡抄劄入官李成道聞此涕泣遂於寺觀修建功德薦悼一日李成道黃昏獨坐書院中見一老人道裝立於空中謂曰吾即汝所生父楊仲和矣汝身受貴汝宜忠正吾因悔過皈依上真得真聖傳授西山十二真君籤拯濟衰朽今已壽終蒙東嶽照牒稱諭仲和身心正直授麻溪注祿判官又蒙真武授記候此差遣了當許為七元勾當吾秪有一事未滿心願吾生前供養真武幀像并籖供具什物沒官見在軍資庫塵垢之處可收取上件聖像等物歸家志誠供養必助汝善果言訖潛隱不見後官司估賣其物成道贖得於廨宇逐日供養忽一日朝廷置內臣袁良弼因皇后久患心氣齎香往武勝軍仙圖山投獻金龍玉簡法醮經由許州同知州羅宗孟因見衙庭西南有紅光罩蓋屋宇令人探問稱是司户廳有官員士庶燒香瞻看一舊畫真武像并籖一筒紅光覃定不散時羅宗孟同袁良弼往看良弼試將投龍聖意祈籤抽得鍾真君第十大吉籤良弼親録奏聞緣文母太后已得夢漸安據録進靈籤却與應夢同意行下許州取會後李成道被本路提刑余斌用威勢迫脅求真武幀像并具事什物才到斌家畫絹片片零落化為蝴蝶飛向空中所有竹籤一筒先蒙朝廷索去今大內寶應閣下者是也其成道奉聖旨許還本姓楊轉授光祿寺主簿仍贈楊仲和為悟本府君楊成道才得轉官亦死今許州見存楊府君父子祠堂祈求有感良嗣感祥荆南府左班殿直孫良嗣一生供養真武委有精虔常獲神貺因觀俗廛多殺物命每自思惟皆是輪回何忍為之常出市肆見人携賣有命之物便須買歸或飛禽用籠罩或魚鱉用水器聚養至天明人未起取出拋放經十五年良嗣自然達理悟性凡所作為並有奇感人皆號曰孫先生忽一日無病而卒卜葬荆積山南開墳有衆鳥銜泥裝壘土塍地穴出水池化生魚鱉地生芝蓋下槨時有五色祥雲覃映四向荆南府應係官庶僧道盡集墳所以香花幡蓋螺鈸法事祖獻時知府諫議大夫章庭老亦崇道奉真步至墳前有一小竅現出龜蛇盤旋喜躍乃知孫先生終歸北極真武之佐矣應現靈物移時自然不見州府地境既有異人感諸佳祥理當具奏朝廷續準中書劄子令於孫先生墳所造廟刊碑記其聖應行狀贈孫府君廟為額玄天上帝啓聖録卷之七
