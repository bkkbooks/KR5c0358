body:
  text: 元晏悟化潭州年例衆户率錢起置三月三日四月八日六月六日八月十八日放生社會康定元年三月三日伏值眞武生辰預先收買飛禽水族等活命籠器盛貯於祥福宫至日遍市迎引臨大江讚詠放生其飛沉之物或向空復墜或水面仰浮社衆用人撩拾逐一取看爲飛禽者或被膠網粘罩弓彈獵射各有傷折爲水族者被罾釣張取籃羅採捕鱗甲頭尾皆有破損衆皆慘然候齋罷散分靜僻郊野且得城市之人眼不見矣社衆回宫赴齋宫主道士周元晏升堂講演眞武經一遍時會中忽有雲遊道士請問周元晏曰幸對十方海衆在此證明願垂開示此會因縁使學人有所解悟元晏云潭州一歲有此四會今日此會乃是眞武靈應眞君生辰外有四月八日是釋迦佛生日六月六日即東嶽泰山掌命府君生日至八月十八日乃是四海九江龍君神母慶會東海校量水族之辰並收買禽魚活命等物出籠入水名放生會學人進曰非名放生則是故殺誑殺昧殺貪殺元晏曰何謂也答曰既不是殺其今日放者皆不飛不躍何也飛禽本生於林野魚鼈蜆蛤皆産於江湖二等乾濕性命與人無異除當死償人厨食湯火之債自有受者還知因有此會致令物命屈死者多故使愚下之輩不避罪業秪圖眼前財利百般計校日夜打捕守待積聚饑餓迫切萬無十生十無一活設有存者皆傷中之物是爲故誑貪昧等殺遞年如此實是造業何謂化生况眞武乃高天北極正直治世福神豈受人間私殺爲獻元晏無對遂下座揖留其道士欲詢姓名不覺隱去更無蹤由當時却見所收放不去禽魚等物就籠器中各變白光向空而去社衆咸睹知是眞武垂慈愍惻生命親自降靈廣施教化誡其殺害潭州從此罷放生改爲施貧會時知州陳襄申奏承朝㫖將此事爲驗送有司删制放生爲殺害無益誡文印賜臣僚及宫觀寺舍遵依奉行王衮烙鼈宿州有比部員外郞王衮受太平州蕪湖知縣賦性剛執貪嗜滋味常將活鼈用火烙生取其肉却入磁器烹饌有男長修累次與母親勸告誡食終不允從忽值三月三日縣坊興集放生迎引社會往朝元觀獻紙王長修往看問觀主道士承子堅曰多見放生社會就四月八日於寺院興集何爲三月三日却來道觀集會承子堅云三月三日乃眞武降生之日普通善識於是日如法供養俱放鯉魚鼈鱓之類此是眞武大避之物縁鯉魚屬北方癸化至夜朝北頂盤七點鼈如神龜鱓類聖蛇放此三物表無殘害之心各要懺罪消灾求恩護福長修聞此歸說與母轉告其父衮一向執迷不從諫勸長修潜於承道士處轉求眞武畫像及傳下降避諱等式歸家與母親妻兒别置一室供養漸至年深王衮轉駕部郞中充邢州巡轄獨往赴任將至中路於馬前見一道人曰公莫是駕部郞中王衮前赴邢州此去正是郞中負命之處衮欲再問道人潜身不見衮届邢州思慕魚鼈供厨縁邢州不産此物遂至决責從人無明杖楚自後染患漸至經纏醫理不差忽夜叫言被無數帶殻水旌銜寃纏繞索命咽喉喘躁四肢痛楚坐卧不得死生無門因此痛悔中不覺右手五指上如被物咬疼不可忍忽失聲叫眞武眞君一聲覺氣壅喉胸遍身極冷漸有喘息良乆氣和乃云衮爲性剛執自小好食火烙鼈肉不依妻兒勸誡供養眞武後受此差至中路遇道人言前去是負命之處衮愚頑不悟遂遭此疾痛楚難忍又覺於迷亂中急連稱叫眞君求救忽覺其身在一山上見眞武眞君前列數行負火刃鼈類銜寃索命眞武遂指衮曰汝恣殺物命以充口腹寃家業鬼相隨無由解脫汝被天地水三官下降察知罪犯損折二十年壽禄合於邢州身死縁汝有妻兒剋苦齋心事吾香火晨夕發願懺悔秪爲汝殺害啗食之故已爲申上三官令特與汝解釋所殺物命一一令託化轉生水府永無執對仍與汝奏録重注壽禄如故衮蒙眞武授記病苦頓消因縁奏聞朝廷陳請致仕誓誡葷殺修奉香火看誦眞武妙經十萬遍并寫道藏經典捨入東京太清延福宫華氏殺魚興化軍程嗣昌少爲商賈性剛氣傲不崇三寳不親鄉友衆皆嫌惡嗣昌賣買不使輕重斗秤不虧他人價直不曾用心秤量人物不慕烹炮少食活物偶客於密州板橋郊西鎭此地多食鸜鵒鴣鳩喜鵲每日街市煺剥無數因出郊遊行見人或擎鷹鷂或挾弓彈或張網羅不忍觀之回歸城中夜靜露天於星斗之下發心蔬食命工刊板印施戒殺圖一千本適值十月上七眞武下降乗此聖力普願人心回改有脫務攔頭彭景最是好喫酒肉之人亦受一本歸家讀向妻子華三娘却生嗔怒用手碎棄於穢濁之中次日華氏買一黑魚方用砧刀如被人把定雙手其魚跳起尾稍刺入眼中如中一刀滴血在地化爲蟲蟻沿上牀席咂啗華氏面上鎭市傳播秪因不敬誡殺圖文立受惡報忽一日彭景酒醉於市中見嗣昌便出言毁駡稱板橋自來無人誡殺亦自安樂你是興化客人亂施文字壞却我妻一目用手拖拽嗣昌意欲作鬧嗣昌脱走歸房思悔時監鎭向孰與巡檢宣旦聚廳見嗣昌脚懸地面三寸許浮空行立於廳前附神而語吾是眞武眞君向孰等備香設拜遽蒙降言吾見此地居民累劫好食飛禽業障深重有興化程嗣昌印施誡殺圖是爲最上善行秪今華三娘不能信受因殺黑魚反害其目不獨此人受報凡好食生命不悟因業等人難免殃咎嗣昌恍惚化去不見形影方行詳究忽據鎭厢申報客人程嗣昌無病身死監鎭等聞之驚歎華三娘患眼在牀纏綿半載方得命絶向孰與宣旦得替歸京將此因縁鏤板印施勸誡殺生仍終身崇敬眞武香火致上達聖聰蒙宣向孰臨見逐一聞奏奉聖㫖謄送有司照應曾謚眞武靈驗云三元一神通應十門煒赫光祥咸眞滅㱵朱氏舍利袁州有左班殿直充筠州監税朱良恭到任一年身死家貧無兒秪有一女同母挈喪還家不逾年母亦死其家祖來供養眞武其女朱氏爲鄰里求親並不以爲意鄰里等人却誹謗毁其不正之事朱氏遂於眞武前發誓至死不嫁人願得一患在身爲殘疾之人方絶外求年四十忽雙目失明亦不召醫從此無人求親天聖六年九月九日身死既無親屬官司須當檢視袁州據司理趙平取覆其朱氏屍首不容檢驗前有烏龜後有赤蛇沿身遮護時知州何𤤴通判王堯臣親見此異事遂召僧道祈告欲退龜蛇即爲殯葬其龜蛇驀然不見差四鄰買棺盛貯尋問侍妮陳菊香據說因被人求親逼抑不允將事誹謗以致發誓不願事人逐日禱告眞武降靈爲兒照察在失雙目不乆無疾而死肉體顔色與生無異臨終時秪言將我屍就壬癸方火化何𤤴契勘九月九日正是眞武下降之辰朱氏偶然而死有龜蛇衛身稱化於壬癸方切令依從焚化纔發火其朱氏化身於雲端告衆云兒今不入六道轉生於沂州劉籍家不二十年但記有劉生名播天下見有非毁兒身不正之事任一火焚之乃可辨認告辭而去火過骨有五色堅固舍利光明粲然衆皆求請供養向者亂生誹謗等輩並口患癰痔膿血臭穢各詣眞武殿哀告懺罪漸獲安愈袁州人家遞相戒忌非飾口過受持眞武香火太守具奏朝廷承回降下沂州勘會屯田員外郞劉籍妻九月九日丑時委生一男事無虚冒准中書指揮本州支官錢就天慶觀眞武殿建醮并就元北方化處權立照應准備向去檢認異迹施行梁公冠簪磁州有倚郭清泉女冠道宫戒行清修磁人敬仰與天慶觀相通磁人凡有醮筵法事看誦經卷俱請清泉宫女冠爲天慶觀道士妬嫉買囑群小逐日攔截宫門纔見有人入宫請召修設遂來攪擾兼起謗言因此漸次無人來請召修設有女冠梁寂眞年十七歲曾授北極法籙持課靈感遂早夜發香對眞武像前哀訴伏願速彰報應尋有刑部員外郞黄勉新知磁州赴任將近城夜宿平原鎭驛夢見一人紫袍金帶稱吾是清泉宫北極殿掌籍判官爲見磁州知通佐官皆不歷事惟務欺曲且如清泉宫見被天慶觀道士妬毁阻絶檀信如明公到任須治此枉屈黄勉驚覺記録到任兩月餘偶過清泉宫入謁北極殿細認著紫判官顔貌似前夢中之人黄勉歸衙遂指揮軍巡等言與清泉宫事件限半月要見公事將及限滿有村落社衆六十餘人年例來清泉宫建保田蠶法醮其夜復有浮浪之人結集成群趕逐社衆被軍巡捉到莊花三等十四人押下訊問及勾到天慶觀道士陳有章二十六人勘招州司量與科斷惟首惡陳有章并莊花三並與編配奏裁黄勉又夢前日判官告說爲天慶觀亦是奉安北極四聖香火若將有章决配有玷吾教不須申奏朝廷黄勉遂令結案疏放陳有章其莊花三編管别州不乆梁寂眞染患瘡痍臭穢身死葬于東門外官地經半年因通判蘇應之出城相度窑務聞臭穢襲人其地皆稱清泉宫葬梁寂眞在此蘇應之立追清泉宫主首姚寂冲等移往僻處藏殯便令開土但棺蓋浮懸一道不見屍首秪有冠簪一條及赤蛇碧龜在内所是臭穢變爲異香應之焚香拜謝遂取龜蛇齎見黄勉因詳梁公在生崇修眞武香火故得尸解之道獲顯龜蛇異事宜送清泉宫眞武殿供養三次送入殿三次相纏出門臬外張口有傷人之意黄勉即焚香禱祝莫是别要添置香火待奏朝廷别立殿宇其龜蛇即迴旋入殿一陣風起龜蛇不見本州開析保奏續降指揮令守臣支上供錢如法建造眞武殿并立梁寂眞祠堂贈通應妙化仙師自後本宫興隆教法大振天地垂鑒廣南賔州衙宇有伏屍精怪前後官員不肯注授非自身染患則兒女死亡雍熙中有禮賔副使楊從信一生慕道書符篆籙爲人救冶疾疫侍奉北極四聖香火各有感應纔到任三日屬官來問可就延福禪院寢膳縁州衙多有不祥切恐深夜驚動從者從信既感眞靈護身秪於州衙卧處備新果茶酒淨水等取隨身眞武供養至夜戌末亥初用黄絹一丈二尺用辰砂書篆六丁神將追魂籙一道奏告眞武禱祝畢隨紙錢燒去供養經七晝夜州衙安然皆無驚怖至第十日從信亦無響報再懇眞武願速報應當夜二更聞窗壁震動如風雨聲燈燭皆滅或見電光閃爍良乆平定五更二點從信聽得有人敲房門從信起身潜窺見供養眞武燈火如初於案前有一艷粧婦人叩窗叫言念兒是周朝張忱侍郞之女聘與賔州刺史姚文吉此人寵信偏婢范香春同謀將兒用練帶勒殺就本房掘地坑埋不乆姚文吉等去提領修築潼關爲事不端遂被群馬踐向山坡寸骨不收今兒身沉墮於此魂魄常守其尸不得解脫今因禮賔禱祝眞武差六丁神將同城隍土地搜捉兒去押送風吥囉山展轉沉爲下鬼兒告言寃屈事理蒙眞武慈憫特與授記得超人天切念兒尸尚在東房南邊壁下約深六尺若得出離便得超生今來懇告爲兒作主從信候早令人鍬掘果有全副骸骨取出用㮀木盛貯於延福禪院寄州衙從此安靜從信因勸諭世人親敬上眞香火以求保護之福且謂善惡無門惟人所召若平等無欺天地垂鑒况有妖魔敢爲禍患凡爲人但心慕大道敬奉天地動止之間神明衛護何懼邪崇惟供養眞武即獲正道永鎭群魔迎納嘉祥門庭清靜於是賔民悉皆承禀無不虔恭後從信歸京差充皇城内巡檢兼兊宫令官偶陪御祀祀家神因奏此奉聖㫖送有司勘會賔州舊無宫觀宜令轉運司相度限五年建宫觀二所選道士焚修官給錢糧供贍特賜福聖并乾熙觀爲額神靈奏舉東京咸平縣户部侍郞裴宗敏有三子彦先彦修彦和俱受父蔭彦先謹愿敬奉道法其彦修彦和操心欺曲豈顧天地當入京注差又應舉惟彦先往崇福觀眞武殿焚香求告願保扶諸弟同預科撰抽得黄眞君第四籖詳其籤意乃兄弟憂戚之兆遂言與二弟各宜謹守而彦修彦和反致嫌責云我等之命何爲取信於泥裝塑畫後各就試彦修彦和不中惟彦先獲薦及第授大理評事守明州推官彦修注賔州遷江縣尉彦和授金州監酒彦修彦和從此嫉妬見兄應中高科皆怨天地無平等主文不擇藝能心憤憤自兄赴任明州不惟廢罷香火後二弟亦各赴任臨行又將家堂供養三清諸天星幀等焚棄而去彦修赴遷江縣尉到任兩月因巡捕海寇孟軍三等被伊捉去不殺割下舌尖放還彦和赴金州監酒二年虧欠課利四分蒙按察奏劾委官攝勘詐稱患死兄彦先於明州具狀遞申朝廷願納官罷任贖弟過愆續蒙回降候任滿别聽指揮彦先莅事公正吏民贊揚知通及提轉等司皆同罪保舉又蒙中書指揮候裴彦先得替到京令有司引見莫測聖意及至朝見奉問裴彦先始末有何内學奏云臣自祖以來崇敬神天香火不絶别無内學聖㫖云因去歲九月九日夜寐忽夢家政堂福神眞君顯助保舉卿之名字言卿有柱國之功常懷忠孝又稱你有二弟雖爲命官此乃敗國亡家之人不宜委任天籍注定合勾鑿姓名不延壽禄以顯彦先行與道合上應神靈下至朝臣例皆奏舉其彦修彦和行迹不善神祇降灾爲善爲惡無非顯報使人畏之誡之裴彦先當殿轉授太子中允賜緋知洪州豫章縣事聖井辨異懷州開臙脂鋪謝景元景修兄弟兄好遊冶弟慕崇信本家自祖有家堂眞武凡事祈求無不感應景元耽酒呼博家計漸壞乃思景修常言家堂眞武靈驗因懇告云今欲與人賭錢保當贏他人財物須得吉珓累次信用贏得一二百貫後復懇求吉兆而去輙輸一百餘千發怒歸來將眞武堂盡皆拆棄景修再自修完後景元睹博日輸種種不利轉生怨恨一日景修上京販賣其兄毁拆聖堂其本像用刀碎劈棄向井中景元三日後忽患遍身瘡癩膿血滴瀝死活不能景修在京夢一小童披髮跣足渾身俱黄頭戴石盤枷大哭告云手足皆傷疼痛不任近看却是數塊損碎黑木頭遂驚覺起來自省家堂眞武必遭毁壞遂歸懷州見家堂委遭毁壞兄病惡瘡在牀雇匠者修蓋及下井取眞武木片輳成全身不期此井汲上水漿色如琥珀别有一般香異傳聞州府時知州史館馬荀聞此奇異是日率州官來景修家令人汲水辨認見香異非常及具述景元受報見患惡瘡馬荀令汲一盞井水與景修喫纔飲水罷雲霧四合見景修空中立身彩雲遮擁仙鶴前引揖謝馬荀及辭衆云今朝見金闕白日上昇馬荀備奏准御扎令懷州别造官屋兊换謝景修連井屋基破以省錢修蓋謝景修眞人上昇觀一所及蓋殿宇奉安聖井不許汲水或遇民間疾患許汲救治特賜聖水觀額每歲撥恩澤披戴焚修道童二人仍賜莊田房廓錢充常住所有兄嫂一房盡歸景元存養自後家業熾盛一子及第後代異事也焦湖報惡淮西巢州居民不論貧富競好啗鼈不顧腥厭觸犯天曹日月昏暈星宿無光乃有九天採訪使者檢察上奏遂感玉皇勅命北極紫微大帝及天地水三官嶽神取問巢人罪業已積得何所報北極奏云此地歷劫貪殺四足水族寃魂相執既合償還須連地址除滅俱令解脫玉皇告北極曰衆生惡積信不可容合傾城蕩爲大洲方得清淨於是北帝宣告眞武曰汝爲三界遊奕察人善惡奏注福罪豈不知巢州積劫以來好殺黿鼈此乃厭觸上犯玉帝勝遊罪惡不該赦宥令此一州溺爲水𣾷汝宜謹之急速奉行眞武奏北帝曰巢民雖有重業未必俱是殺害水族之人若槩行傾陷終負寃枉容臣會問等第而行眞武遂令從官天罡神將化爲大鼈浮遊巢溪漲塞市橋時州官遣吏爲轄就水宰肉分俵郡官其次巢州皆得肉啗於是天罡回報眞武巢州城土委合化爲大水雖變爲大魚死浮要處全不擇腥濁悉皆分食眞武歎曰此地衆生罪業彌深不可救度眞武自化雲遊道士降下巢州求化淨水前後經遊七日民間遍行悉皆腥厭椀器無一淨處行至小巷獨有一家見一老嫗復前求水嫗以椀盛水與喫乃問婆婆何姓作甚生業婆曰姓焦本爲吴人寄居此二十餘年賣粉食爲活家有一男一媳婦共三口道士問曰汝家水椀因甚不腥婆曰自到巢州爲見人兇地惡家家好殺水族不知罪福老婆戒殺食素其水并椀皆得清淨道士告曰吾非凡人乃天神也念汝有善業故來化汝不乆巢州有洪水汝急携子走避未委汝身要何果報吾有三事汝當選取一願一欲子孫爲官食禄二欲便獲富有榮華三欲永受香火欽崇任取一意婆拜曰何敢過求富貴若得乆遠一炷香火不絶秪此是願眞君曰汝今每日早晩上州衙門側看石碑下一石龜若見龜眼俱赤急携子及婦出南門去逢見聖女山即住眞君言訖化白光不見焦婆從此逐日上州衙門看石龜眼將及月餘人謂焦婆風狂被人戲謔用朱色抹其龜眼皆紅焦婆觀見石龜眼赤領男并婦走出南門奔馳十里有山名聖女焦婆上山回顧巢州逡巡洪水四合浩渺無際忽於雲中見一神人披髮跣足著昏黑袍形相與求水道士無異叫云焦婆其水屬汝所管秪此得香煙不絶囑付隱隱而去焦婆令其子緝草爲舍自忘寢食晋朝聞水陷巢州差官訪問四遠莫知所因遥望聖女山獨有一家官吏上山來見焦婆詢問因由具奏先賜供給焦婆口食仰鄰郡逐時送給不乆焦婆并男婦相繼身死朝廷立廟封爲靈顯聖母及命其水從聖母本姓謂之焦湖四通船舫至今祭奠祈禱無不靈驗今屬淮西路無爲軍巢縣四接廬壽舒和等州通運參詳報應善惡甚明巢州周回二百餘里爲洪水所陷改巢源爲焦湖中存聖女山特封焦婆號靈顯聖母後爲風浪四起漂溺舟船官民秪以恩願祈請聖母而已其風濤兇猛轉惡有行醫老母在西晋城進狀稱是焦湖植利之家爲見焦湖風浪傷溺人船官司惟禱於聖母殊不知聖母本塵俗人秪因戒殺蔬食遇眞武獻水清淨發聖爲巢水土地蒙國家改名焦湖封號靈顯承此天地之恩尚未能報何爲却興風浪爲害蓋是舊日巢民報償水族寃魂相執卒無解脱所以造作毒風惡浪競傷人船遞相報對如要消伏除是眞武可以救此言訖忽然不見晋朝看詳投狀老母乃是焦湖土地靈顯聖母化身報說當急速依應行遣尋差使命并道士同往靈顯廟啓建道場獻御香奏懇眞武祈請風浪不生往來寧靜道場經一月焦湖風浪頓息使命欲回忽於雲霧中現一符吏曰臣是中界直符受眞武將軍差報官家焦湖波濤是巢州殺害黿鼈酬償寃執不能解脱致興妖禍今朝廷禱祈平安已蒙眞武面奏北極因朝三清得玉皇勅㫖并降吉祥甘露已將焦湖惡報寃鬼與水族等解結洗滌並送東嶽泰山府及地府冥司係名收録量度輕重報盡受生焦湖今得平息直符遂退時晋朝再遣使降香建醮於聖女山報謝天地仍就山建眞武殿勑賜爲額并加贈靈顯順聖之號虚財化礫韶州明陽宫有洞天名青羅福地昔神仙張嶽修眞之處遞年於五月五日正午時有雜色飛烏俱來洞前飛舞嘻噪人謂衆禽隨鸞鳳來儀因作散禽齋會掊率錢物置備紙馬以此名目懺獻諸天星宿燒過紙贈積聚天曹無名收寄致蒙北極紫微大帝問殿前四聖神將時眞武出班奏曰此非天曹合收係韶州明陽宫詭詐規取稱有鸞鳳來儀誑達天曹又蒙帝問若明陽宫五月五日奏獻不實因何是日諸禽飛聚眞武復奏曰此日午時係臣下降到彼諸禽競來受臣法氣解結披毛宿縁重業所以舞躍嘻噪而去帝曰天曹將無名紙馬收受將作何用眞武奏云可行下東嶽椿留支用來年必無人燒獻其明陽宫次年復會四遠人民盡至洞前聚集過申酉無一翅來忽有一髼頭道人用手指定宫門默然而立繼令人召到却言今歲飛禽不集社會永爲罷去仍告與前項因依教本宫向去五月五日午時就洞前焚香求禱眞武眞君解禳累年虚名率財冒達天曹罪若不信三年内看有報道人起身入青羅洞更不見出宫門不信次年又率集其會群飛又不至及三年是日因化紙狂風吹起紙火從庫堂沿燒約二時間宫庭化爲瓦礫之地韶州收録住持道士張安象勘招前項故違聖諭致遭天火具奏取裁准中書指揮五月五日早朝據司天臺奏觀見天行飛火合燒韶州背逆正道宫觀及有内臣凌招慶附神降言眞武亦報火燒明陽宫爲從邪惑衆率財非用積犯天曹化諭不改今奏到事理合其應驗所是明陽宫更不立額秪建眞武殿并小道院别選羽士十人焚修張安象特免决還俗疏放合行關告諸路道俗今後禀信天地無令有背正眞之道假燭燒塵南安軍開隆觀元是太上無極淨虚天主祖氏宅基縁南安居民惟崇眞武每至下降盡來燒獻香紙燈燭等觀前有一雜貨鋪本觀凡有會設合用物件皆於此鋪收買惟用蠟燭尤多却將臭穢牛脂觸朱破布僞作眞淨蠟燭出賣不惟煙氣薰觸上聖兼祭賽求福反求穢瀆被星辰天眞及嶽瀆神明奏達三清玉皇暨天皇北極令下天曹諸司檢攢忽一日看眞武殿香火行者夢一神人報云觀前賣蠟燭者曾三世爲人世世惡業今姓黄名禹猶賣穢脂假燭觸犯天曹罪惡貫盈永失六道合爲微塵今係佑聖院眞武管察善惡既受天符以報黄禹之罪明日當自知之行者驚起告於道衆言猶未畢黄禹店前有一老兒商量買燭十條要獻天曹須是眞燭可矣黄禹怒云我二十餘年賣此燭盡獻天曹何故云假令先買一條取火點看不覺驟風起吹火焰沿燒屋宇老兒亦自不見其黄禹因貪救物致令火逼燒爲灰塵經一時辰獨燒此家不留分文至火滅店内有一大柱不曾濫火正面如斧劈一片上有天書隱記士人道流俱來驗讀並知是眞武眞君聖迹官司令人用紙筆抄録纔了其柱又從裏面火出燒盡其意與觀中行者昨夜之夢相似通露罪惡詳此清由速招果報南安軍太守不敢隱蔽尋録一宗事情申奏朝廷蒙看詳批降人之處世善惡由心善事如江海潮波來無形影去無根源惡有速報如天地産物是處皆應可不謹之宜下南安軍依此立石碑於觀門以顯眞武垂報無差仍布告中外以戒水世叙功賜銜勑寳應閣惟神陰相克示顯靈宜可叙功特賜眞武永充定國無礙慈悲家政殿授上銜玄初鼎運上清三元都部署九天遊奕大將軍左天罡北極右垣鎭天眞武靈應眞君奉先正化寂照圓明莊嚴寳淨齊天護國安民長生感應福神智德孝睿文武定亂聖功慈慧天侯水之精贈同德佐理至應大道顯明武濟陰盛翊聖左正侍雲騎護國保寧輔肅玄初太一天大將軍火之精贈同德佑理至惠誠重感慈普濟陽辯武聖右正侍雲騎護國保靜輔肅守玄太一天大將軍封贈如前奉御製讚入閣謐爲策寳萬物之祖盛德可委精貫玄天靈光有煒興益之宗保合大同香火瞻敬五福攸從玄天上帝啓聖録卷之八
