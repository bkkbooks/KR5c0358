front:
  text: 玄天上帝啓聖録卷之一流一
  hash: sha256:6708824a4053631771bea58242ab8d5e6b9debcfadac5a7b68e53eb9b69ce33f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0358_HFL_001-001a, image: hfl/0606/0606-004.png}
body:
  text: 金闕化身按三寳大有金書云一炁分形靈虚生五劫之宗三清出號神景化九光之始太初溟涬玄極冥蒙中有虚皇分置五劫曰龍漢曰赤明曰上皇曰延康曰開皇當斯時也天光未分清濁未判則知三炁爲天地之尊九炁爲萬眞之本是故元始象先天開明三景造立天根五文開廓普植神靈太極一判天地始明東分青九南受丹三西成白七北歸玄五中生黄一號爲五老即玄黄植象之根也五老各布始炁化成四靈以定四隅周環六合兩儀運乎其中推成萬物以此考源明玄帝果先天始炁五靈玄老太陰天一之化按混洞赤文所載玄帝乃先天始炁太極别體上三皇時下降爲太始眞人中三皇時下降爲太初眞人下三皇時下降爲太素眞人黄帝時下降符太陽之精託胎於淨樂國王善勝皇后孕秀一十四月則太上八十二化也淨樂國乃奎婁之下海外之國上應龍變梵度天也王宫誕聖是時正當上天開皇初劫下世歲建甲辰三月戊辰初三日甲寅庚午時玄帝産母左脇當生之時瑞雲覆國天花散漫異香芬然身寳光燄充滿王國地土皆變金玉瑞應之祥莫能備載經書默會玄帝生而神靈舉錯隱顯聰以知遠明能察微年及七歲經書一覽仰觀俯視靡所不通潜心念道志契太虚願事上帝普福兆民辭親慕道玄帝長而勇猛不統王位惟務修行輔助玉帝誓斷天下妖魔救護群品日夜於王宫發此誓願父王不能抑志年十五辭父母而尋幽谷内鍊元眞元君授道玄帝念道專一遂感玉清聖祖紫元君傳授無極上道元君告玄帝曰子可越海東游歷於翼軫之下有山自乾兊起跡盤旋五萬里水出震宫自有太極便生是山上應顯定極風太安皇崖二天有七十二峰三十六嚴也子可入是山擇衆峰之中沖高紫霄者居之當契太和昇舉之後五百歲當上天龍漢二劫中披髮跣足躡坎離之眞精歸根復位上爲三境輔臣下作十方大聖方得顯名億劫與天地日月齊并是其果滿也告畢元君昇雲而去天帝錫劎玄帝乃如師言越海東游又感豐乾大天帝授以寳劍天帝告曰此劍名曰北方黑駞裘角斷魔雄劍長七尺二寸應七十二候撫三輔應三台重二十四斤應二十四炁闊四寸八分應四時八節子可佩此居山修鍊降伏邪道收斬妖魔告畢天帝昇雲而去玄帝受訖歷翼軫之下果見是山山藏水没皆符師言於是入山渡澗擇地隱居内修其山在均州之南三舍先名太和一名仙室一名大嶽也玄帝昇眞之後謂曰非玄武不足以當之故更名曰武當嵩高之儲副五嶽之流輩也周迴八百里七十二峰三十六嚴二十四洞五臺五井三潭三泉四石三天門三洞天一福地風穴雷洞藥圃丹爐霄館龍宫慶雲彩霧幽蘭清蕙葛乳天花石露金銀之星樹有松蘿之秀騫林葉尤能愈疾靈壽杖可以扶衰神獸呈祥仙禽奏樂御寳宸翰護教鎭山黑虎巡廊烏鴉報曉艾名千歲廣施博濟之功松號萬年彰美報恩之德茂林脩竹人傑地靈得道神仙不可勝計囿山聖跡莫能備陳斂萬古之烟霞歸一原之造化也澗阻群臣父王思慕太子不能棄捨令大臣領兵五百衆根尋太子回朝探逐所往渡澗入山遇澗水忽漲不能前進八次渡遇水泛第九次方得渡至紫霄巖面見太子啓傳王命自是部衆足忽僵仆不能舉相謂曰太子願力所至如是回國且遥乃同聲告曰願從太子學道語畢跬步如故於是俱隱山中帝昇眞之後皆證仙道今武當有五百靈官者是也澗名九渡阻其意焉童眞内鍊玄帝登山首於太子巖棲隱帝修眞時有靈鴉報曉黑虎衛巖每食必餌之至今二物通靈皆證大神時隱時見烏鴉喙赤見之者昌黑虎驅奸逆之者殃按總眞集云武當黑虎大神乃北方天一之所化護教守山之靈正直威顯變化不一或託相爲人金甲皁袍若將軍之狀或現眞相玄鬃黑色如獅子之形或大如斄或小如豹或雪裏而現其跡或泥中而顯其蹤見之者不祥夢之者獲慶夜巡廊廡靈跡昭垂不善之人立爲屏斥丹經云虎向水中生是也有祕法傳之於世行焉今天一眞慶宫嘉慶閣下有黑虎巖靈爲者秉北方之黑色爲武當之靈神預報吉凶驗其慈厲靡不應者旦則群噪爲之報曉然物我相忘略不驚避晨夕二供飛翔伺食内一紅喙者或隱或現見之者爲嘉瑞云爾悟杵成針玄帝修鍊未契玄元一日欲出山行至一澗忽見一老媪操鐵杵磨石上帝揖媪曰磨杵何爲媪曰爲針耳帝曰不亦難乎媪曰功至自成帝悟其言即返巖而精修至道老媪者乃聖師紫元君感而化焉澗曰磨針因斯而名雲麓仙人磨針澗詩曰淬礪功多麤者精聖師邀請上天京我心匪石堅於石小器成而大道成折梅寄樃玄帝自悟磨針之語復還所隱於途折梅枝寄於樃樹上仰天誓曰予若道成花開果結後如其言今樹尚存名曰樃梅者乃樃木梅實桃核杏形味酸而甜能愈諸疾然亦罕得之以驗豐歉豐年結實荒歲則無下有仙翁司之敬禮可得玉谿眞人詩曰高眞學道隱山時親折梅枝寄樃枝行滿功成應沖舉花開子結識先知仙翁護境百邪遠聖果標名萬古垂服餌延齡除痼疾志誠拜受福相隨蓬萊仙侣玄帝歸巖修鍊之時嘗有九美人相貌端嚴儀矩硃異往來帝所惑試帝心帝默識之必聖人也故加敬禮女仙乃謂帝曰予輩蓬萊仙侣特來試之功行著已宜加精進尅日沖舉語畢跨鶴而昇今稱蓬萊九師是也仙侣之巖由此而名焉紫霄圓道玄帝在山往來觀覽見七十二峰之中有一峰上聳紫霄下有一巖當陽虚寂於是採師之誡目山曰太和山峰曰紫霄峰巖曰紫霄巖據此居焉即成道之所今天一眞慶宫是也聖訓云吾山不及諸山富諸山不及吾山清吾山冬寒而不寒夏熱而不熱三世爲人方到吾山五世爲人方住吾地七世爲人方葬吾境吾山寂寂草蔞蔞只聞鍾鼓不聞鷄汝若有縁居此地吾令六甲斬三尸七十二峰接天青二十四澗水長嗚三十六巖多隱士葬在吾山骨也清又云南有降魔北金鎖膽必驚兮登必阻劫終劫始剪妖精留得佳名垂萬古吕純陽眞人詩曰混沌初分有此巖此巖高聳大和山面朝大頂峰千丈背湧甘泉水一灣石縷狀成飛鳳勢巖龕綰就碧螺鬟靈源仙澗三方繞古檜蒼松四面環雨滴瓊珠敲石棧風吹玉笛響松關角鷄報曉東方見晚鶴歸來北斗彎谷口仙禽常唤語山巓神獸任躋攀箇中自是乾坤大就裏元來日月閑自古玄眞修道處至今蹤跡在人間不知多少神仙侣爲愛名山去復還有碑存焉五龍捧聖玄帝在巖潜虚玄一默會萬眞四十二年矣大得上道於黄帝五十七年歲次庚子九月丙戌初九日丙寅清晨忽有祥雲天花自空而下彌滿山谷四方各三百里林巒震響自作步虚仙樂之音是時帝身長九尺面如滿月龍眉鳳目紺髮美髯顔如冰清頭頂九炁玉冠身披松蘿之服跣足拱手立于紫霄峰上須臾五炁龍君捧擁駕雲而昇至大頂天柱峰乃止時有五眞偕群仙降于帝前導從甚盛非凡見聞三天詔命是時玄帝稽首秪奉迎拜五眞曰予奉三清玉帝詔命以子功滿道備昇舉金闕子之聖父聖母已昇九霄矣帝俯伏恭諾五眞乃宣詔曰學仙聖童淨樂國子惟卿玄元之化天一之尊不言而教莫知其神渺渺劫仞綿綿若存虚心實腹和光同塵鑿開造化樸散胚腪六百萬歲八十二身曲全枉直窪盈弊新生陰育陽起死成人其功不時其德乃眞今宜再顯高輔三清上罰逆象下滅妖氛掌握圖籙攝制魔蹤帝眞靈會驅神駕龍甲庚之將贊衛爾勳周環六合普福兆民道參天地萬眞所推可特拜太玄元帥領元和遷校府公事賜九德偃月金晨玉冠瓊華玉簪碧瑶寳圭素綃飛雲金霞之帔紫綃龍衮丹霞羽䙱絳綵之裙七寳銖衣元光朱履飛紅雲舄佩太玄元帥玉册乾元寳印南北二斗三台龍劍飛雲玉輅丹輿緑輦羽蓋瓊輪九色之節十絶靈旛前嘯九鳳後吹八鸞天丁玉女億乗萬騎上赴九清詔至奉行天眞皇人譔白日上昇玄帝拜受天詔易服訖五眞曰予乃九天五老天君准上帝命與子啓途至午時帝乗丹輿緑輦羽蓋瓊輪馭九色玄龍揚十絶靈旛前後鸞歌鳳唱嘯歌嗈嗈飛鳴應節朗耀雲衢玉女散花金童揚煙浮空上昇玉陛朝參玄帝飛昇至金闕朝參玉陛上帝告曰卿往鎭北方統攝玄武之位以斷天下邪魔時帝白上帝曰臣宿縁慶幸得睹天顔功行卑微奚堪重任上帝告曰卿道參天地萬眞所推幸勿謙辭帝奉玉㫖謝恩而退乃居天一眞慶宫如詔命眞慶仙都玄帝所居之宫則曰天一眞慶宫在紫微北上太素秀樂禁上天太虚無上常融天二天之間宫殿巍峨皆自然妙炁所結琳琅玉樹靈風自鳴皆合宫商之韻紅光紫雲常覆其上此處則玉虚無色界也玉清演法按元洞玉曆記云至五帝世當上天龍漢二劫下世洪水方息人民始耕殷紂主世淫心失道矯侮上天生民方足衣食心無正道日造罪愆惡毒自横致六天魔王引諸鬼衆傷害衆生毒氣盤結上衝太空是時元始天尊與諸天上帝說法於玉清聖境八景天宫天門震闢下見惡氣彌塞天光於是妙行眞人叩誠求請願救群黎天尊告曰汝之懇請不亦善乎非勇果材安能制斷惟北方位天奧之區其方有神名號眞武玄天之性以正摧邪降伏妖魔歸於正道妙行眞人上白天尊曰縁何得此威神下降凡世收除魔鬼救度群生免遭横死日有所益伏願大慈允臣所請於是天尊命玉皇上帝降詔紫微陽以周武伐紂平冶社稷陰以玄帝收魔間分人鬼朝覲天顔爾時元始天尊凭几玄駐須臾之際紫金之光自衆光出碧霞凝縷文著召眞五氣相迎洞照無間衆瞻光相凝睇之間玄帝已至長跪天尊前曰臣已奉玉帝勅命位鎭北方今日何縁特蒙召命得睹慈顔天尊告曰吾於大會說法忽有下方黑毒怨氣衝上天界大衆咸驚汝宜往彼收斷妖魔抜濟魂爽降魔洞陰上賜玄帝披髮跣足金甲玄袍皁纛玄旗帝敬奉教勑部領六丁六甲五雷神兵巨虬師子毒龍猛獸下降凡界與六天魔王戰於洞陰之野是時魔王以坎離二氣化蒼龜巨蛇變現方成帝以神威攝於足下記云潼川府中江縣古名玄武縣有一山名武曲山乃昔玄帝追魔至此山攝水火二眞於足下因此而名至今居民呼之山有觀乃宋大觀間徽宗御賜眞靈觀額以表玄帝降伏天關地軸之福地也觀前江中之石山中之草木俱有龜蛇之形人病煮水飲之即愈今益州之龜城梓州之蛇城尚記當時之遺跡也分判人鬼玄帝到下界七日之中天下妖魔盡皆收斷人鬼分離寃魂解散逝魄超昇鎖鬼衆於酆都大洞之中人民始安陰陽交泰國土淸平凱還清都玄帝與諸神將凱還清都上元天宫朝見天尊曰昨奉教命往下界收斬妖魔仗慈尊力乃於七日内天下邪鬼並皆清蕩天尊告曰汝等諸神得無勞乎卿在太初先天之前本北方五靈玄老太陰天一始炁之化乃萬象之根今經二千五百年合還本方歸根復位於是元始乃命玉皇上帝宣降玉册拜玄帝北極鎭天眞武遊奕三界都督判佑勝府之職是以玉帝尊奉元始教命即降聖㫖下金闕翰林玉華院譔成玉册則金闕侍經司玄學士大丹眞人文也册曰惟卿混黄炁之瑞道備九陽之尊德隆仙品威貫神眞出號三千五百春秋功齊四十二劫甲子校遷民庶無失毫分兹以數運大劫邪正混同感生六天魔王傷害九地黎庶儻非眞力何得清寧三清是賴九聖得依再扶道法之隆又復邪魔之正降水火二精於掌握攝甲庚兩將於紀綱因兹神化萬彙咸榮功高衆聖難盡褒崇當容返本還源理許歸根復位若不徽稱焉可顯德璽書錫降厥勿謙辭可特拜鎭天玄武大將軍三元都總管九天遊奕使北極左天罡三界大都督神仙鬼神公事判玄都佑勝府事依前太玄元帥判元和遷校府事册到奉行復位坎宫上帝命玄帝曰卿可當披髮跣足躡踏龜蛇建皁纛玄旗躬披鎧甲位鎭坎宫天稱元帥世號福神每月下降操扶社稷普福生靈億劫不怠輝光日新而帝欽奉詔已而嘆曰昔吾爲人時入太和山鍊道蒙本師紫元君所誡云昇舉之後五百歲當披髮跣足躡坎離眞精歸根復位上爲輔臣下作大聖方得顯名億劫與天地日月齊并今日果符師語復位坎宫豈不快哉自斯玄帝千變萬化爲主教宗師分身降世濟物度人無邊無量洞天福地無不顯靈感應事跡簡册難窮或宗李而爲姓或繼郭而爲姓或從裴而爲姓累代欽崇至于今日普天衆生感帝恩者高厚如天地之廣豈筆舌究其津極者哉而帝位居金闕之貴總統樞機陶鑄群品佐天罡大聖眞君調理四時運推陰陽造化萬物莫極崇高矣况帝以道德開化天地湛然默有成功之理無一時不念衆生無一刻不憐下土每知劫數必先以開濟之誠上奏金闕丏减分數至於蠻夷猾夏易教改名亦行教化可謂大慈大悲普救無上法王也玉京較功昔在上天眞化三年五月初五日元始上帝上清上帝太清上帝在玄都玉京山九霄梵炁之上玉清聖境清微天中玉宸殿内大會九霄上帝十極高眞三界萬靈皆集是殿考較諸劫功過是時無上至尊昊天玉皇上帝總領紫微上宫天皇大帝紫微中宫北極大帝后土皇地秪三十二天帝君三官四聖日帝月皇五星四曜森羅萬象地水群眞各各嚴肅上朝三淸並至玉宸殿整班朝禮是時元始上帝登命九天司馬侍仙玉郎開玄精玉笈大丹碧匣出萬天素威功過玉曆乃勅金闕侍中司馬大神韓君丈人司命可韓眞君司録定名玉曆眞君司功九天採訪眞君司過九天儲福眞君開曆考較諸天眞宰自昇眞得道位居金闕以來功過大小所考五老十一曜二十八宿五方五斗星君各主司化陰陽經緯自太古至今功高一千萬劫並齊無上天尊之位中考三官四聖自太虚開化神一挺生所有保天佑地之功已當五十萬劫當亞天帝之位由是諸天推舉三界所尊元始頒降玉曆下示金闕三省推考聖功果與三十二天帝君功德並隆是以昊天至尊將三官四聖並拜帝眞之號於上天眞化四年正月初一日金闕三省降詔中天高上玄都紫微宫宣詔三官四聖並赴三天門下館于玉閣乃命金闕左侍翰林淸玄學士司文眞君金闕右侍翰林寳章學士司經眞君鎖玉華院譔製玉册至是月十五日上元節進封三官四聖帝號册以玉板刻之金書以雲錦寳囊盛之瓊玉匣之金龍鑰之玄帝玉册曰維無上大羅天眞化四年正月十五日上元節金闕玉宸三省謹言皇皇大道赫赫至眞太景開判玄元化生妙藴樞機萬天尊仰則爲聖明主務其休隆廣焉敢不崇欽惟太玄元帥鎭天玄武大將軍三元都總管九天遊奕使左天罡北極右員三界大都督領元和遷校府公事判玄都佑勝府事太上紫皇天一眞君靈通太妙上開混沌之玄道備鬱明下統虚危之宿撫成地紀實育天元持造化於四時推紀綱於八節分身下降普福乾坤功齊五十萬劫德並三十二天九霄上賴於眞威十極仰依於神化有大利施之於下民積聖德編之於玉曆按遵簡録當亞帝眞不有徽崇何以明德謹遣金眞紫陽大夫金闕侍中素靈殿大學士主管三天金闕門下直日儲靈典奏事含光上德仙軒轅執本齎捧玉册金書上尊號特拜玉虚師相玄天上帝領九天採訪使夫道生一炁威化三才結眞于九極之華晨麗於六天之秀幽微煒燁洞杳飛芒功高難極合示嘉尊想惟覽觀幸勿謙辭惟當上輔大道劫劫長存下佑兆民綿綿水祉龍文昭降永秘玄都謹言瓊臺受册是時玄帝與上元天官中元地官下元水官天蓬元帥天猷元帥翊聖眞君以上元日並受帝號於七寳瓊臺之上昊天至尊親行典儀與凡世帝王拜大將開國承家之儀頗同上賜帝瓊旌寳節九龍玉輦其冠則通天十二旒其服玄衮上施日月山龍物象皆與世間天子者同圭以玄玉履以紅舄于今群眞朝禮昊天至尊則四聖爲都班之首天宫家慶玄帝拜玉虚師相玄天上帝號之後崇封聖父曰淨樂天君明眞大帝聖母曰善勝天后瓊眞上仙下蔭天關曰太玄火精含陰將軍赤靈尊神地軸曰太玄水精育陽將軍黑靈尊神並居天一眞慶宫因兹三界仰稱曰玄帝也紫霄禹迹按九丘經緯天地曆云禹平水土之後分治九州拜立五嶽定封四瀆範圍坤厚名山大川悉以神靈主之乃考翼軫之下有山名曰太和七十二峰凌聳九霄氣吞太華應七十二候上古所傳云是玄武得道飛昇之地觀是山也雄麗當陽九宫皆備非玄武當之孰可享邪遂更太和之名曰武當山建宫曰紫霄宫專爲崇奉玄帝香火之所自後神仙卜棲者衆矣甘霖應禱記云大唐貞觀間歲值苦旱朝廷下詔有司禱于天下名山大川是時武當軍節度使姚簡奉命躬詣武當紫霄宫齊醮致禱建壇之夕有五儒士丰貌殊異敬來謁簡延坐乆之從容語簡曰予五君非凡之儒乃五氣龍君也准玄帝勅命守護此山非一日矣爲子正直寡慾祈禱精嚴故來相訪少頃雲氣迷目甘雨霈然遂失五君所在矣五龍唐興是時枯槁復甦歉回爲稔人皆享昇平之樂免溝壑之患姚簡其兹靈異奏聞太宗降㫖就武當山建五龍觀以表其聖跡自此姚簡必慕至道志樂清虚拳拳不怠遂起掛冠之想乃挈家隱居武當恪事玄帝香火繼蒙授記命充本山之神血食均陽今名爲威烈王是也臣每參玉曆得覽玄源久謂玄帝事跡出於太古圖記湮蕪世傳訛舛未究宗因念欲編譔實録降付名山縁以時未際會少阻殷勤玄帝自宋啓運以來下世福佐社稷今將四甲子矣行化國内分野别建紫虚靈壇普度群品而臣又得參侍靈軒日親宸陛特因暇日考續三洞玉書校成實録不敢以鄙語雕誣繪素大德蓋摭諸實也謹須示中上庶幾萬世之下以永其傳則仰知玄天上帝本乎空洞之先大道之祖豈可與其餘神聖同倫而語哉亦足以發明武當之源豈不暢美者乎時在上天延康七劫無上大羅天開化十三年下世宋上元甲子太歲甲辰淳熙十一年正月辛卯朔十五日乙巳太眞西王左上卿上清天機都承㫖神應元惠眞君飛霞靈光眞人中黄先生臣董素皇謹譔武當發願南陽武當山眞武初學業遇豐乾大天帝君賜劍名曰北方黑駞裘角斷魔雄劍長七尺二寸應七十二候撫三輔應三台降伏不祥之事重二十四斤應二十四氣斬邪歸正不侵邪見之道横闊四寸八分應四時八節常在人間定除灾禍因得從吏天罡河魁於噩仙山降伏天下水火二精青龜赤蛇一切妖魔與爲患於世者盡皆潜伏眞武往問老君曰蒙囑付於武當山若能降伏世間一切妖魔了當即與授記成其正眞之道臣今降水火妖精歸於足下但係種種群魔皆已潜伏告師授記老君曰汝來授記還修得甚果老君以一手指天一手指地乃天地尚存人間妖魔何得潜伏候取得閻羅王同來方可授記閻羅王若來見吾即是無地獄人也無善無惡無天無地得同汝一處授記乃爲無上正眞道果汝且更修其果爲衆生斷除邪道增益功行眞武從此復降武當山寄凡修行一十二年忽一日受玉皇金籙差充北極佑勝院都判人間善惡公事提點生死罪籙乃授消灾降福神將每月定一日下降及庚申甲子日亦如之有發願文云衆生善惡與我齊身我登證果亦同其因谷嵒修果隨朝有南康軍廬山太清天慶觀光德元年三月三日江西路安撫使張祐之入山遊翫有洞名曰谷嵒張祐之領從人入洞方行二十餘步覺身心迷惑遂出洞門據左右報有軍虞候何詮入洞不見蹤由約二時以來何詮從洞中出其遂因依詮入洞行二十餘步聞洞中有人勘筭文字遂隨語聲處尋路行半里見一宫殿虚聳上有三位燕會下有判官符吏數百人將簿書點筭人間善惡之事詮子細觀望見有龜蛇在前戲躍知是北方眞武見主席是王者冠服對坐是女眞乃鳳冠霞履眞武位在其側詮潜入從官隊仗求問所因符吏曰洞是谷嵒天名瑶玉今日是眞武降生之辰每年至此日蒙北極給假於丑時辭北方至寅時届東方面禮本師太上老君就羅浮天宫請侍父母於卯時從申酉方下界遊奕察其善惡與父母修人天天道之果此日若察録得造惡之人罪重如須彌山者皆獲眞武洎承父母布施慈悲之賜咸蒙解釋世人有知今日之因若清淨戒心醮獻詞章懇求恩福最爲大矣詮欲子細視之不覺如夢寐驚覺立身在谷嵒洞門石臺下張祐之備録聞奏從此方知三月三日是眞武降生之辰爲民消灾降福奉聖㫖下南康軍委官往廬山天慶觀建立眞武并父母降眞寳殿及給公據揀放何詮玄天上帝啓聖録卷之一
