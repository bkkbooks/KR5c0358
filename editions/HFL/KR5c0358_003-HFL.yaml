front:
  text: 玄天上帝啓聖録卷之三流三
  hash: sha256:0dfbb40af086f19d22e7d95ec07fd5629b42bdd7151ebc2df64b4faff286ce57
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0358_HFL_003-001a, image: hfl/0606/0606-096.png}
body:
  text: 皁背顯聖揚州江都縣白砂村吴元嗣家豪積善每秋冬間用師巫燒獻三界醮紙内用鵝鴨血肉活命雜供祭祀有泰州天慶觀道士唐慶餘到來抄注齋糧偶見本家賽願稱云何得天曹衆聖與中下界神道用物命交雜供養莫非觸犯諸天如何獲福元嗣問曰天曹如何供養願賜指教慶餘録出儀式秪用明香燈燭酒果淨茶素麫飲饌柳枝法水五綵散花金紙雲馬楷書奏狀令備一席外方裏圓不得夾帶中下界神位若能七年依此醮祭看有何應驗元嗣次年改除中下界神道憑師巫賽願外其天曹請法籙道士醮賽將及數年忽於醮日有二十餘人遊化求齋元嗣留齋畢因問從甚處來作何營業内一人答云我等住無間天來從無間路來本業無間所營去從無間道去今日特知此處有祈天之會故來赴其醮獻言訖二十餘人盡化爲雲霧不見内一位椅背上留下花紋金縷皁紗短抽背子一領極有奇異已悉天眞降臨留此天衣顯其聖驗遂用繡綵帕裹藏匣内永爲家傳供養纔遇逐月眞武下降日其衣隱隱有光芒元嗣子孫皆壽後揚州依禀朝㫖括貴老人召赴聖節宴席惟元嗣家子孫壽年八九十百歲以上兄弟八人内吴琬壽過一百步履康健視聽不衰州府問勞據稱翁父元嗣在日義聚不分及醮祭因依及齎到眞武皁背爲驗時太傅陳叔平守楊州備録申奏續蒙指揮特賜吴琬立爲義門除授本州攝長吏恩澤於大門置義順土臺二所立華表鶴柱旌表門閭并收眞武遺跡衣袍乃是鎭家顯聖之物不得損毁淨巾結縁西京善濟禪院有徒弟僧藴方自幼年參禮住持僧用勤爲師累因勾當縁事欲來披剃阻節不圓忽有人貨術藴方求一卦斷云不四十歲須得披緇藴方後爲院門點差縁化衆僧夏浴手巾四百條偶到西溝曲阜山下於澗邊見青衣童子臨水濯足藴方近前又却俱走藴方隨後赴之前者一林華葉茂盛見無數六道群魔坐圍四向其童子立處却是人間供養眞武眞君活身坐於石上檢校善惡解怨執對送東嶽轉生藴方不敢近前方欲回轉被適見童子相召云眞君唤藴方既面拜眞君蒙問抄注手巾收上疏目恐爾難尋吾之住所令童子將隨身淨巾一條與藴方略充結縁言秪不得亂與諸色人稱是見吾於此所得若泄天機必招瘖瘂立報藴方拜謝將淨巾歸院納上秪稱於曲阜山不識姓名人家求化得來用懃接看其巾長八尺非凡俗布入手如純纓遇冷處覺熱暖處却凉絲紋無接經蔻眼反覆有金光異香用懃帶去謁昭文館大學士知西京留臺司李中孚商量進奏進奉續承詔書來宣僧用懃童行藴方赴闕以致臨殿根問稱其巾除聖府天仙可有外諸國龍宫海藏皆無差寳藏庫官牙看驗並謂上天虬龍白鳳纓鬢玉機天女手工之寳何縁凡世有此臣僚上言若欲本人指說願先賜披剃藴方爲僧必須肯通奉聖㫖依其藴方爲受恩推諱不能即依前據實面奏尚未句終不覺口墜聲咽語漸瘖瘂其報果是立應除留元物賜赴内道場供養宜令僧用懃看待藴方秪就在京與賜住院宋朝一統宋朝建降立極後因瀛州高陽關承眞武惠錢五萬餘貫應付賞給太祖掛念于此又詳瀛州蕃客託伊壽先姓名兄弟七人壽先則是蕃界廟額七人乃是七辰降靈惟有姓伊一字未曉於是即便下瀛州選地創蓋北極七元四聖祠殿裝畫天曹畢遣近臣齎御香祭獻忽一日辰時百官陪駕升端明殿方欲平章諸道王侯未納疆土爲慮是時不覺雲霧風雹群臣各棄避獨有宰相趙普與聖駕被童子二人引召至本内孝成殿太祖駕坐良乆於殿前雲空間睹一神明戴星冠披銷金琱綬執簡躬揖太祖啓曰洪基鼎祚運新昌堯舜須依人歎將莫似后奢纔得位逆姦依玷亂施張吾係天都北極眞武靈應眞君蒙加賜祠殿於瀛州又承遣使醮謝今者遊奕過次所以因來報謝聞有天下霸業侯王尚或守據一方未懷臣順近曾親見上帝批鑿並合歸宋朝爲一統永昌萬世帝王之業除淮漢已取復外餘處注定年限各有先後不踰一紀以河東爲首次至南唐西蜀廣東福建然後兩浙合依次收之眞武告辭復歸天闕太祖遂與趙普還見左右侍衛守護端明殿以俟遊從宸衷喜慰擇日就内殿建醮仰答靈貺自後一一果如聖訓寳運重新准東揚州進士傅鴻一生戒行供養眞武三十餘年所作所爲常行方便人人稱譽賢士大夫俱以歌詩文墨贈鴻門前轎馬如市傅鴻思之如此應物甚妨道業乃棄家雲遊至陜西終南山上清太平宫求一庵寮出家知宫張守眞見鴻形貌淸古遂留於本觀爲修眞上士别治一室延之在觀三年修奉上眞香火虔敬恭恪忽夜道衆停息寢睡張守眞潜往叩鴻本寮聞鴻睡中似與人語忽有火光一道從鴻寮内迸出守眞異之明早會鴻試問夜來火光清由鴻曰今當限至不任申延遂至沐浴易衣昇道堂聽受眞武眞君託身降言今爲吾傳報宋朝天子云三月桃花景色天萬般眞瑞一時妍金枝寳運重新令仲節當迎赤脚仙眞語云秪言此二十八字吾去矣傅鴻一如睡醒莫測其意次日傅鴻潜自遁去不知蹤由張守眞既得眞君降言不敢沉隱遂往陜西經略安撫司面禀使相張希古憑委具表奏聞時皇帝御覽驚喜交集後果於庚戌年辛巳月辛丑日明德宫降慶太子即仁廟是也嚮玉城天主赤脚大仙下降已應眞武降言預報勝因奉聖㫖下鳳翔府搜尋傅鴻不知去後續奉聖㫖就上清太平宫重建眞武寳閣及立傅鴻祠堂贈號勝因眞人并給賜銀絹各一百匹兩酬賜本人家屬天罡帶箭明道中貝州王則反逆據樞密院選委保信軍節度使尚書兵部侍郞文彦博前去招捉今承相帥回奏王則叛寇盡已誅滅非臣功力臣自到梅州見南城門路東有一華表柱題圓通觀額内是眞武殿遂赴殿備香願垂聖助尋到貝州近城二十里先令將佐問罪其三則對敵時第四將凌聳出軍迎敵赶王則復入貝州閉門不出試待打城搜擒縁是本朝州土不欲遽壞更且守候計二十日忽見貝州城上迅發暴風亂飛砂雹如弓弩發箭時見寇軍從空中墜下城脚微死微活不覺城門大開大軍競入除留居民外遇有器甲兵仗者盡行誅戮王則就擒馬前尸首異處遂委官權行知監臣獲勝回復往圓通觀謁謝眞武備醮報賽細觀眞武左畔立塑一從官員被械胄名曰天罡神將左臂上帶箭一隻入深三寸有王則軍號纔除其箭隨有膿血流出尋和香泥修葺箭瘡并收元箭一隻見到候進上送三司禮部看詳差使齎御香前去祭奠乃賜修蓋殿宇候畢别降御銜醮謝其貝州承斯保護重恩特改爲恩州河魁擎鞘南康軍廬山太清觀有隋朝張祐之奏請建眞武并神父聖母降眞殿自後顯應甚多是時烈祖會群臣欲求福建歸明群臣奏云福建地剛人狡除是動兵取之烈祖從此統兵征伐人馬届塗忽狂風黑霧有毒蛇猛獸攔道路兵仗不能前進烈祖乃焚香禱空忽於雲靄中立一神人鞠躬至前曰臣是福州閩山仙源觀土地蒙本觀眞武點來界首迎接爲知大王舉兵欲取福建縁福建世業未終已自注定庚午歲合徑歸儷極不當大王收取特將此意迎諫大王人馬度山越水戈刃之下死傷性命良乆神人不見風霧頓息烈祖因此回軍至廬山降眞殿祭獻見右立一從官手擎劍鞘者烈祖指問道衆奏曰是河魁也烈祖歎曰秪此便是在路中現者神人相貌一同後來烈祖歸國上清宫依廬山太清觀式樣蓋造眞武神父聖母三眞寳殿令本官修奉香火福建探知李王兵馬將至本界因何回轉尚慮李王設伏遣使赴南唐審問烈祖於回文内具述中路逢一神人言是仙源宫土地蒙眞武差來迎報福建世業未竭自注下庚午年合歸儷極不當南唐取之感此神言更不進兵其馬氏已知仙源宫委是通靈保護國界却爲來書云已注庚午歲合歸儷極因此懷疑集諸局商議若謂歲次庚午尚有年深未委儷極因依合屬何所之兆竟不測其理擇日集百官往閩山仙源宫禱于眞武願降靈應欲聞庚午歸儷極之意果荷聖恩響應已知儷極是周後興運天水之姓一統天下列國皆納土其龍興殿名儷極故也福王馬氏遂與南唐講和無復相侵蜀王歸順磁州崇明觀眞武顯聖遍及眞定等二十餘年皆獲聖賜斛斗共一十五萬餘石出糶救饑除磁州收到價錢支付崇明觀修造訖餘諸州價錢亦及萬數别無支費奏取㫖施行續降指揮下河北轉運司起發上件栗麥價錢就京城創四聖觀賜額爲四聖紫極觀特設普天大醮并降赦恩上達四聖通凡降鑒朝廷因用兵取蜀未决忽夜有狂風一陣過於殿庭時太祖皇帝於燈燭之下見一黄衣武士告謂是北極四聖殿下直日符吏言西川若非四聖降靈卒未有意歸順今已獻上地欸圖經付使相侯元質等訖相將回京進呈不消聖慮臣奉眞武差報陛下天蓬天猷黑殺既見蜀王歸順已回雲馭惟有眞武恐西事别有悔意今在雲空守候陛下急差官兵前去迎接立便委諸司庫兵交割蜀地疆界言訖符吏不見次日早朝果有急報蜀王歸順由是太祖繼於四聖觀設醮報謝藩鎭通和河北雄州有搉場要切關口除屯馬步軍二十萬外有敢勇白身指使二千内有張琪居常供養眞武得悟遁甲行軍之事康定年中北鄙淺蕃胡知從等侵雄州搉場時王勔爲經略安撫使乃令敢勇前去抵敵果獲勝捷張琪取覆今夜主有蕃兵復來侵犯云有巽風起順壬癸立應其兆兼防火灾有司差兵將守護果至二更蕃兵數萬犯界濠張琪解下遁甲秘文上告眞武神靈作法隱形於搉場致遭捉獲知遠蒙恩放歸當時入場却覺頭熱身寒被宋朝家神眞武眞君降聖護持本蕃亦曾供養爲觸犯不靈今西梁城已是招伏通和更無作亂之意再犯神怒所獻地里願求授眞武分降入蕃依例供養奉聖㫖令四聖觀編録眞武下降一切供養儀範回答及下雄州交割所進地里入籍拘收其胡知從知遠至今通和兵革永息以致雄州减退三分兵級支賜皆國家感召神靈顯相宜速遣使命往西北方名山洞天修建金籙齋醮庶表宸衷願回聖鑒瓢傾三萬徐州陳昭倚任明州通判時因遊天童山見鎸眞武一身用硃緑裝填立山路塵穢處一龜四足皆折過者不顧昭倚備錢募匠接續聖相添修龜足蓋造殿屋一間昭倚得替在西門湖塘見道人從水面來叩船求相見昭倚失於出遲却回身而去云特來報謝成立我身之恩昭倚追思是眞武降靈爲修天童山石像報應耳乃畫眞武一軸供養官至太常少卿守徐州偶患脚尋醫寄居滕縣忽蒙朝廷察訪疾愈差充秦鳳路運副昭倚知西鄙以計運爲重憂將帶眞武隨身供養時經略總管岑元宥因乏糧給欲責運司忽有道流在軍營賣食藥軍人恐是西蕃細作面見場内良乆有人稱東庫火發即滅相持至曉北蕃折兵一萬餘衆張琪親擒到蕃將胡知遠招認是北蕃西梁士主節度使胡知從親弟與兄知從分割一千二百里接連雄州界其兄爲屬北蕃人俱在雄州搉場賣買課利競歸大朝有此心忿凡二年聚兵欲壞搉場不得其便知遠獻計動十萬兵至夜搶劫縁知遠入場放火時覺頭如斧斫身似水淋秪見雲中鬼神撮其火焰半揚半滅散於空中又見一神將披髮仗劍喝令不得走知遠走出前被大蛇攔截後遇一龜銜定被張琪捉下若得一命回蕃限一月日與兄知從同齎誓書來降王勔會集衆官面議遂放胡知遠歸蕃保明申奏蒙降指揮謹就在京四聖觀設醮一會仍於雄州搉場建造報恩眞武殿令選道士焚修許令刊碑爲記其敢勇張琪特授右班殿直雄州據北蕃西梁城節度使胡知從遣趙繼明入國進奏雄州差官就界接伴續具劄差使星夜准聞准中書看詳胡知從是分土淺蕃節鎭諸侯近因動兵來劫搉場若非敢勇張琪精通遁甲告現眞武福神生擒胡知遠却放歸蕃尅伏甘降今再有使臣秪令就雄州接待審問申奏經略王勔遂引趙繼明入城稱欲割獻粟地一百四十里有六百户植利并進表一通近因搶劫搉帥首却稱是陳昭倚親隨人姓裴傳得此方曾救天下無限餓人爲見招討正此嗔責本官又恐糧草應副失時故來貨散靈丹定不誤事岑元宥試分數服與傷中臨死人喫皆云胸腹飽滿其流取一瓢子付無宥告云我亦有此藥一囊欲往西陣李大王處貨賣岑元宥驚異將此藥瓢子傾俵其藥約三萬有餘俵足人馬兼瓢子底有襯紙一片題字云是太常少卿陳昭倚家神裴眞人救願之法士馬服此三日不食省免糧草次又西蕃李大王來問稱令奸人來賣接骨風藥數萬人服之皆如癰痪倒卧不敢約戰情願回蕃元宥安坐獲勝并寫紙昭應曾於唐則天時生裴侍郞家留此姓氏今岑元宥幾通聞奏蒙三司參詳除將校依次給賞其陳昭倚陞禮部侍郞所有岑元宥收到藥瓢子紙上文墨收寄天章閣宜詔天下天慶觀普設醮籙七晝夜及係眞武觀宇許支官錢修葺壺俵一京東京紫極四聖觀童行洪知辯捨俗出家逐日掃併三門殿廊夜間打鋪宿於廊下縁四聖畫於紫極殿兩軒四壁除本觀常行香火外知辯逐日自打化錢收買箋檀焚誦供養二十年不輟至和二年京城雨雪夜深忽見門下有貨藥道人用蒲袋枕頭卧於濕地知辯恐風雪相逼遂唤他起引入鋪席内同睡至曉道士辭去知辯告曰纔食後便困倦人說是脾疾願求一二服蒙將壺蘆子摇動裏有藥數丸連壺蘆付與知辯令候子時用淨水面北念金闕眞人七遍吞下一丸餘留備急救人道士出門不見知辯當夜喫一服更不思飲食在京皆云知辯遇仙絶粒以致親王宰執臣僚委證詣實遂達聖聰蒙委開封府及御史臺撫問元遇情由内有金闕眞人之語詳解即眞武本師太上老君之號時京城軍民乆遭雨雪多患瘟疫知辯遂將壺蘆内藥丸施散秪圖略救數人其壺蘆直至傾俵一京約四萬餘人其藥尚未盡而患者安全臺奏請其洪知辯特賜度牒披戴及於本觀建眞武大醮大齋用報降遇之恩雪晴濟路雄州防禦使殿前諸軍檢校副虞候戴夔奉差部兵十萬往安南方到邕州值大雪停住半月糧草不給凍死不少有隨軍指使方琮告曰隆冬道路積雪六尺般運阻絶欲救人馬性命除是告祝眞武福神冀獲晴霽方琮今帶得畫像在此戴夔便備辦供養面對眞武幀像發露誠禱纔燒奏紙不移時間即獲晴霽雲收日照道路通濟即届安南仍獲全勝奉聖㫖宜就新建眞武寳應閣啓建法醮七晝夜答謝風浪救嵒天聖二年十二月萊州梅江巡檢龍夢錫擅帶弓甲巡捉私鹽與兵級同情規取㳂海居民財物入己夢錫既聞彰露差官追勘却同諸軍謀叛帶領家屬入海劫掠商船殺傷人命搔擾鎭市聚集海寇數百人委是難收尋據逐司具狀告急蒙朝廷差登州都巡檢陸奉選精能水軍一千人收戮後來陸奉被龔夢錫擁向海洋深際誾山下經五日糧盡無由出得誾山嵓陸奉思惟本家侍奉眞武香火所求必應是夜情急不覺失聲叫云眞武救應數句衆軍夜坐船中半夜忽覺潮水泛漲風浪翻湧聞得龔夢錫海口人船叫噉殺聲霧暗遮隔陸奉軍船至曉見仰浮死屍俱在陸奉船前及有破壞戰船灌溺沉於淺沙認來即龔夢錫并家口皆死在船有二十來人得命者用繩索執縳陸奉令水手斫到首級回青州經略安撫司將生縛軍寇勘問是夜黑雲之中神將鬼兵毒蛇猛獸蔽於虚空不可名狀是時州府默審聖道降靈乃關報合屬照會蒙經略安撫梁賈録奏奉聖㫖陸奉轉除崇儀使仍下萊州於梅江海口巡檢司建殿奉安眞武聖像并左右神將天兵以助戰報恩廟爲額聖箭垂粉天禧中兵部侍郞充瀛州高陽關兵馬都總管知瀛州房之才狀奏蒙差到任經三月有淺蕃萍蕪寨主魯繼成等二千餘人於元年八月十六日夜擅侵疆界搶劫去青木堡糧草四千餘石本關遂差第四將鄒淑及指使劉翊將兵二千去蕃界取問次日有蕃兵一萬衆來有一將云燕廉信爲北燕王聶胡祈因青木堡每年收軍糧草豆千餘萬點差將兵二萬來奪夜到萍蕪寨其寨主魯繼成獻計圖青木堡不作准備於十六日夜越界搶奪軍糧鄒淑謂曰大燕天子已和睦其北燕王聶胡祈以下敢擅用兵侵奪今不欲申奏朝廷便請遣使入燕國發遣所劫糧草交還青木堡其燕廉信不允遂致戰敵蕃兵大敗聶胡祈乃帥兵二十餘萬隨後將瀛州西北兩門近濠半里圍合六日不退至第七日時當九月九日不覺刮地狂風煙雨迷亂祇聞蕃兵噉聲拽隊奔走差兵追逐據鄒淑等於草徑中收得傷中蕃人數名房之才聚問内一人云未審城内有何神道祇見西北兩門振地狂風吹起沙塵遮撲眼目但見箭翎如雨驟之聲有無數蟒蛇趕咬人馬聶胡祈於馬上叫得字一聲收軍便走某等各中蛇咬箭傷走趁不前今被收捉當時看驗逐人所傷并是蛇齒咬損并中箭瘡亦無出入紋路顯是神靈旬日間據界濠巡檢押到蕃校二人封合皮筒文字上寫指定大朝瀛州高陽關都總管房侍郞開拆却稱今後不敢擅發兵馬聶胡祈於右眼暗中一箭及取落箭鋒於手中化爲灰粉如壁畫者及風塵内變現毒蛇神鬼趕敗蕃兵二十餘萬不知本關供養何神如此靈驗今封去神箭一隻諸將定驗名祠回報責要祈求保安眼目房之才將箭細看委是粉壁者遍往宫觀寺院及廟宇並無此壁畫後往州南新創壽先廟内正壁畫北極紫微大帝兩畔畫四聖皆掛金甲立身各帶箭篋至眞武箭篋當中闕晝箭一隻繼將蕃中送到者灰壁畫色比對一同房之才焚香復將壁箭親手逐廊楷上箭篋闕處輳依畫壁如故但有絲痕微露爲驗本司已具縁由遣使回蕃奏取照會朝廷遣降御香往瀛州壽先廟建醮仍告命天下宫觀如無眞武殿即仰建立及下高陽關推賞神槍竹刃知賔州蘇咸投遺表論柱州安撫司不發救兵來拒蠻寇致守臣身死其蘇咸死後有監稅王褒被差巡城半夜越墻濠私遁值雷雨走入林中被數神人擒捉問何人潜竄應曰賔州監税王褒畏懼而逃其主者乃喝王褒曰太平時貪利禄濫受國家當其急難畏避奔走合與一死縁一城人民不忍枉遭屠戮目即未有救兵今特借汝槍一條步兵五十人乗今夜雷雨之勢趕去蠻寇王褒曰自來不學武况蠻虜數千赤脚兇惡之徒五十餘卒何以當之亦不明是甚方聖賢願垂指示神中部從云汝但執其槍領五十衆急速用事若得此功他日榮顯欲國家知委但云北方三元遊奕大將軍也王褒暗中受槍領兵出林隨後電光相逐到蠻子寨秪聞霹靂一聲震驚蠻衆闔寨競相鬥敵至曉蠻隊已臨海口離賔州城二百五十餘里當夜天兵到時蠻寇大半先乗筏過海逃遁惟陰兵趕散不留一寇賔州一城生靈不遭塗炭時軍將知得因依具奏朝廷檢會蘇咸遺表量與恩例其王褒係眞武威德教令護國救民可加授崇儀使并交點本人所遇神槍看驗即是蠻隊中所用火鋼竹刃以顯福神於倉卒間有奪勝之權宜令賔州建立報恩護國觀修奉眞武香火歲度焚修道士一人用答陰相神獸驅電天祐元年二月一日興元府觀察留後錢公偃奏稱蒙樞密院選差充鄜延路安撫招討使退除西蕃趙天祐兵革遂依禀交割兵馬四萬餘衆却抵西域三十萬衆校其勢力顯有優劣實抱憂懼不免告急於朝廷亦慮事有迂迴之故時有隨軍虞候袁政素習北斗玄剛法奉侍一北極遊奕眞武將軍誠心習行二十餘年願於元帥帳前鋪設供養錢公偃即自虔誠撰奏詞籙具述西域因依欲仗陰助是夜袁政將背掛眞武供養至三更行法燒化并醮獻北極四聖元辰諸司訖次日趙天祐以十萬兵索令調戰方遣指使孫億出馬與西將交槍繼發兵大戰到二更以來兩向有萬道火光迸爍軍陣逼逐干戈西蕃人馬各各搶旗斷折弓弩落弦金鼓錯亂走如奔鹿諸軍乗勢趕進似覺天明乃見隨軍第六將錢從吉挾到蕃帥趙天祐首級諸兵將皆言夜來陣上見無數魚腮鳥觜醜惡異相披頭跣足或驅風電或趕蛇獸是以接勢剪伐蕃軍卧尸數萬惟有一道火光驅逐一馬騎落路而走錢從吉認是趙天祐乃得首級且以四萬人馬往敵二十萬衆若非虞候袁政獻陳道法任以至誠蒙眞武降臨兵陣現火光萬道露神獸萬形大敗蕃衆仍獲渠魁如此顯應三司禮部定到虞候袁政出給公據放今逐便又奉聖㫖賜酬奬錢五百貫就在京上清靈應宫建道場一月仍設普天醮其錢公偃轉一官除宣徽院使毒蜂靄雲西京崇福宫有北極紫微閣唐則天時建倣傚天宫有二勝四將之院有前後帝代御書每年係故老重臣監提并使命管掌非同常處近爲右角一簷傾坍漸傷聖像尋報判府侍郞富弼偕諸官來驗見一椽斜墜損眞武右肩不敢擅修合具申取㫖却有内侍岑靜奉勑齎香誥獻崇福宫諸殿委提轄及判府等計驗北極紫微閣眞武福神身相有無動損近爲皇帝於寢室見神人紫綬金帶端笏纓稱臣是西京崇福宫北極紫微閣傳奏土地今爲本殿眞武靈應眞君因與皇帝助戰西蕃趙元昊化黑蜂遍滿軍前特助元帥龐籍獲勝爲施神功護國右臂傷中不可盡言臣若不奏聞陛下無縁得知言訖辭去時安西士馬雖未回朝知府富弼其前項付岑靜回奏奉聖㫖差殿使及八作坊工匠并賜金字牌一面限一年重新修蓋兵部尚書門下平章事龐籍劄子稱面奉委差安西征討趙元昊方大軍臨三鳳川與趙元昊親戰經三時辰忽有黑黄士蜂起如雲靄遍及郊原競趨西兵見蕃衆傷中倒卧萬數遂掠數人驗視並非器刃所傷或秪面目三五黠黯損據云痛切心髓蓋是宋朝有無礙智力神道顯聖化爲毒蜂甚於矢石先是趙元昊被螫頭如中一大斧負痛敗歸造甘伏文字過界時元帥龐籍接受元昊實封奏表降納地圖親齎回朝面賀進呈奉聖㫖送中書看詳取會到崇福宫土地來現預報勝因除都統龐籍别行勳贈外就四聖觀修建道場保國護民聖醮三書夜答眞武征西助國之恩玄天上帝啓聖録卷之三
