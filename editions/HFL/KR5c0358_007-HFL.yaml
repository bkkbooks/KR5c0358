front:
  text: 玄天上帝啓聖録卷之七流七
  hash: sha256:a1d8713ea57d5d2426d6554757680d3fe89ecb5b779d75a80e475c37f34d169f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0358_HFL_007-001a, image: hfl/0607/0607-138.png}
body:
  text: 小童應夢越州會稽山東有陽明洞天自文穆王錢氏建立龍瑞宫年深荒廢内有眞武殿最爲朽墮淳化元年二月一日夜文懿皇后玉華宫應夢見髼頭小童身披皁袍來見皇后云我是越州龍瑞宫道童爲本宫貧乏無衣可衣無屋可存身遭暴露惟皇后可以救之他日必來報恩化爲光明不見明旦具述奏聞時遣使齎香往龍瑞宫察訪内臣閻守道回奏本宫建自唐末經今年深全損一殿眞武部從被雨淋日曝推倒在地因省悟前夕之夢是眞武顯應來求后宫修整宫殿重興香火之意已奏取聖㫖允許皇后發心將䊋具奩寳兊换度牒紫衣及金銀等差内臣同委越年限一年重建殿宇及聖像裝彩完備訖忽爲皇后染患翻胃四十來日醫理未退忽一日冥然而卧出入息微細相次氣回遂無嘔逆之狀自然平復乃曰適見眞武從雲中來謝龍瑞宫並已完葺皇后命雖未夭病亦乆矣遂令童子取到一淨瓶一淨盂於瓶内傾出五方甘露玉液於盂中勸令飲之遂覺醍醐灌心胸膈清凉厥疾頓除試開眼又如昨夢不見衹覺口内異香四肢輕爽起居如常以顯靈感國家再致謚言重加勳醮用答神貺高聖降凡益州成都府青城大羅山上清玉華宫係國家名山洞天崇福第四處每年有金籙玉符眞境道君上昇遺文歲賜恩澤一十二道明道中五月五日成都府藥市成集至初六日須有十方雲水道人競來本宫赴初七日眞武昇天齋會常有神仙降臨度人顯化白日上昇時有一道士裙裾下拖一龜尾人謂精怪皆嚲避之俄見此人與本州兵馬都監寇通男克明上在高峰之上衆疑被此精怪疑惑領兵衆趕奪其道士化白光不見克明不覺墜下因此矢心斷絶飲食又不言話其父寇通移任元梁城寨主因循七年克明同家屬寄居興元府至慶曆三年五月五日天未明時克明違家潜迹不見却在益州玉華宫復與舊年帶尾道士同行本宫請二人赴齋至食遍秪見克明不見同行道士衆皆驚愕食至第九味有一大龜忽然在克明座下乃乗克明離座直上空虚祥雲四合克明坐龜上昇其父通又於元梁寨見男克明來辭今已授下北極七元勘壽司判官蒙我師眞武令大龜乗載朝天矣後成都府申奏今年藥市上昇人姓名准回降指揮取問克明有何功業據寇通具狀稱秪有此男元將錢帛於經過道人處買得爲子逐日好修養看老子道德經愛燒夜香朝禮北極常持誦本師眞武尊號不食禁忌之物多持齋戒不行纖毫欺曲之事又准中書劄子指揮看詳四方異地常有如斯高聖應迹降凡度人上昇合下成都府建立祠殿令道士焚修立碑爲記特封靈顯眞君并用靈顯祠爲額及契勘克明祖父鄉貫係屬西京乾濠鎭仍就本鎭亦立祠堂七從借名尚書刑部郞中知瀛州事高陽關都總管陳疇劄奏自前朝興元四年五月内却有北蕃郞官伊壽先兄弟七人執到兩界公憑車載氈帛香貨五萬餘貫來投搉貨務出賣欲將賣錢權寄官庫候歸蕃計會後次貨物到來般取前去可及一十五年並無消息後因太祖登極郊天恰限瀛州缺賞給五萬餘貫無計借貸不期本人前來陳狀願將其錢與官中支遣賞給從此瀛州委憑借支已得均足時高陽關刺史鄭度遂唤伊壽先等七人取問因依所寄此錢即非壽先等財物係興元年中太祖仕於世宗時曾爲帥守瀛州忽過太白星化爲白衣道士勸諫太祖集道德仁行向去貴顯非常矣太祖乃曰天曹有何靈應助身貴顯道士云沿邊有逆虜叛臣故朝廷委託收戮今奸叛潜息皆是北極眞武暗中護助言訖其道士化白光歸天時太祖就瀛州設大醮七晝夜燒獻天曹諸位紙幣外燒金紙五萬貫有餘却爲天曹點對此項金紙五萬餘貫不當受領遂付北極行遣係佑勝院眞武牒七元北斗七辰掌計其伊壽先七人即是七辰下七從大宋啓運立極蒙眞武面奏三天詳將元不受醮錢還新宋充登極沿邊賞給因差七辰借北蕃廟名爲伊壽先將錢化買氈寳等物約五萬貫寄州納還此去蕃界百里有廟名壽先廟係四聖祠影其眞武部下有七從官各緋抹額著黄袍手執青魚腰繫白琱脚踏皁靴謂五方五色七元七辰充眞武管掌天下善惡公事即是壽先等七人之形相也取問訖壽先等當廳前如驟風一陣不見時知通等結罪保奏續降指揮先將其錢充支賞給外候别行勘會施行二眞顯化觀文殿學士新差知眞定府充河北西路兵馬鈐轄兼經略安撫使石光祖因受差路次澶州界夜宿圓通寺聞寺中有一道者本是鄧州武當縣人姓郭自到寺十五年未嘗與人言話秪四季布種新奇蔬菜供備齋厨光祖同知事僧夜到其寮乃出迎接歸寮坐道者忽開言告光祖曰觀文莫赴眞定之任縁期限已至見面部氣色秪數日事寺僧聞之驚疑至來早其道者不見蹤由所有菜子亦自變爲常種者因而光祖不赴眞定就此上表求致仕歸趙州遂於此日辰時忽索湯澡浴仍换朝服卧於淨舍而終澶州太守發奏未到闕而光祖從空化形先至崇政殿下見皇帝奏稱臣至澶州圓通寺得遇舊日同行郭眞人隱身爲種菜道者十五年於此候臣今當去矣臣光祖乃是北極眞武眞君下副參謀中元眞人今郭眞人乃是北極檢校使其人當墜二七之年臣本謫六十年遇甲子復歸元首臣若不來辭謝皇帝三十餘年重禄優恩於後恐難面聖兼臣有子庭之雖受官在身恐愚騃未任事伏望聖慈憫念拜辭而隱相次中書進呈澶州所奏頗合適來現化事意分明仍贈太子少師并就澶州圓通寺立其顯化石郭二眞人殿宇奉聖㫖改圓通寺爲勅賜隱眞承天觀仍立碑記索錢二萬衡州衡山南嶽嵩陽觀係唐賢柳宗元施財建立眞武殿閣一所工巧高聳本路第一自住持吴筠以後本閣收到遂日看經開殿施利錢二萬餘貫日漸聚積前任發運副使錢操擘畫申奏權借眞武閣收到施利錢二萬貫分往潭澧等州充上供糴本錢操經五年再行發運事忽有道士投狀稱是南嶽嵩陽觀徒弟爲眞武閣損漏欲重新修造告索前來借錢二萬貫操云此是國家借用何縁要索投狀復還况嵩陽觀眞武閣本是基址弘壯驀於近日自然斜側亦無徒弟往運司陳狀理索其錢操從此染患遍身白癩疼痛呻吟遂退官半年忽夜夢見南嶽道士吴筠帶領神人趕索二萬貫借錢操方省悟將産業出賣盡數支還元錢願求保安身位纔起此心癩病漸除亦不夢人索錢不逾月安愈親往嵩陽觀禮謁眞武未般錢入觀其閣尚猶斜側至送入本觀了當一夜風雨大雷一振其閣聳直如故錢操復官爲翰林面奏上項感應事迹奉聖㫖賜南嶽嵩陽觀加贈眞武閣勅額靈驗金字牌等如後積聚錢物官司不得借兊翻鈔四千饒州鄱陽縣明化宫道士黄宗古因隨師朱世元往洪州俠道山從此覺悟潜走西川雲遊八年至大中祥符五年十月内爲明化宫遺火焚燒罄盡秪有東廊一小殿見存乃是眞武殿並無煙焰侵迹忽准本州關報仰收官錢四千貫文抵擬支還明化宫黄宗古係在京先納寄庫鈔子錢椿造明化宫使用既承指揮勾集明化宫道士朱世元等取問稱本宫雖有徒弟黄宗古雲遊八年不知存亡那得預知本宫遺火因何有錢在官難便信憑不逾旬日黄宗古親執饒州翻换便錢公憑歸來并更有金銀祠部約一千餘貫謂師主曰昨棄師雲遊入梓巖山逢一道人邀宗古到草庵中對話貧道有願在心終未能了聽吾囑付吾知饒州鄱陽縣明化宫至祥符五年十月内爲火德星君躔入陳國分野正照饒州一郡縣鎭同時合遭火灾蒙眞武面奏北帝及火星曰饒州地善人慈今當火運伏望聖慈哀憐减降今觀近郭鄱陽縣有明化宫内三清大殿後壁畫饒州諸縣境邑地里圖若將明化宫不害道衆焚毁祈當一郡火灾必須應禳得過火星聞此不敢拒違自問眞武曰此處曾有眞君香火殿宇無答曰有因而歎念眞君乃金闕上清老君弟子應屬森羅天主候明化宫降火日當爲存留本殿也至時道行奔走避免竊恐無人興續宫庭可請宗古去汴河一帶縁化眞至東京聚蓄錢物歸鄉修蓋吾乃鄱陽故人候歸明化却得相見遂遣宗古離庵行數步回視更不見庵亦無人跡宗古恍然如雲霧間出得梓巖復到泗州汴口從此將隨身西山十二眞君籖一百二十道手携眞武影幀發心起賣籖卦每一籖四文道術盛行逐日般費之外常有五七百金所得籤錢逐處買金銀寄附前後經六年約聚錢及五千餘貫寄留五嶽觀忽一日路逢饒州商販之人來報宗古稱明化宫遭火燒盡所以將上件錢物就在京納於官庫出給鈔子憑據候歸饒州鄱陽縣支會及至歸鄉其宫果遭火灾惟留眞武一殿宗古又自細認本殿立身眞武面部與在梓巖山相遇道人無異道士朱世元等遂赴鄱陽縣請領元寄納鈔子錢及將到祠部之類出賣不逾五年鼎新復建明化宫一所了畢據黄宗古從始至末其前項縁由經饒州陳請别行記録其時知燒州謝懋等特具保明申奏朝廷後承回降改明化宫爲寧安宫其道士黄宗古號通祥大師賜紫并舊存眞武殿加賜護國二字水雲護笈單州求食婦人楊素眞因在京散禄右職袁清往來其家見伊别無親屬却有奩具等物遂誘引離鄉泛舟孟陽湖夜宿葦岸袁清飲醉素眞推墜深潭謂伊必已沉死急唤梢公等人言縣君因醉渴叩船取水失身墜落却令移蹤撩救虚發哭聲速要回州作功德追薦既到濮州將素眞奩物約千餘貫典賣互用在此居房半載忽於街市見一布衣婦人念經求化袁清見之將謂是揚素眞魂魄噤口不能言當時素眞叫報厢巡解送州府下所司根勘據袁清招伏因問素眞如何得命次到濮州稱自祖任班行不幸父母亡殁因居單州流落風塵雖身係娼婦而心實慕善常時供養眞武逐日看誦道經後於天慶觀求施金書小字眞武妙經一卷用綵帛袋子帶在髻根頭繻内不曾離棄是夜被袁清推落急水中但覺如雲霧身泛虚空頭頂上似有鬼神光輪旋轉叫云護持寳笈至天明神鬼散去不覺身在湖岸草徑全身濕透惟所繫金書經符不濕在近人家憐憫素眞唤引歸家整救蘇醒詢其所在却是孟州界分從此賣衣裝换布素誦道經求日給因經歷河陽濮州不期遇此寃家若當其行意之際無髻内之經即永沉水底作無主屈死孤魂有何出期今濮州看詳袁淸情法二重具奏朝廷准中書批狀其袁清不許用官引赦依法施行素眞請得餘剩物件兊買祠部改名仲嚴投禮慈慶宫女道士湯晋通出家披戴從此發心出街縁化建造三清七元二殿及剙眞武寳閣天宫慈化轉輪法藏依金書救得自身眞武經本子印施五千卷又蒙宰相向公具奏奉聖㫖楊仲嚴特賜紫服并賜慈慶大師號仍改賜宫額爲護聖宫風霧卸函駕部郞中王衮致仕歸宿州因悟殺生發心寫道經一藏募到陳方等十四人逐日對眞武像前各令精潔端楷不誤一字内有周惟吉敏捷稍倍寫於餘人驀然惟吉右手患風筋脉拘急用筆不前其經卷不住裝寫漸得成辦陳方等十三人寫下經卷各曾對校唯周惟吉一十七函爲王衮憑託本人更不勘讀一例裝入函當來發心捨入太清延福宫縁本宫係内道場合先奏聞蒙聖㫖差到内侍任奇等監送延福宫爲未有正藏權寄眞武殿安著纔開殿門忽有黑霧遮障狂風旋轉良乆風霧雖息用案排疊經函忽有全函卸落累次裝疊不住王衮遂將卸下經軸看覷俱是周惟吉所寫王衮驀聞人在身畔言云盡是作僞貪工漏落因縁功德不備又無人在左右秪有泥塑直符背立王衮自知非理遂借眞本勘對脱落稍多就覓書生填寫補换再排入殿内其周惟吉所患右手瘡腫膿蛆滴瀝縁市求丐稱云因與王郞中寫藏經欺曲瞞隱誤嫌因縁見獲果報時内侍任奇等知得因依入内面奏奉聖㫖就延福宫建造藏殿安著王衮所進道經籖詞應驗雍熙中越州大禹廟祝詞令官楊昉一生供養眞武常爲州民燒獻香紙保求事無不應時户部侍郞陳疇守越州忽蒙急詔赴闕陳疇疑懼未决吉凶乃唤陰陽人占問從人取覆有楊昉事奉眞武詳解籤詞最可准託尋往乾明觀眞武觀抽得黄眞君第四籤楊昉消詳云此籤主一百二十日内惡死切不可向東北鬼門上受權勢及爲旌騎統領行軍陳疇大怒將楊昉枷禁候一百二十日有纖粟灾禍情願將一官奏换楊昉恩澤若限外無事即仰本州勘招擅興扇惑前後取財入己論贜依法編配其後限過已乆越州准勅疏放楊昉授本州助教准前充禹廟祠令其陳疇到闕授鄆州安撫兼本路兵馬鈐轄收齊州虎頭山何清等逆黨疇受勅未去間思惟楊昉斷籤雖未全應似乎有驗縁鄆州正是東北鬼門又充本路鈐轄亦是統攝兵馬旌騎之意因朝辭面奏前項因依遂徑往虎頭山收何清等却於前路遇夜遭何清等迎敵軍隊衝散疇夜黑乗馬奔走被馬蹶蹄墜於深濠自知其身如被垂髮神人連馬提起在岸復尋元路就佐官軍馬次日整頓前進遂斬戮何清等逆黨却回京師不赴鄆州差遣從此驚恐失心染患尋醫再進劄子舉奏楊昉元定危難全賴眞武救護以此保奏賜楊昉前項恩澤仍令越州就郭立眞武殿宇陳疇自備俸錢就乾明觀修齋設醮報謝眞聖相術指迷宿州致仕駕部郞中王衮再蒙詔充國子司業遂於家堂回奏眞武求籤得吉乃進程忽於汴河塘岸遇一道士衹揖稱攻神相王衮邀上船獻茶乃問高隱何地道士云是華山雲臺觀徒弟姓裴王衮以一百二十金欲求一相裴道士云氣色喜盛須遷編撰衮曰見受司業亦係國家制撰又問官職位壽所至道士便起上岸回首云但記在後不可受史閣之職與庚辛方爲事若受之主死於餓雪骸骨不收道士向東而去更不受資王衮不以爲事後因西域不寧時全臺保舉王衮可充奉使其王衮元授駕部守司業今權御史大夫充天章閣待制衮甚有喜色忘却道士之言迤𨓦至西鄙蕃君李萬全宴會間出言相諷累遭玷辱將及出界回國慮負辱責却說誘從人潜馬走入羊山連被雪壓向巖穴中旬日不食忽見裴道士再來曰吾非凡人乃汝供養眞武也汝若依吾指教莫授御史大夫天章閣之職則事亦可免庚辛則西蕃方所雪中當餓死正是今日爲之奈何吾且去矣衮悔已不及遂死於羊山骨殖抛棄從人忘命歸國有司取問進呈契勘王衮本非奉使不功乃屬前定若眞武相術明指迷徑自不知避故喪其命其生前權借授御史大夫充天章閣待制今來更不追還贈同正賜并依品官例支賜招魂禮葬胡清棄業東京咸平縣胡清賣熟食爲業因五月五日燖殺鷄鵝偶然刀在手中寸折物命不死刀反傷手湯湧出鑊胡清自知殺害禽畜非理因此棄業欲走上京别求營生在路值夜又遭大雨入一古廟避雨止宿約三更以來見一披髮仗劍金甲神人叫起胡清還知有無數物類寃魂隨汝左右今不敢入此門來汝後尚有三十年天禄切自愛護言訖踏龜蛇向空而昇清遂驚起覺天朗月明回看廟中並無塑像并畫相秪有一碑額名鎭國眞武之祠及到京師月餘褁足罄盡思惟在路廟中眞武喝言向去三十年天禄此意除是充軍於是就驍勇習武藝不過二年遇國家殿試呈過弓馬鎗棒等種種絶倫於一千人中蒙御筆點爲第一先賜三班殿侍出身又宣臨殿降問有何異術并何處習武藝如此精熟胡清具奏遇神人露現喝報今日之事一一應驗從此又加轉三班奉職乆任邊庭轉至作坊使曾任潤州都大巡檢胡清終身侍奉眞聖香火仲和辭吏天聖八年京西許州吏人楊仲和差往蔡州勘鞫枉法斷朱惜姐臀杖十三後承勘官通判徐沂理會課績轉官未該酬奬在許州天慶觀設醮保助轉官請道士裴君叟拜奏青詞君叟手擊青詞拜伏案左約二時方興與徐沂云謹齎詞文詣玉皇金闕投進方到三天門下遇見北極紫微大帝領佑勝院善惡副判眞武靈應眞君奏事見君叟來投徐沂青詞蒙眞武賜言曰徐沂勘蔡州錢舉等藏匿家財二十餘萬計囑官司枉法勒有分親弟爲外姓被楊仲和將干證人朱惜姐故入杖罪爲有此負屈所以陰空不令從許見今定楊仲和等罪惡欲呈奏玉皇令君叟就此投下青詞急回自後徐沂任滿離去楊仲和從此辭棄吏門歸家誓修善事解脱罪惡因贖得眞武聖幀三時香火長齋稱念眞武尊號逐日接待僧道及孤貧或有人家死亡無力津送仲和即典賣物件出錢津送自此家道淪落妻孥死亡又將幼子賣與李員外家得錢六千亦施與人州郭有居士之稱經二十年皆藉親知照顧遂居僻巷一心供養眞武忽遇一貧道人相過曰汝本吏人罪惡如故何得悔悟棄家守貧奉聖無怠觀汝悔心必感天宥貧道有一册文字借汝傳之此術可以資身囑付畢道人忽不見仲和開視乃西山十二眞君籤仲和遂置竹籤一百二十竹筒盛之眞武像前不及旬日民俗翕然來占靈驗如神如求一籤必當三五十金或留一百文相酬至於州官俱來求問忽有本州新任司户李成道尋訪楊仲和稱是所生父七八歲時賣與鄰家李輔之十三上受所養父祖李中立侍郞奏蔭恩澤十九上銓試注授本州司户因知骨肉並死獨有親父揚仲和所以令人尋認皆稱近亦亡殁所有衣物除葬送支用外盡抄劄入官李成道聞此涕泣遂於寺觀修建功德薦悼一日李成道黄昏獨坐書院中見一老人道裝立於空中謂曰吾即汝所生父楊仲和矣汝身受貴汝宜忠正吾因悔過皈依上眞得眞聖傳授西山十二眞君籤拯濟衰朽今已壽終蒙東嶽照牒稱諭仲和身心正直授麻溪注禄判官又蒙眞武授記候此差遣了當許爲七元勾當吾秪有一事未滿心願吾生前供養眞武幀像并籖供具什物没官見在軍資庫塵垢之處可收取上件聖像等物歸家志誠供養必助汝善果言訖潜隱不見後官司估賣其物成道贖得於廨宇逐日供養忽一日朝廷置内臣袁良弼因皇后乆患心氣齎香往武勝軍仙圖山投獻金龍玉簡法醮經由許州同知州羅宗孟因見衙庭西南有紅光罩蓋屋宇令人探問稱是司户廳有官員士庶燒香瞻看一舊畫眞武像并籖一筒紅光覃定不散時羅宗孟同袁良弼往看良弼試將投龍聖意祈籤抽得鍾眞君第十大吉籤良弼親録奏聞縁文母太后已得夢漸安據録進靈籤却與應夢同意行下許州取會後李成道被本路提刑余斌用威勢迫脅求眞武幀像并具事什物纔到斌家畫絹片片零落化爲蝴蝶飛向空中所有竹籤一筒先蒙朝廷索去今大内寳應閣下者是也其成道奉聖㫖許還本姓楊轉授光禄寺主簿仍贈楊仲和爲悟本府君楊成道纔得轉官亦死今許州見存楊府君父子祠堂祈求有感良嗣感祥荆南府左班殿直孫良嗣一生供養眞武委有精虔常獲神貺因觀俗廛多殺物命每自思惟皆是輪回何忍爲之常出市肆見人携賣有命之物便須買歸或飛禽用籠罩或魚鼈用水器聚養至天明人未起取出抛放經十五年良嗣自然達理悟性凡所作爲並有奇感人皆號曰孫先生忽一日無病而卒卜葬荆積山南開墳有衆鳥銜泥裝壘土塍地穴出水池化生魚鼈地生芝蓋下槨時有五色祥雲覃映四向荆南府應係官庶僧道盡集墳所以香花旛蓋螺鈸法事祖獻時知府諫議大夫章庭老亦崇道奉眞步至墳前有一小竅現出龜蛇盤旋喜躍乃知孫先生終歸北極眞武之佐矣應現靈物移時自然不見州府地境既有異人感諸佳祥理當具奏朝廷續准中書劄子令於孫先生墳所造廟刊碑記其聖應行狀贈孫府君廟爲額玄天上帝啓聖録卷之七
