front:
  text: 玄天上帝啓聖録卷之二流二
  hash: sha256:c526858c330f2159885dcdb123c6f83135666639d9316fbb4893888b5a5fadff
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0358_SJB_002-190579c, image: sjb/19/190579c.png}
body:
  text: 歸天降日唐則天朝有門下侍郞裴濤劄子奏聞臣濤昨蒙差充西郊縣令忽夜夢見太上老君下降入於卧所告云唐朝將有邪禍妖臣鬥亂國政不能剪除是謂大患有北方神將名曰眞武合注下界修第四次天行因果合當在濤家寄胎降世其妻乃生男仲方近國家收戮西蕃趙弘二千邪寇生擒回國并驗本朝奸佞賀全龍五百妖童與民間斬滅邪禍救護不少今爲臣男仲方曾受神應將軍於是傳播天下漏泄天機一日臣與妻語論次其男於座前放開兩手有朱砂肉跡篆字臣將辯認其左手心眞字右手心武字繼捻雙拳更不放開乃取香湯沐浴更换淨衣告辭父母而去如要相見秪於每月一次下降時普爲天下修善之人消解罪惡臣告仲方今既捨父歸天未審後來每月下降在於甚日今從何往仲方曰復歸北闕若要知吾下降日分正月七日三月八日三月九日四月四日五月五日六月七日七月七日八月十三日九月九日十月二十一日十一月七日十二月二十七日是吾下降日也去從地去來從天來言訖握手於膝坐於卧牀而去臣合聞奏伏候進止奉聖㫖特賜道教威儀法事差使押香前去裴濤家祝獻奠使方到不見仲方肉身但見空中祥雲垂下仙仗舁一銅棺盛貯音樂嘹亮散花滿空引聲向武當山路冉冉而去自唐則天時授得逐月下降日分方始奉行供養贈爲武當山傳道眞武靈應眞君供聖重時閬州進士陳喻言少年三解不第偶會益州青城山鐵柱觀道士焦之微言陳君空懷文學皆是業縁不曾於陰曹注受豈不聞今世例多崇信眞武若依此奉修必獲福貴喻言曰今若發心供養莫已遲否焦之微云若虔志精恪不論年深日近從此每遇月與日重時但如法供養喻言急以淨帛畫眞武聖眞一軸於本家供養戒心受持時遇五月五日天毒節辰喻言思惟焦之微曾言遇月與日重時供養者此心無遲夜至戌時置香燭案於門首露天朝北禮一百拜燒獻紙幣次朝喻言與妻劉氏言夜來我得一夢甚異夢見身著紫袍腰繫金帶手握天下人姓名簿籍恐今次科場必不失矣喻言因而促裝西上一涉十年不知消息妻劉氏經州陳狀沿牒到京尋討尚未行遣忽有走吏齎到皮筒一角上稱家書附達閬州盤神巷供養眞武陳判官宅走吏纔出衙門便不見試差人將皮筒往盤神巷尋陳判官宅分付其盤神巷秪有陳喻言秀才自入京應舉十年不歸焉得有陳判官名目是時知閬州錢延年詳劉氏狀稱夫主陳喻言秀才上京取解不歸遂唤到劉氏取問因由召集衆官并唤劉氏親屬男女等焚香將皮筒開拆披讀委是陳諭言墨跡述自離家入京羞辱不第如神鬼迷惑誤入西京栢梁山天壽洞遇青衣童子二人齎到玉皇金籙引喻言去見北極帝君差充眞武佑勝院副注生善惡壽命長短判官賜紫衣金帶交割天下世人姓名案卷蒙眞武授記云汝尚有凡胎功行未滿又差爲北元七君下權掌校量諸天宫分神仙差遣一次却歸佑勝院喻言因此忘歸無音信回鄉因隨兹主遊奕下降見閬州有怨氣衝天蒙眞武詳驗却是喻言妻兒銜怨爲不知存亡之故喻言乃哀訴蒙眞武垂慈許令親録心意家書一角差直日遊神化凡齎赴閬州通官投放責令妻守志仍舊業産存濟男女切須崇敬本家眞武香火不可欺心昧聖吾雖有報國之志縁累舉不第今係天曹主執常懷保護國朝安民利物亦當陰有所助恐汝等思念故遣此親墨爲報本州奏朝廷續有回降下閬州看詳陳喻言雖人間顯禄無分却於天界官職有縁而懷報國安民之志切知已受眞武部屬又縁眞武朕素所崇敬天下受恩宜賜法醮一會七畫夜就玉津園備設報謝眞武仍下閬州支錢三百貫給付陳判官妻兒充作功德報恩使用并就近便宫觀置佑勝判官陳府君祠堂參定避忌中書門下三司禮部同奉聖㫖遍行根討眞武前後於國於民或因供養或自然得遇靈驗事實共成奏章總爲一百四件事各有門例切縁今來内庭創换殿閣立于五方五門名額相異今參定眞武家政殿中正大門以玄都大滌爲額左掖上門係東道以福清玄眞爲額下門係南道以翼勝龍遊爲額右掖上門係西道以玉慈金壽爲額下門係北道以長生廣化爲額中門分管啓聖護國求謝感應奏章三十一件東門分管啓聖行軍祈感助戰奏章一十三件西門分管啓聖祈請晴雨顯化奏章一十六件南門分管啓聖行慈救民疾病應驗奏章二十七件北門分管啓聖救報水火灾疫應時奏章一十七件及有龜蛇顯現事跡並附五門科目於後門記蓋以眞武殿閣未圓未敢徑行撰呈聽候圓備上祀日一就取進止勳賜并今後每遇逐月下降節朔以常式供養避忌等凡有乞字賊字合於本殿數目文籍不可稱用夏果除李子冬避石榴香信不得夾燒麝香非品官之家願乗例供養者聽尋具劄子奏聞奉聖㫖依準進到儀式伏惟上界眞武眞君於今治世助國安民欲報恩德已於内庭建立寳應閣及括摘到前後感應事跡共計一百四件合隨勳贈入閣次第關送史館編修删定傳録依逐處申奏科目照應合要閣下逐月下降節朔供養儀式今據住持泰山玉清昭應宫青城洞上清法師張子高進到式文眞武眞君每年定於六庚申六甲子三元五臘及逐月一日下降常行欲求保叙事意供養者並於是日天弗明時取井花水一盂用楊柳枝一枝浸之明燈或淨蠟燭一檠棗湯淨茶各一盞箋沉乳檀任便一炷不得用印濕和等香慮有麝觸時果素食供養内果子夏不用李子乃是眞君去冠除履之忌物冬避石榴因未成道時斬天下作禍鬼王爲魔法失向羅浮山不見父母之物茅香一穗供養至人定時戌亥間再焚香一炷全金錢一陌謂之五百貫黑雲馬一匹不用彩畫爲恐犯牛膠隨意願疏一通外用圓封庶人不得稱臣内用羅綵散花仍備金錢一葉謂之五貫符馬一匹先次露天燒獻今日直符神吏憑傳上件數目并錢馬等謹詣天門直趨眞武遊奕聖前通放燒化紙錢不得用油紙燼點火如此則不屬天曹地府陰陽百司收領化爲蠟錢係東嶽有司名枉積收繫壘成蠟錢山見有司錄記照證宜依此式施行中書點對進呈宜入寳應閣准此仍賜在朝崇信眞武宗室文武臣僚等受持依承供養洞天雲蓋龍圖閣直學士吕大防因奉使西蕃經林中川忽遭風雷驟雨狂瀾怒濤滿川暗黑大防恐此處有兩國祀典神壇靈跡屬户乃稱正北方有山曰青羅洞天係大宋地分其山常有光明時復亦有風霧雨雹兩界民户去此伐薪隔山聞得神人語言登陟四望髣髴瑞雲蓋覃隱約見一人披髮金甲皁袍身長三十餘丈坐於大盤石前有龜蛇後立皁旗前列旌幢華蓋知是眞武下降今日奉使過此又是上元日想衝遇眞武下降致被雲雨遮隔大防尋候風雨停息備香前往青羅山遥對眞武到處焚香禱祈願入國無虞早承回路仍求坏珓獲吉前去既見蕃王李成鄴爲安和樊江上産二千疆封當初蕃中將胡素寨界至割换不寧已曾通和後知西蕃遣使復要取奪縁樊江上産二千地界本朝已曾將聚居鄉民爲植利之處慮蕃中先有奉使過界以此係吕大防奉使入國其蕃王李成鄴與宋通和已依來㫖更不相違次因張延祖與諸蕃官送吕大防約行十五里五色散花滿空飄墜曾用物向上盛之俱成甘露及取嘗之如酥酷而香良乆化紅光漸散吕大防再至青羅山禮謝眞武其處山花彫殘枝條上非時盡開遍於林野曾令採摘入手還謝人防回朝面奏前項往回於青羅山遇眞武陰相特㫖下左右街道録選道士遣使同至青羅山致謝投放金龍玉簡乃立爲眞武降眞靈跡之處宫殿金裙至和二年五月五日建御願專誠法醮道場禁斷屠宰寬宥刑獄四十九日聖駕越内寢戒避服飾日夕醮會至八月初三日前殿滿空頓起風霧群僚侍駕親視現一渾金甲裙遍滿大殿漸收雲彩又露一足望西北角而去至初八日解散道場自眞武現足降靈聖意欽崇欲將家堂玄眞殿立身眞武删移出内别創報恩資殿禮部點對神威高廣兼係先皇特賜家堂之位天下官觀難爲當受體知亳州有太清靈都觀是太上老君降誕之處老君則眞武承道之師除此地他處不便三司具奏奉聖㫖選日臣僚陪御香送玄眞殿立身眞武出内及委官護送太清靈都觀權受供養仍下本州相度别造殿宇後亳州申奏靈都觀於十月一日殿前檜栢衰槁枝條皆結葉穗並如春苗見今採摘封合進上奉聖㫖送入景靈宫三殿供養旬日間聖體似覺違攝是夜夢見黄衣武士云是靈都觀符吏蒙眞武差來報帝曆數之兆因何殊無延展之心已曾有槁木發穗之報次日臣僚龐籍等共奏此事正當聖躬違和宜加攝理永延天禄亦在禳祈之誠行下諸路州軍發遣道師赴京有東嶽吴正言持法殊無眞驗再宣南嶽王伯初奏録北極紫微大帝保扶聖位尋同三司禮部進呈奉聖㫖依仁宗朝皇祐年中五月五日奉駕赴景靈宫行禮忽駕起回大内令臣僚配享禮畢朝賀蒙皇帝諭回駕之因既臨景靈宫朕舉目忽見北方天門開現紅光數道内有金甲裙琱拖一足滿空悠悠向前而過知是北方眞武又有一青衣童子引手指朕駕回方歸禁掖聞化成宫降慶即荆國長公主是也令於内庭别立眞武祠堂爲保扶香火之所後三日夜中庭又見元指回駕童子再來告言伏因皇帝駕出景靈宫化成宫已生公主其公主生時主於父宫臨背子息之位上天令避其時乃是眞武特加保護不受一切驚危今蒙眞君令報陛下其女降世秪一紀合歸天宫後果十三歲而卒當時仁廟爲獲此預事施内藏財寳立現足碑題新建景靈宫迎眞閣一座彩塑眞武今身充國家嘉典贈爲眞武下降垂福濟善通明恩澤以每年發放看香燈童行一名馬前戲躍至和中臣僚富弼等上言伏爲先祖太宗皇帝時建北極四聖觀於京城忽一夜於寢室睹一聖使頂冠佩服端簡乃曰北極紫微大帝殿前第四被將承建立宫觀欽崇吾等香火故來告謝帝曰四聖例受朕之諦信何獨君來謝眞武云天蓬天猷黑殺俱在雲空謝君其三神將常騎龍虎鬼兵群雜恐驚聖駕唯吾獨現朝辭而去帝睡起遂一記録次日駕赴四聖觀自後就内庭建造眞武家神堂一所額爲玄眞殿經今五十餘年蓋天帥眞武即凡降世佐助狄青行軍剪除西蕃李繼遷趙元昊兵寇二百萬南蠻儂智高山虜十萬况狄青有神賜面衣遂若眞武之貌前後勝敵盡屬眞武附助因詢歷聞奏遂賜狄青以下免罪許令赴嘉德廣鎭殿眞武現一行共二十八人各帶銅黄面具被髮紅綵裏額身掛介胄著昏黑背子跣足手執衙刀跨馬擺列公卿而下少辨眞僞惟宰相韓琦并御覽於馬上一人光煒悠悠馬前有青龜赤蛇戲躍在地移刻不見退後狄青易服色朝謝奉聖㫖令問狄青適在甚位立馬奏云在右厢第十人已副聖情見現光相之位因此致齋建醮願請眞武降現取至和二年五月五日起建壇醮道場其日家神堂有一赤蛇長二尺四寸時出堂門蟠躍殿使用盤合收盛進上復送還殿當時如電閃爍其殿鳴響或變黑霧秪聞暴雷一聲其蛇不見地面迎蟠東京四聖觀本是國家天元祖氏之宅自太祖策寳郊祀捨爲四聖護國建隆觀後因駕赴特祭天蓬天猷黑殺眞武時有龜蛇出於畫壁之下地面迎蟠在前其處有一小穴二物皆蟠伏認如土巢因而特賜玉磕石盤入其穴爲窠室於地臬口開立玉堰門洞至太宗皇帝及眞廟二朝其龜蛇亦曾於玉磕門内出現各應美事康定年中三月二十七日奉駕入四聖觀又睹龜蛇出來迎躍接駕蒙賜香求退來去約半時辰忽帥臣夏竦等申奏已伐趙元昊歸蕃備稱指使狄青之功其龜蛇停伏如審聽之狀帝覽表畢便各回入玉磕穴中不出奉勅再賜恩澤一道添置本殿香火聖像先鋒天禧年内西鄙奉使何隨入國進奉象馬金氈爲昨來與本朝兩軍未决尅伏間忽有術士誤入營寨貨賣傷筋折骨風藥四向軍寨買藥皆遍三日喫藥者三萬餘衆盡皆手足軟弱倒卧不起又探得帥將岑元宥行營正乏糧草亦有道士貨藥人馬服之三日不饑蕃中播云宋朝多感召北極眞武眞君保護今本蕃又詳眞武本傳既屬太清金闕眞人化身爲北極天將行恩普及天下宋朝得獲恩福本蕃却受殃禍爲蕃中不曾傳得眞武聖像并供養法式謹遣使臣奏請望賜眞武聖相一行侍從并供養格式降付本蕃依禀供養自後通和誓無侵掠門下看詳國家社稷天神難議盡行傳賜尋令翰院依家神殿式彩畫立身眞武一軸内不得畫龜蛇并録應干下降供具法式回答來使其蕃王李氏不明内少龜蛇此二物最爲眞聖之先鋒將謂已獲全實宣詔供養一依宋朝體式崇敬不事征伐每三年一次遣使進奉皆眞聖應化之恩也靈閣眞瑞端明殿學士知陜州充本路兵馬都鈐轄錢延年奉稱本府天慶觀有道士千衆厨供約近一千五百餘人每日收聚眞武聖閣靈籤開殿香錢相兼支用其閣是開寳年中太祖皇帝爲届潼關詔令使陶𤤴因獲是觀靈壇天文下河東未勝承天花遶黄河堤岸夜迎二十萬馬步軍兵入府從此知眞武救駕遂建報恩護聖之閣近來香火寂寥厨庫荒凉無人興營諸殿并眞武靈閣取問住持道士劉印眞據稱昨自太宗皇帝大駕因取河東回國爲太祖恩賜遺詰御書加贈眞武於下降日特添祭其齋醮令於軍資庫賜給施錢一百二十貫後至眞宗皇帝時爲西蕃不寧沿邊支備急用從此將添賜停倚是致道衆起離雲遊自然無人到殿抽籤所以堂厨不給忽數日前有龜蛇出現於眞武閣下盤旋臺座之間時出時入識者云此乃眞瑞擬慮國家有文字到觀延年爲聞太祖皇帝留心重道未及三紀頓成廢棄欲不避降責奏請興續未曾表奏忽有御劄到府委長吏勘會天慶觀見今實跡爲昭應宫近有慶誕偶睹金冠紫服眞人告言曰臣陜州天慶觀勾當主者爲見本觀道衆飄乏全乏供給縁陛下殊不以先朝置立爲念幸與早復存濟乃辭而去可體訪詣實回申延年已先知其事由具狀保明聞奏奉聖㫖先依太祖朝元賜遂件恩給仍召集本額道衆歸觀焚修并建醮三晝夜普答眞靈及眞武福神慈悲教主廣大恩威五人現相益州孫亨甫攻畫水墨眞武諸相可謂絶筆忽有雲遊道士五人來見亨甫云在華山雲臺觀住聞足下名欲求眞武一軸須候我自帶本來亨甫曰本家畫此功德天下傳名何用别本道士曰爾畫得第一到了未曾得遇眞本者且留錢在此買絹後月初七日取本來畫道士從西而去至期五人復來即無卷軸却云請備筆硯就裏面無人見處看本而畫亨甫邀入請本下筆却教亨甫背身看之不覺如火光運轉忽然通明五人各變相於雲端内有一身紅光籠覃披頭跣足全帶金甲械胄著昏皁袍手執絛鞭騎青鬃白馬面部純秀眼長眉堅鼻聳耳朝口方頤軃前有龜蛇後有貂脚皁旗認是眞武遊奕眞相又一人捧旗一人擎劍皆冠服顔貌麤陋如武士名天罡河魁又一人青衣琱帶掌事童女一人緋衣巾帶抱籍判官此五人眞相既現於虚空忽然不見亨甫記筆秪畫得一軸裝背了畢上有金色圓光自然隱現面相不常亨甫驚惶自以私家難留齎呈州府時知州蘇易簡録其詞封其畫差指使劉通同亨甫赴京進奉蒙宣公卿看驗委寳除已留納爲鎭國遇聖名畫充御殿香火家寳外其孫亨甫特賜三班奉職聽從舉注施行二士化光京東路青州鎭海軍祖來雖有宫觀未有北極眞武殿因節度使張操出海青州乃召内道職諭曰北極管注人間壽夭富貴貧賤眞武是北極神將逐月下降察人善惡以定罪福凡有祈求無不倚賴而民間不爲建殿何也張操發心自爲勸縁欲就天慶觀建此二殿首得其疏題注捨錢五百貫次及官員士庶樂然捨施興工塑造不日而成奈青州爲無粧塑之人張操一日焚香對天禱祝願得名手圓備功德不旬日間有二人來攬塑二殿聖像稱是吴人月餘皆已具備張操見衆官等前來瞻仰除聖相部從皆已圓備秪有眞武未開光明匠者二人欲各開一目分左右方用筆填出晴瞳秪見威容凛烈喜色異常於兩目開迸出金光一道二士遂於光中隨化不見以顯眞武垂慈親降塵凡圓備二殿功德張操率官屬士庶就北極眞武二殿廷醮設齋報謝上眞降臨之恩從此香火興盛後來青州遍行眼疾張操令道職湯鑒先當殿呪水散施洗滌俱瘥張操備述保奏蒙遣使降香建醮及賜嘉應殿爲額令立碑記唐憲寳像宣州市户唐忠唐愈唐憲唐愿兄弟同居忠愿充州衙幹當愈攻行醫憲守閑在家自祖父在日相續供養眞武一堂父亡兄弟皆疏慢惟唐憲心向香火將妻粧奩典賣添備下降香火紙馬等用豈期兄弟嫌妬稱憲端坐無功全房喫用衆兄弟衣食更以神道爲由破用錢物入己憲云既欲分張任便揀選所有之物唐憲秪願於衆求此祖上侍奉眞武一堂受持供養其忠愈願無心供養樂然允從忠愈愿私營錢物各自富庶惟憲秪留住屋其餘産業盡賣與人開一小雜當鋪隨縁遣日偶值雨雪有一貧漢背綰布袋手擊銅鉒坐身眞武一尊脚踏龜蛇極是工巧要當錢一貫憲請以錢三貫就贖亦便相允其時憑僧用祥作見人謝臻充保劉坦寫約交錢去後貧人却轉告憲留下二貫七百文少時來取憲將功德頓在家堂供養遇下降日再用香水洗淨漸覺色變沉重手擡不起用淨帛楷拭出於明處細視見其貌相微有爍爍圓光晃耀認來却是眞金像手約重五十餘兩元賣人又不來取錢不期兄弟三人意生欺妬同狀經州論憲於未分已前藏隱大家金鑄眞武五十餘兩分後方始將出供養州府遂勾唐憲齎所隱金像出頭據唐憲供吐元買到貧漢功德及勾到保見人并索元賣文字分明顯是唐忠等妄狀各行科决忠等因此家業淪落日逐來憲家行兇作鬧與妻隔夜拜辭金像明早潜將投納州庫後因監司剗刷上供錢帛因見官庫内有金像眞武一身微發祥光顯屬異寳遂申奏朝廷後降指揮仰宣州起發入京進奉奉聖㫖取入内庭充鎭國寳像仰於本州夏稅頭子錢内支五百貫文付唐憲充還金直唐憲因兹大富子孫昌盛其唐忠等三人各家飯食不給皆先死亡子孫零替盡是憲置宅存養宣州太極觀係唐憲一力捨錢建造朱氏金甎隰州陸諒嗜酒好殺恣餐鰻鱓其妻朱氏力戒不改自將粧奩潜託父母家命工彩畫眞武一軸請道士錢應方轉經安奉并受持下降法式應方曰供養福神第一須是虔誠發心不可等閑每月下降日燒獻金錢雲馬或有餘力請道誦經第二不得於酒後歸家高聲觸瀆第三大忌啗食大鼈鰻鱓蒜韮等物第四憐貧恤老孝育骨肉事涉公私心莫欺謟第五語言文字忌諱切在回避始終至誠勿令慢易一心五事保合吉祥疑惑之間求之必應門招龍神衛護家協福禄滋昌如或懈慢折人壽禄作事不利子嗣不昌官事重擾謹之謹之朱氏敬心受持陸諒不以爲意雖不買鰻鱓歸家却在外烹啗口帶葷穢朱氏雖遭魔障供養愈恪經十五年陸諒染患纏綿一歲生業漸破視其卧牀席上惟見一兩堆活物狀如小蛇蟠繞又發腦廱裂開臭爛湧出膿血皆長三寸狀如鰻鱓鮮活肉段盛聚出入相次命終男女未婚嫁朱氏在家堅心欽崇眞武香火略無怠倦雖生計蕭條僅存日給忽於本家客堂上露一片花甎朱氏將謂街砌甎石不以爲事是夜有光朱氏遂取看其石太重與男同扛歸來揩拭青苔乃是黄金極有紫磨光彩朱氏驚訝不敢收藏遂用綿帛包裹來投知州秘監蔣庭堅云自夫亡孤孀貧窘不知此金從何而來庭堅亦知因供養眞武天賜其金當時秤有一十四斤朱氏堅意不肯將歸到官司引用遺拾寳藏條貫欲均分一半入官尋勾到金銀匠方用砧鎚打鑿忽現無限小赤蛇并碧龜圍繞砧墩又一蛇稍大蟠在金片上良乆不見及挈其金看時猶有一蛇如絲線隱隱在金面内州司詳此應驗理合給還朱氏爲本人清願不留一任官司收納知州蔣庭堅通判田逵同狀保明并匣封上件金片進奏赴闕因看詳隰州陸諒無明宰殺業報疾患警示於人其妻誠心好善眞武應化特賜黄金其金顯是天賜不雜支用遂送入作坊盡將打造眞武一堂聖像遣使齎送武當山上清玉仙觀授金字御書看管每年恩澤度牒一道充焚修香火其朱氏特給度牒一道下隰州支錢絹各二百貫匹爲酬朱氏所得錢物半將板印眞武出相戒殺圖俵施上報國恩及薦亡夫陸諒其男女婚嫁仍舊開張絲綿鋪復獲興盛朱氏年八十九偶一日沐浴易新衣口誦眞武尊號無疾而終玄天上帝啓聖録卷之二
