front:
  text: 玄天上帝啓聖録卷之六流六
  hash: sha256:fe7ccd46d64179b62dcb9b0ca9b538beab005abbde2a4e9aa561b558dc56244d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0358_SJB_006-190610b, image: sjb/19/190610b.png}
body:
  text: 奏錄延壽仁宗皇帝於至和二年染患不豫據三司禮部校定到南嶽嵩陽觀法師王伯初劄子欲上奏北極審其壽曆須是遇庚申日皇帝御札奏章於是夜戌時躬親祈懇於星斗之下來早伯初必知奏章細因後至庚申日皇帝令宫儀副紙筆代寫奏録至戌時露天燒化次早宣問伯初却云夜來不曾有奏録到天界恐皇帝不曾親札奏章不專以致難達天闕乃用舊意至誠御札奏録於是夜懇禱燒奏次早伯初纔宣唤便稱慶賀臣已見夜來章奏傳到北極中天大帝殿下披閲見送眞武佑聖院保明更俟七日終獲是驗伯初親見奏章紙共七幅從頭暗念並無一字異同聖意喜悦至七日伯初復見屏退左右奏皇帝臣適在牛女宫衝接聖仗已蒙眞武保明仁德合展聖壽一紀之數回至西天門見葛將軍伸重望皇帝不可忘之縁此聖候平復賜王伯初充在京兩街都道録住持五嶽觀賜紫乾元洞神法師因而聖意思慕眞武垂恩顯應事迹非常再行催促監當官疾速建换内庭家堂殿閣仍令三司禮部關報合屬去處搜尋眞武事迹保奏檢類施行所有延壽感應事兼西天門葛將軍係皇帝留恩之故今就眞武殿右畔亦蓋報恩殿焚修香火施經救灾南京應天府有上清鴻福宫係太祖興隆建極報天啓聖功德第一處兼大中祥符中眞宗東封曾宿是宫夜遇北方眞武降現云爲官家護駕蒙眞宗特賜眞武立身金相寳閣及賜御書金字牌至和中冬月軍民瘟疫於鴻福宫興建道場未獲感應人皆惶惑忽夜眞武託夢與住持道士任亢之云吾觀南京冬疫宜令印造太上說眞武妙經沿門施與患人供養受持任亢之既受聖夢即以散之患者並安適值朝廷有征南事抽差兵馬人數無闕其留守司參政諫議大夫沈立具奏朝廷准中書劄降看詳鴻福宫於前朝因顯聖建眞武寳閣自今此冬疫託夢令施經救軍民大灾及得應副南事今再賜本閣三年恩澤一道與道士任亢之充管香火道童披戴及委南京提點或宫殿損漏即行修整靈功呪水准陽軍司法陳拱臣未仕時收得一龜其龜殻版青翠上披金色緑毛眼紅尾長如小盞大養之五七年至拱臣登第其龜忽長盆器大好食棗子以竹籮盛之偶夜月明家人戲取其龜却變縮身殻約如椀足與一赤斑小蛇蟠繞爲戲時拱臣思惟龜蛇二物所謂天關地軸屬眞武福神之下至次日看其龜如故長大却不見蛇數夜如此拱臣命工銷畫眞武聖像設大缸淨水盛貯此龜供養後赴信陽監修築土墻部轄人夫二千值冬月雨雪役夫大半染患倒卧一日拱臣不覺因思似夢而見本家大龜告云數年承收養敬信今爲聖上來唤即當昇天却知司法在此負憂人夫病患故來報謝請司法備淨水一甌以楊枝對北面天念呪呪云天罡天魁立驅電霧施我陰功狂灾速去一氣念三遍用此水灑其患者必獲安健他日當承恩龜乃辭去拱臣依此呪呪水灑其患者不移時間皆得汗蘇醒其大龜於拱臣得夢日化爲一陣黑風不見其信陽監城墻修築既畢軍夫不失性命其功皆承眞武龜蛇應合降靈轉運使費壞具録聞奏續降回㫖許於信陽監刊石碑及置眞武殿修奉香火陳拱臣特除授衛尉寺丞轉承奉郞眞法浸錢鳳翔府有豪民鍾守安全家貪財好殺凡事欺曲惟玄孫進明自恨難以諫之適值七月十五日僧舍作盂蘭盆會見鋪設地獄幀像惡相因縁從此悔悟待誦經典將本房錢物布施與人忽一日見一道士求化自在心錢形貌古怪遂召於市肆喫茶問曰本係何氏貫居甚里道士曰姓裴名郭生居武當今到鳳翔未曾遇合一人進明曰願求一訣可救迷網道士於地上拾得一錢付進明曰牢收牢收道士望西而去進明得此一錢認是乾重之文遂收結在身自後又遇一人手擎檀香雕裝眞武貨賣進明用錢七貫文贖下却爲本家翁父不喜神佛將就天慶觀道士陸元質房寄附供養逐日早晩親到添换香火將及十年自覺祈禱靈驗進明一夜狀如沉醉倒卧於本房明見向者付一錢道士唤云汝收吾一錢在身可將救取幾人屈死性命以水浸之見我即施必有所應進明至曉方蘇遂往見道士孫筠之問眞武所出姓氏孫君曰眞武出身於淨樂國郭氏授業於太上老君修道在武當山至唐則天時降生裴侍郞家斷滅妖童進明聞此方悟得遇眞武顯化遂聽探街坊見有患熱渴瘟疫狂躁投井赴河者遂將此錢往天慶觀取淨水浸之焚香於眞武前禱祝願降靈氣眞法入水施人方禱祝次其聖相忽起圓光如火焰爍一室之中金光覃耀遂將此淨水沿門散施患人皆安是時傳達郡人盡來瞻禮進明終爲伯叔兄弟嫌妬多要窘拾進明潜取元寄眞武欲往外處雲遊取眞武不動漸次加添及百餘人抬舁不離案卓不期有國使到府准中書劄子據司天臺奏近有五色祥光出現上至天門合在鳳翔府界有異寳功德尊像委知通以下遍行搜求府司詳度秪有鍾進明供養眞武靈異差官往取又只用一兩人連卓座起離進明從本府開具發遣來使管押赴朝廷進奉所進上檀香雕鑾小身眞武上殿開封忽迸數道光芒聖駕離座焚香瞻敬權送上清延福宫供養候三司定到事目别作施行鎭河興福内殿崇班入内内侍省任悦奉勅充秦鳳路軍騎安撫官過潞州渡黄河於半津遇風霧昏暗隨侍吏云此是黄河第一崖門要固口北岸是潞州天慶觀分到香火一殿名護國眞武院凡經過先抛獻紙馬任悦禱祝靈空過河别具數目還賽發意纔畢雲彩風色豁然平定任悦與一行人俱見一神人現於虚空認其形相乃在京四聖觀塑畫福神眞武也任悦就舟便拜起受眞武降言如俗交語乃云此一殿係唐太宗因功臣魏徵撰其砥柱銘建立至今爲其處乃是𨸰口第一險惡疆界從此分吾在此爲國家保鎭山河今殿宇隳損蓋有年矣時復下降按伏龍蜃無存泊處吾若不來水必壞爲國之害不細切宜記録不得漏泄機密除奏達聖聰外别與談議立生瘖瘂果報言訖不見任悦回朝面奏縁由聖意猶未信任悦不合再舉陳於上前當殿語聲不出繼遭瘖瘂之報因而諦信除賜任悦就注在京監宫宜令有司立便檢會大唐實録照應選差殿使前去同潞州守臣重建殿宇御賜鎭安興福爲額永作香火祀典現海救危信州龍虎山福聖太極觀是漢張天師傳代法籙靈壇第四洞天昨因遺火焚燒經七年逐旋添造惟北極一殿廣大未有擅施忽一日泉州客人到觀設齋計料北極殿材植等數欲一力全造本觀問及設齋造殿之意據稱前宰相陳侍中知廣州泛海歸泉州時高琬隨行其船將近鄉界忽逆風漂蕩侍中乃焚香禱告虚空願求救護風濤頓息前望懸空一髼頭道者告言侍中到此驚危甚矣特爲使轉其風不至漂溺今送侍中一行骨肉早回泉州侍中焚香拜謝敢問甚處聖賢特現救護誓當銘心篆骨香火仰報答曰信州龍虎山太極觀火焚北極殿宇已及七年未得成就吾係天帥委來尋有縁者今日幸救侍中更不憑疏目侍中便可發心遂於雲中不見逡巡之間人船已抵泉州界舉家思惟髼頭聖相必是眞武眞君顯現救護求造其殿即遣高琬前來驗實高琬復回呈計料等事前後三年起發材植造殿塑裝了畢前宰相陳之純遂具劄奏聞望賜恩額以救危顯聖爲名奉聖㫖除依所請仍賜度牒十道銀五百兩添助修造並給助本觀常住并侍中慶懺寳殿普設大醮大齋仰報眞武垂現救護之恩何詮遇會隋有虔州厢軍何詮因隨安撫使張祐之往南康遊廬山太清觀谷巖洞遇眞武生辰會父母於瑶玉天嘗蒙申奏揀放逐便何詮從此用帛彩畫眞武一幀供養合藥貨賣逾五七年凡有病者服之皆愈從兹聚蓄資財及二千餘貫忽告其妻兒年幼身卑賤彫面作軍請天禄三十年不曾負國背公幸有宿縁得遇眞武生辰聖會致蒙國家放令逐便今生計豐饒有錢二千餘貫今欲留一千貫付汝日給并出貨元藥外一千貫載往廬山天慶觀建造法堂七間將畢忽有朝廷使臣陳伯虎降香投放金龍殿中侍御史晏良弼同南康軍刺史到洞因見何詮捨錢建造法堂咸皆歡羡伯虎謂良弼曰有如此事何縁得達朝廷少頃忽有一白鹿於法堂後走上山林良弼令人趁蹤入林尋覓左右報言林中白鹿不見却有一庵内有軍人在此眠睡聞人入林驚起出林而去道衆云此是何詮應現白鹿也後使命還朝面奏奉聖㫖令檢會到昨來江西安撫使張祐之奏何詮遇眞武生辰因依看詳特贈何詮道號居士仍置影堂鎸立碑記并立谷巖洞瑶玉天爲瑶玉洞天何詮壽八十三於堂後山庵内善終道衆就山燒化聚灰骨爲胎就裝塑身供養未及半年准國命加贈何詮居士爲應夢虚寂先生未知朝廷有何聖驗致此封號吴氏縁合汀州武平縣令杜珪因失目歸家就醫凡六年珪取建州吴育侍中長女其妻自二十七歲産難中得道士周明晏符籙救護平安從此發心供養眞武及持齋戒看閲道經見夫雙目全失遂每夜人靜時置備名香淨水露天朝啓北方禮七七拜願眞武垂慈救珪眼患可及二年時值三月三日夜至三更睡中見一黄衣道士謂曰心堅不如身淨意重不如縁合七日内有人來醫杜珪眼候平復如故却來雲蒼相見與我師還却眼債言訖不見後滿七日吴氏於門前見一道人扇上寫雲蒼道人攻醫眼患吴氏召之遂看夫眼用二針於眼兩角并留二藥日進三服水調服盡見功道人更不受錢出門不知所之遂依此服盡其藥一夜杜珪夢見雙目被一小龜沿上面來用口䑛其眼珪用手拂之驚覺雙目俱明乃思醫藥并小龜顯承眞武降靈垂救眼患後聞妻父吴育判太原府因携妻至彼一日出西城郊外因至天柱觀其山名雲蒼步入其山見一殿裝塑神像被人刮除眼目審問知是眞武聖像吴氏驚悟前者雲蒼相見還我師眼債之說逐一言與父育乃自備錢裝修將杜珪前因患眼罷官後遇眞武應化醫救情由保明申奏保舉注差續降指揮吴育裝修雲蒼山塑像了畢申聞别議勳贈其杜珪可轉授揚州觀察判官進明顯聖中書門下三司禮部定到鳳翔府鍾進明曾因擇善檀香雕鑾眞武寄留天慶觀道士陸元質房供養早晩親去香火不缺得遇眞武教令呪水救人疾病金光焕赫上應天漢致司天臺上言其光現於秦分今鳳翔府主有古異功德聖像差人取問今是鳳翔府發遣到眞武臺座奉聖㫖送上清延福宫供養外賜鍾進明除授三班借職即於本家遥具禮儀朝謝訖不三日染患身死既而鄉社所謂進明死後聖跡顯發祈請有驗後翰林學士刑部侍郞孫誠之奉使西蕃於鳳翔府路逢一道士布袍草履前迎誠之曰侍郞命禄不當此權去時須有驚憂迴而必夭誠之曰汝是何人故知預事道士曰我本鳳翔百姓鍾進明今爲鳳翔府三羅山瓊壺洞主監管玉峰龍潭今乃成半仙列矣適見侍郞頂上有黑氣間有白氣大爲不祥必主前路驚憂回國身夭誠之再問有斯灾禍如何消禳進明曰至危難處但念我本師眞武靈應眞君尊號終獲感護然雖救得離蕃恐歸國終有灾言訖忽然不見誠之入蕃受蕃王李希靜燕會因舉題日月出東還没西七字短令無對致李希靜欲令囚之乃於恐懼中默念眞武靈應眞君數聲有一官人力諫希靜漸息怒意復令放還誠之辭蕃歸京未入界先被隨行察事使臣具奏忽有使臣齎勅前來交割孫誠之一行從人及蕃王回禮表荅等責降爲使入蕃辱國特賜藥酒聽勅命甘死無詞忽有使臣齎白劄來特賜孫誠之免死降盡前官責授遠惡小郡監臨差使縁皇帝因覽鍾進明顯應皆獲眞武慈德委令半仙護國救民不違眞武救護故放孫誠之死罪下鳳翔府建鍾進明祠堂爲本人帶三班借職身死顯聖元遇眞武授記是謂本師弟子其祠合以二殿先後眞武許依卿原裝塑進明即以白衣儀相表半仙之位仍贈善導安寂仙君及賜二輔報慈廟爲額令本府撰立碑記永示不朽鄒宿契靈慶曆二年三月初五日中書門下據鄭州保奏本州監酒内殿崇班鄒宿在任公正惟衹供養眞武侍奉精恪既不曾以諂曲欺誑之事祈求又不曾於諸事背義貪殘恣殺物命凡州民有水旱灾疫先於諸處神祠無應若鄒宿齋戒於本家眞武前祈禱皆獲靈驗人皆謂鄒宿曾悟聖教密契神靈故鄭州陰受其賜忽一日鄭州於日午間天降風雹烟雲四起於北門裏黑霧盤旋降下無蓋銅棺一具空中但聞音樂嘹亮自知通以下至於百姓盡皆易衣入棺並不容在内其後監酒鄒宿穿執而來方入其棺忽聞振響一聲遂降其蓋輕舉而上仙詔鶴唳瑞氣天香靄而不散其棺冉冉向正北而去次據白蓮山延壽院僧智仁等狀申昨晚山上五色祥雲籠覃聞有樂聲異香芬馥天花如雨墜而復收霧垂甘露約至更盡方息今早集僧衆上看其山中元有一峰號鷴巢兩畔有石巖相離十五餘步今却相合於正北石巖接縫間留一小石門方圓四尺望見裏面有一銅棺山之上下朽木並發芳條一時變爲茂林雜花競開鳥獸飛鳴如覃護狀未委事由州司參詳已得昨晩天降銅棺迎去鄒宿因依集當職官吏及道僧前去看驗委實保奏續有回降下鄭州縁鄒宿近出神到内殿朝辭云臣蒙天符差充北極壽限曹副判官勾當每年一次當隨眞武下降人間計筭世人善惡校量壽限皆承眞武保合授記臣恩受皇帝禄賜特來報謝今勘會鄒宿有無子孫承紹恩澤一道遷注供侍骨肉如無即厚給錢帛養贍外仰就白蓮山建造鄒宿祠堂以神應府君廟爲額永爲祈請靈跡之處天錫青棗饒州樂平縣有江州團練判官朱牧並無男女牧自父亢臨終時謂云今後莫忘眞武聖堂香火凡遇每月下降至誠供養如遇三月初三五月初五七月初七九月初九此四日每備供養三分精虔祭獻牧自先父囑付不曾有違一次適遇七月七日聖降之辰是夜燒獻畢約三更以來妻氏夢一黄衣道士以石楪盛青棗一枚勸喫既喫覺滿口異香道士云此乃天錫仙人之棗自後有胎生下一男風骨俊秀五歲記誦聰敏七歲天才通悟名應四方可應神童乃應母氏之夢名曰天錫朝廷究察得知臣僚亦有保舉遽蒙借授大理評事借緋携子天錫上殿說書史並不誤講論傳記如流對御題答賜天錫特授假承務郞及賜買書錢一百貫更歸修讀候至十六歲赴闕别聽指揮并父朱牧先借官職更不追還并賜朱天錫褒諭文典神化紅纓信州弋陽縣開絲綿鋪陸中道妻阿張年四十四不産中道忽告曰竊知時人多供養北方眞武凡百祈求無不感驗遂贖得川畫眞武歸家供養張氏曉夕哀禱雖祁寒極暑未嘗暫忘如是六年遇一夜中道與妻同得一夢與丫鬟仙童爭抛綵毬擲上空中夫妻仰視不覺飛一紅纓入於張氏口中咽下因此有妊經十三箇月生一女至十三歲非常端正但未曾言人皆謂之啞女弋陽縣承受信州公文爲淮中書劄子指揮司天臺奏近有明星現東南陳國分野正當弋陽縣地里招陰貴神仙託凡異相委知佐根問申據本縣契勘秪有陸中道家十三歲啞女必是異人尋唤到陸中道供祈因依申州本州保奏朝廷時啞女聞此忽然言語索香湯沐浴换衣坐於淨牀告父母云念兒本係天化宫雙女宿下善才掌籍天童天女第一名謂之緑霞瓊女每七周年一次輪降充北極佑勝院副判司隨所差巡遊抵備等昨爲父母日夜泣告天曹求嗣動感眞武將因縁簿披檢母氏宿本不注胎息蒙眞武將父母在世修奉香火功先爲保明上奏三天然後點兒化爲紅纓入母之腹爲女一紀餘年解免母氏勤求之意兒降胎時曾蒙眞武囑付處世不得出聲雖在父母左右未嘗言話今既限滿又見國家文字根括事泄天機慮兒不便告别而逝中道與妻遂命工用灰漆封布如塑像於眞武側逐日香火修持功德設齋答謝眞武恩慈續後朝廷賜到衣帛官支糧食以表降生神聖祥瑞例物候本人語言仰逐時劄録申州再具託化清由回申又准中書劄子徑下弋陽縣仰將陸中道家啞女託化全身於縣城官地埋墳建亭屋遮蓋别立祠堂塑啞女素衣神仙一身贈寂照孝女爲額委本縣立碑記荆王雙美唐廣明皇后功德玄都觀年深隳壞道衆累疏募縁無一抄注自歎如何有此阻障有道士王淨淵云本觀有眞武像因何未蒙降鑒淨淵忽夜夢人挑到金錢入觀堆垛於眞武殿前交檢即五百貫用馬乗載上天不旬日忽有在京燕王位内宫令官孫惟彦等赴眞武殿鋪設稱爲燕荆王獻紙一陌雲馬一匹沉香一炷奏狀一封爲本宫儀國夫人臨産憂危時有一道士齎疏來問大王抄題重修西應鎭道觀荆王不采云爲夫人産憂其道士却言有一法即令便産子母雙美荆王聞之大喜云果有靈驗其觀宇獨捨鼎新建造道士將硃砂書黄紙符一道燒灰水調令夫人服之移郟間誕下一男荆王題疏道士辭謝出門遂尋不見夫人云纔服符水眼前有符吏判官交衛暗中被一披髮金甲仗劍神人一喝其子隨聲而下又自聞得報言此子從西應鎭玄都觀中來急往彼處保扶荆王因獻錢馬等并驗本觀隳損還有道士入京抄題否道衆云不曾有人入京抄注荆王遂齎表奏聞發遣金銀錢帛前去重新修蓋及准聖㫖頒賜度牒一百道添助修造工匠畢日設醮慶懺夫人自備奩具貨賣買金裝貼本觀三清聖像并眞武眞像及用絹彩畫眞武一千軸散入諸宫親王闔朝文武公卿之家受持供養其觀蒙聖恩改賜崇靈應聖之觀仍立碑記焦氏一嗣武安軍觀察使殿前太尉王植妻壽昌郡君焦氏一生不産爲性樂善慕道專勤香火忽一日因往後園視花果内有石榴樹一枝朽死自然生煙火於上焦氏驚忙救之其火乃滅於樹前却現一神人圓光赫赫披頭仗劍脚踏龜蛇認是眞武眞君焦氏便拜今日幸遇上眞伏望慈悲救度眞君問曰汝有縁見吾今心意有何所欲焦氏曰願求嗣息眞君曰汝候三月三日來宣化門外祚眞觀與汝一嗣必得後貴焦氏方再拜時忽已不見歸來言與王植至三月三日往祚眞觀是日啓建眞武生日齋會士女駢集忽有一髼頭奴子方六七歲拽定焦氏及王植覓錢物焦氏細看異貌殊俗撫問云俱無父母亦無親屬年來多在四向宫觀宿食焦氏從此携歸養育自然聰敏至八歲王植作親子奏恩蒙上宣問卿常云無子今何有親生之男王植不免奏前項所遇眞武賜子因依動御驚嗟乆之又問年月不知所生將當年於祚眞觀收得是三月初三日巳時爲憑奉聖㫖送司天臺定其貴賤據定到王植八歲命合五星并室主有武學邊功十六上值淵渠水從正北而發禄必有權勢因此蒙御賜王淵爲名可授右侍禁校尉内殿崇班出身仍許定第三越國長公主爲親候十六歲别賜納禮成結王淵至十四歲又蒙恩加賜閣門祇候隨父朝見臨殿試中武舉義策當賜陪禮十六歲納禮册寳成國親授賔州防禦使駙馬都尉奏取聖㫖用俸錢并奩具等於祚眞觀建眞武寳閣仍奏請勅額玄天上帝啓聖録卷之六
